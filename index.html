<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MATH 107 · Data, Functions &amp; Graphs — Study Workspace</title>
<meta name="description" content="An interactive precalculus study workspace for Occidental MATH 107: lessons, ranked videos, worksheets, answer keys, and timed tests with progress tracking." />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- KaTeX (math rendering) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
:root{
  --ink:#16243c; --ink-soft:#41506b; --ink-faint:#5d6982;
  --teal:#0e7c7b; --cyan:#127d92; --cyan-bright:#1593a8;
  --paper:#faf9f5; --panel:#ffffff; --panel-2:#f3f5f9;
  --line:#e6eaf1; --line-strong:#d3dae6;
  --grid:#eef1f7;
  --good:#2f8f5b; --good-bg:#e8f3ec; --amber:#8a5d12; --amber-bg:#f8f0e0;
  --shadow:0 1px 2px rgba(20,30,50,.04),0 6px 22px rgba(20,30,50,.06);
  --shadow-lg:0 10px 40px rgba(20,30,50,.14);
  --radius:14px; --radius-sm:9px;
  --sidebar-w:312px;
  --font-display:'Spectral',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
[data-theme="dark"]{
  --ink:#e9edf5; --ink-soft:#b3bdd0; --ink-faint:#99a3b8;
  --teal:#4fc5c0; --cyan:#5cc6d8; --cyan-bright:#6dd2e3;
  --paper:#0e1626; --panel:#152034; --panel-2:#1b2840;
  --line:#243352; --line-strong:#2d3f63;
  --grid:#172238;
  --good:#5cc08a; --good-bg:#16301f; --amber:#dcae6a; --amber-bg:#2c2616;
  --shadow:0 1px 2px rgba(0,0,0,.2),0 8px 26px rgba(0,0,0,.28);
  --shadow-lg:0 14px 48px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-body); color:var(--ink); background:var(--paper);
  -webkit-font-smoothing:antialiased; line-height:1.6; font-size:16px;
}
a{color:var(--cyan-bright); text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2.5px solid var(--cyan-bright); outline-offset:2px; border-radius:4px}
.skip{position:absolute; left:-9999px; top:8px; z-index:100; background:var(--ink); color:#fff; padding:10px 16px; border-radius:8px; font-weight:600; box-shadow:var(--shadow-lg)}
.skip:focus{left:12px}
.visually-hidden{position:absolute!important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:18px;
  padding:12px 22px; background:color-mix(in srgb,var(--panel) 86%, transparent);
  backdrop-filter:saturate(140%) blur(10px); border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:center; gap:13px; min-width:0}
.brand .mark{
  flex:0 0 auto; width:42px; height:42px; border-radius:11px; display:grid; place-items:center;
  background:linear-gradient(150deg,var(--ink),#27395c); color:#fff; position:relative; overflow:hidden;
  box-shadow:var(--shadow);
}
.brand .mark svg{width:26px;height:26px}
.brand-txt{min-width:0}
.brand .eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; color:var(--teal); text-transform:uppercase; font-weight:600}
.brand h1{font-family:var(--font-display); font-weight:600; font-size:18px; margin:0; line-height:1.1; letter-spacing:.1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.spacer{flex:1 1 auto}
.tools{display:flex; align-items:center; gap:10px}
.search{position:relative; display:flex; align-items:center}
.search input{
  font-family:var(--font-body); font-size:13.5px; color:var(--ink);
  background:var(--panel-2); border:1px solid var(--line); border-radius:999px;
  padding:8px 14px 8px 34px; width:200px; transition:width .2s, box-shadow .2s;
}
.search input::placeholder{color:var(--ink-faint)}
.search input:focus{width:240px; box-shadow:0 0 0 3px color-mix(in srgb,var(--cyan-bright) 18%,transparent)}
.search svg{position:absolute; left:11px; width:15px; height:15px; color:var(--ink-faint); pointer-events:none}
.iconbtn{
  display:grid; place-items:center; width:38px; height:38px; border-radius:10px; cursor:pointer;
  background:var(--panel-2); border:1px solid var(--line); color:var(--ink-soft); transition:.15s;
}
.iconbtn:hover{color:var(--ink); border-color:var(--line-strong); transform:translateY(-1px)}
.iconbtn svg{width:18px;height:18px}
.ring{display:flex; align-items:center; gap:9px}
.ring svg{width:38px;height:38px; transform:rotate(-90deg)}
.ring .track{fill:none; stroke:var(--line-strong); stroke-width:4}
.ring .fill{fill:none; stroke:var(--teal); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.ring .pct{font-family:var(--font-mono); font-weight:600; font-size:13px; color:var(--ink)}
.ring .lbl{font-size:11px; color:var(--ink-faint); line-height:1.1; max-width:64px}
.hamburger{display:none}

/* ---------- Layout ---------- */
.layout{display:grid; grid-template-columns:var(--sidebar-w) 1fr; min-height:calc(100vh - 67px)}
.sidebar{
  border-right:1px solid var(--line); background:var(--panel);
  position:sticky; top:67px; height:calc(100vh - 67px); overflow-y:auto; padding:18px 14px 60px;
}
.sidebar::-webkit-scrollbar{width:9px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:9px; border:3px solid var(--panel)}
.nav-section-label{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); padding:6px 12px; margin-top:8px; font-weight:600}
.nav-item{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left; cursor:pointer;
  padding:9px 12px; border-radius:10px; border:0; background:transparent; color:var(--ink-soft);
  font-family:var(--font-body); font-size:14px; line-height:1.25; transition:.13s;
}
.nav-item:hover{background:var(--panel-2); color:var(--ink)}
.nav-item.active{background:color-mix(in srgb,var(--teal) 12%,transparent); color:var(--ink); font-weight:600}
.nav-item.active .num{color:var(--teal)}
.nav-item .num{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint); flex:0 0 auto; width:26px}
.nav-item .txt{flex:1 1 auto; min-width:0}
.dot{flex:0 0 auto; width:15px; height:15px; border-radius:50%; border:2px solid var(--line-strong); display:grid; place-items:center}
.dot.done{background:var(--good); border-color:var(--good)}
.dot.done::after{content:""; width:5px; height:5px; background:#fff; border-radius:50%}
.dot.partial{border-color:var(--teal); background:radial-gradient(circle at center, var(--teal) 0 40%, transparent 42%)}

.unit-head{
  display:flex; align-items:center; gap:9px; width:100%; cursor:pointer; padding:11px 12px; border:0; border-radius:10px;
  background:transparent; color:var(--ink); font-family:var(--font-body); font-weight:600; font-size:14px; transition:.13s; margin-top:2px;
}
.unit-head:hover{background:var(--panel-2)}
.unit-head .chev{width:14px;height:14px; color:var(--ink-faint); transition:transform .2s; flex:0 0 auto}
.unit-head[aria-expanded="true"] .chev{transform:rotate(90deg)}
.unit-head .un{font-family:var(--font-mono); font-size:11px; color:var(--teal); flex:0 0 auto}
.unit-head .nm{flex:1 1 auto; min-width:0; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.unit-head.locked{color:var(--ink-faint)}
.unit-head.locked .un{color:var(--ink-faint)}
.lock{width:13px;height:13px;color:var(--ink-faint);flex:0 0 auto}
.unit-bar{height:3px; border-radius:3px; background:var(--line); margin:2px 14px 0; overflow:hidden}
.unit-bar > i{display:block; height:100%; background:var(--teal); border-radius:3px; transition:width .5s}
.sublist{overflow:hidden; padding-left:10px; margin-left:14px; border-left:1px solid var(--line)}
.sublist[hidden]{display:none}

/* ---------- Content ---------- */
.content{
  padding:40px clamp(20px,5vw,72px) 100px; max-width:980px; margin:0 auto; width:100%;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:26px 26px; background-position:-1px -1px;
}
.content-inner{background:var(--paper)}
.view{animation:fade .35s ease}
@keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}

.eyebrow{font-family:var(--font-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--teal); font-weight:600; display:flex; align-items:center; gap:10px}
.page-title{font-family:var(--font-display); font-weight:600; font-size:clamp(28px,4vw,40px); line-height:1.12; margin:10px 0 6px; letter-spacing:-.3px}
.lede{font-size:17px; color:var(--ink-soft); max-width:64ch; margin:0 0 8px}
hr.rule{border:0; border-top:1px solid var(--line); margin:26px 0}

/* completion chips */
.progress-chips{display:flex; flex-wrap:wrap; gap:10px; margin:22px 0 8px}
.chip{
  display:inline-flex; align-items:center; gap:9px; cursor:pointer; user-select:none;
  font-size:13.5px; font-weight:500; padding:9px 15px 9px 12px; border-radius:999px;
  background:var(--panel); border:1.5px solid var(--line-strong); color:var(--ink-soft); transition:.15s;
}
.chip:hover{border-color:var(--teal); color:var(--ink)}
.chip .box{width:18px; height:18px; border-radius:6px; border:2px solid var(--line-strong); display:grid; place-items:center; transition:.15s}
.chip .box svg{width:12px;height:12px; color:#fff; opacity:0; transform:scale(.5); transition:.15s}
.chip.on{background:var(--good-bg); border-color:var(--good); color:var(--ink)}
.chip.on .box{background:var(--good); border-color:var(--good)}
.chip.on .box svg{opacity:1; transform:none}

/* tabs */
.tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin:18px 0 0}
.tab{
  font-family:var(--font-body); font-size:14.5px; font-weight:500; cursor:pointer; color:var(--ink-faint);
  background:transparent; border:0; padding:12px 16px; border-bottom:2.5px solid transparent; margin-bottom:-1px; transition:.13s;
}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink); border-bottom-color:var(--teal); font-weight:600}
.tab .tnum{font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-left:6px}
.panel-body{padding:22px 0}

/* cheat sheet typography */
.cs h4{font-family:var(--font-display); font-size:20px; font-weight:600; color:var(--ink); margin:26px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--line)}
.cs h4:first-child{margin-top:4px}
.cs p{margin:10px 0}
.cs ul,.cs ol{margin:10px 0; padding-left:22px}
.cs li{margin:5px 0}
.cs strong{color:var(--ink); font-weight:600}
.cs em{color:var(--ink-soft)}
table.ref{border-collapse:collapse; width:100%; margin:14px 0; font-size:14.5px; box-shadow:var(--shadow); border-radius:10px; overflow:hidden}
table.ref th,table.ref td{text-align:left; padding:10px 14px; border-bottom:1px solid var(--line)}
table.ref thead th{background:var(--ink); color:#fff; font-family:var(--font-mono); font-size:11.5px; letter-spacing:.05em; text-transform:uppercase; font-weight:500}
[data-theme="dark"] table.ref thead th{background:#0b1422}
table.ref tbody tr:nth-child(even){background:var(--panel-2)}
table.ref tbody tr:last-child td{border-bottom:0}
.callout{background:var(--panel-2); border-left:3px solid var(--teal); border-radius:0 10px 10px 0; padding:14px 18px; margin:16px 0}
.callout.formula{border-left-color:var(--cyan-bright)}
.callout .co-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); font-weight:600; display:block; margin-bottom:4px}
.callout.warn{border-left-color:var(--amber); background:var(--amber-bg)}
.callout.warn .co-label{color:var(--amber)}

/* video cards */
.vid-grid{display:grid; gap:12px; margin:8px 0}
.vid{display:flex; gap:14px; align-items:flex-start; padding:14px; border:1px solid var(--line); border-radius:12px; background:var(--panel); box-shadow:var(--shadow); transition:.15s}
.vid:hover{border-color:var(--line-strong); transform:translateY(-1px)}
.vid .rank{flex:0 0 auto; width:30px; height:30px; border-radius:8px; background:color-mix(in srgb,var(--teal) 14%,transparent); color:var(--teal); font-family:var(--font-mono); font-weight:600; font-size:14px; display:grid; place-items:center}
.vid .vmeta{flex:1 1 auto; min-width:0}
.vid .vtitle{font-weight:600; font-size:15px; color:var(--ink); margin:0 0 2px}
.vid .vchan{font-size:12.5px; color:var(--ink-faint); font-family:var(--font-mono)}
.vid .vnote{font-size:13.5px; color:var(--ink-soft); margin:5px 0 9px}
.vid .vactions{display:flex; gap:8px; flex-wrap:wrap}
.btn-sm{font-size:12.5px; font-weight:500; padding:6px 12px; border-radius:8px; border:1px solid var(--line-strong); background:var(--panel-2); color:var(--ink-soft); cursor:pointer; transition:.13s; display:inline-flex; align-items:center; gap:6px}
.btn-sm:hover{color:var(--ink); border-color:var(--teal); text-decoration:none}
.btn-sm.primary{background:var(--teal); border-color:var(--teal); color:#fff}
.btn-sm.primary:hover{background:#0c6a69}
.embed{margin-top:12px; border-radius:12px; overflow:hidden; aspect-ratio:16/9; background:#000; box-shadow:var(--shadow)}
.embed iframe{width:100%; height:100%; border:0; display:block}

/* worksheet / key */
.wpart{margin:22px 0}
.wpart h5{font-family:var(--font-mono); font-size:12.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--teal); font-weight:600; margin:0 0 6px; padding-bottom:6px; border-bottom:1px solid var(--line)}
ol.problems{list-style:none; counter-reset:none; margin:0; padding:0}
ol.problems li{display:flex; gap:14px; padding:9px 4px; align-items:baseline; border-bottom:1px dashed var(--line)}
ol.problems li:last-child{border-bottom:0}
ol.problems li .pn{font-family:var(--font-mono); font-size:13px; color:var(--ink-faint); flex:0 0 auto; width:30px; text-align:right}
ol.problems li .pb{flex:1 1 auto}
.key-gate{display:grid; place-items:center; padding:42px 20px; text-align:center; border:1.5px dashed var(--line-strong); border-radius:14px; background:var(--panel-2)}
.key-gate p{max-width:46ch; color:var(--ink-soft); margin:10px 0 18px}
.sol .pb{color:var(--ink-soft)}
.sol .pb strong{color:var(--ink)}

/* notes */
.notes{margin-top:30px; border:1px solid var(--line); border-radius:14px; padding:18px; background:var(--panel); box-shadow:var(--shadow)}
.notes label{font-family:var(--font-mono); font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); font-weight:600; display:flex; align-items:center; gap:8px}
.notes textarea{width:100%; margin-top:10px; min-height:90px; resize:vertical; font-family:var(--font-body); font-size:14.5px; color:var(--ink); background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px}
.notes .saved{font-size:12px; color:var(--ink-faint); margin-top:6px; height:14px}

/* prev / next */
.pager{display:flex; justify-content:space-between; gap:12px; margin-top:38px}
.pager a{flex:1 1 0; min-width:0; border:1px solid var(--line); border-radius:12px; padding:14px 18px; background:var(--panel); box-shadow:var(--shadow); transition:.15s}
.pager a:hover{border-color:var(--teal); text-decoration:none; transform:translateY(-1px)}
.pager a.next{text-align:right}
.pager .pk{font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint)}
.pager .pt{display:block; font-weight:600; color:var(--ink); margin-top:3px}
.pager a[aria-disabled="true"]{opacity:.4; pointer-events:none}

/* tests */
.meta-row{display:flex; flex-wrap:wrap; gap:10px; margin:16px 0}
.pill{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:500; padding:7px 13px; border-radius:999px; background:var(--panel-2); border:1px solid var(--line); color:var(--ink-soft)}
.pill svg{width:14px;height:14px;color:var(--teal)}
.tsection{margin:24px 0}
.tsection h5{font-family:var(--font-display); font-size:18px; font-weight:600; color:var(--ink); margin:0 0 8px; padding-bottom:6px; border-bottom:1px solid var(--line)}
.score-box{display:flex; flex-wrap:wrap; align-items:center; gap:14px; margin-top:22px; padding:18px; border:1px solid var(--line); border-radius:14px; background:var(--panel); box-shadow:var(--shadow)}
.score-box label{font-weight:600; font-size:14px}
.score-box input{width:84px; font-family:var(--font-mono); font-size:15px; text-align:center; padding:9px; border:1px solid var(--line-strong); border-radius:9px; background:var(--panel-2); color:var(--ink)}
.mastery{font-weight:600; font-size:14px; padding:7px 14px; border-radius:999px}
.mastery.m0{background:var(--panel-2); color:var(--ink-faint)}
.mastery.m1{background:#fbeae6; color:#b4421f}
.mastery.m2{background:var(--amber-bg); color:var(--amber)}
.mastery.m3{background:var(--good-bg); color:var(--good)}
[data-theme="dark"] .mastery.m1{background:#3a1d16;color:#f0a48c}

/* overview specifics */
.hero{position:relative; padding:30px 30px 32px; border-radius:18px; overflow:hidden; margin-bottom:8px;
  background:linear-gradient(135deg,var(--ink),#243a5e); color:#fff; box-shadow:var(--shadow-lg)}
.hero::before{content:""; position:absolute; inset:0; opacity:.16;
  background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px); background-size:28px 28px}
.hero::after{content:""; position:absolute; right:-40px; top:-40px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle,var(--teal),transparent 70%); opacity:.45}
.hero .h-eye{position:relative; font-family:var(--font-mono); font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#8fe0db; font-weight:600}
.hero h2{position:relative; font-family:var(--font-display); font-weight:600; font-size:clamp(26px,4vw,38px); margin:10px 0 8px; line-height:1.1}
.hero p{position:relative; max-width:60ch; color:#d6deec; margin:0; font-size:16px}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:22px 0}
.card{border:1px solid var(--line); border-radius:14px; padding:18px 20px; background:var(--panel); box-shadow:var(--shadow)}
.card h3{font-family:var(--font-display); font-size:18px; font-weight:600; margin:0 0 8px}
.steps{counter-reset:step; list-style:none; padding:0; margin:8px 0}
.steps li{display:flex; gap:12px; padding:7px 0; align-items:flex-start}
.steps li::before{counter-increment:step; content:counter(step); flex:0 0 auto; width:24px; height:24px; border-radius:7px; background:color-mix(in srgb,var(--teal) 14%,transparent); color:var(--teal); font-family:var(--font-mono); font-weight:600; font-size:13px; display:grid; place-items:center}
.roadmap{display:grid; gap:10px; margin:14px 0}
.rm-unit{border:1px solid var(--line); border-radius:12px; padding:13px 16px; background:var(--panel); box-shadow:var(--shadow)}
.rm-unit .rm-h{display:flex; align-items:center; gap:10px; margin-bottom:8px}
.rm-unit .rm-h .un{font-family:var(--font-mono); font-size:12px; color:var(--teal); font-weight:600}
.rm-unit .rm-h .nm{font-weight:600}
.rm-unit .rm-h .tag{margin-left:auto; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; padding:3px 9px; border-radius:999px}
.tag.ready{background:var(--good-bg); color:var(--good)}
.tag.soon{background:var(--panel-2); color:var(--ink-faint)}
.subchips{display:flex; flex-wrap:wrap; gap:7px}
.subchips span{font-size:12.5px; color:var(--ink-soft); background:var(--panel-2); border:1px solid var(--line); border-radius:999px; padding:4px 11px}
.subchips span.cl{cursor:pointer; transition:.13s}
.subchips span.cl:hover{border-color:var(--teal); color:var(--ink)}

.empty{display:grid; place-items:center; text-align:center; padding:60px 20px; color:var(--ink-faint)}
.empty svg{width:42px;height:42px;margin-bottom:14px;color:var(--line-strong)}
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:13.5px; box-shadow:var(--shadow-lg); opacity:0; pointer-events:none; transition:.3s; z-index:80}

<script>
/* =====================================================================
   MATH 107 — Study Workspace
   Single-file app. Progress is saved in the browser (localStorage) with a

   Content lives in COURSE below; add Units 2–7 by following the same shape.

const R = String.raw;                          // keeps LaTeX backslashes literal
const items = (s) => s.split('@@').map(x => x.trim()).filter(Boolean);

/* ---------- Storage (safe) ---------- */
const Store = (() => {
  const KEY = 'm107_v1';
  let mem = {}, usable = true;
  try { const t='__t'; localStorage.setItem(t,'1'); localStorage.removeItem(t); }
  catch(e){ usable = false; }
  function read(){
    if(!usable) return mem;
    try { return JSON.parse(localStorage.getItem(KEY) || '{}'); }
    catch(e){ return {}; }
  }
  function write(o){
    if(!usable){ mem = o; return; }
    try { localStorage.setItem(KEY, JSON.stringify(o)); } catch(e){ mem = o; }
  }
  let data = Object.assign({done:{}, notes:{}, scores:{}, theme:'light', last:'overview'}, read());
  return {
    get:(k)=>data[k],
    set:(k,v)=>{ data[k]=v; write(data); },
    sub:(path)=>data.done[path]||false,
    toggle:(path)=>{ data.done[path]=!data.done[path]; write(data); return data.done[path]; },
    note:(id)=>data.notes[id]||'',
    setNote:(id,v)=>{ data.notes[id]=v; write(data); },
    score:(id)=>data.scores[id],
    setScore:(id,v)=>{ data.scores[id]=v; write(data); },

  };
})();

/* ---------- Course content ---------- */
const KHAN_A2 = 'https://www.khanacademy.org/math/algebra2';
const LEONARD = 'https://www.youtube.com/playlist?list=PLDesaqWTN6ESsmwELdrzhcGiRhk5DjwLP';

const COURSE = {
  units: [
    {
      id:'u0', n:'00', name:'Algebra Toolkit', open:true,
      subtopics:[
        {
          id:'0.1', name:'Fractions, Signs & Order of Operations',
          blurb: R`Master fraction arithmetic, signed-number rules, distributing a negative, and PEMDAS so you can evaluate any expression — the engine behind every later simplification, including the difference quotient in $1.3$.`,
          videos:[
            {rank:1, t:'Fractions Basic Introduction - Adding, Subtracting, Multiplying & Dividing Fractions', ch:'The Organic Chemistry Tutor', id:'GvLIEiqxS6s', note:'Best first watch — clear, worked examples of fractions and signed numbers for a rusty start.'},
            {rank:2, t:'Practice these skills — interactive drills', ch:'Khan Academy', url:'https://www.khanacademy.org/math/pre-algebra', note:'Drill with instant feedback until the steps feel automatic.'}
          ],
          cs: R`<h4>Fractions: the four operations</h4>
<p>A fraction $\dfrac{a}{b}$ means "$a$ parts out of $b$." The bottom number $b$ (the <strong>denominator</strong>) can never be $0$.</p>
<div class="callout formula"><span class="co-label">Formula</span>
<ul>
<li><strong>Add/subtract (same denominator):</strong> $\dfrac{a}{c}\pm\dfrac{b}{c}=\dfrac{a\pm b}{c}$ — keep the bottom, combine the tops.</li>
<li><strong>Add/subtract (different denominators):</strong> rewrite both over the <strong>LCD</strong> (least common denominator) first, then combine tops.</li>
<li><strong>Multiply:</strong> $\dfrac{a}{b}\cdot\dfrac{c}{d}=\dfrac{ac}{bd}$ — straight across, top times top and bottom times bottom.</li>
<li><strong>Divide:</strong> $\dfrac{a}{b}\div\dfrac{c}{d}=\dfrac{a}{b}\cdot\dfrac{d}{c}$ — multiply by the <strong>reciprocal</strong> (flip the second fraction).</li>
</ul>
</div>
<p><strong>Finding the LCD.</strong> The LCD is the smallest number both denominators divide into. For $\dfrac{1}{6}$ and $\dfrac{1}{4}$, multiples of $6$ are $6,12,18,\dots$ and of $4$ are $4,8,12,\dots$, so the LCD is $12$. Multiply each fraction, top and bottom, by whatever turns its denominator into $12$.</p>
<p><strong>Simplifying.</strong> Divide top and bottom by the same number until they share no common factor: $\dfrac{12}{18}=\dfrac{12\div 6}{18\div 6}=\dfrac{2}{3}$. Always simplify the final answer.</p>

<h4>Signed numbers (positives and negatives)</h4>
<table class="ref"><thead><tr><th>Situation</th><th>Rule</th><th>Example</th></tr></thead><tbody>
<tr><td>Add same signs</td><td>add, keep the sign</td><td>$-3+(-5)=-8$</td></tr>
<tr><td>Add different signs</td><td>subtract, keep sign of the bigger size</td><td>$-3+8=5$</td></tr>
<tr><td>Subtract</td><td>add the opposite</td><td>$4-(-6)=4+6=10$</td></tr>
<tr><td>Multiply / divide</td><td>same signs $\to$ positive; different $\to$ negative</td><td>$(-2)(-5)=10$, $\ \dfrac{-12}{3}=-4$</td></tr>
</tbody></table>

<h4>Distributing a negative sign</h4>
<div class="callout"><span class="co-label">Key idea</span>A minus sign in front of parentheses flips the sign of <em>every</em> term inside: $-(a-b)=-a+b$. Think of it as multiplying each inside term by $-1$.</div>
<p>Example: $-(2x-5+y)=-2x+5-y$. Every single term changed sign, not just the first.</p>

<h4>Order of operations (PEMDAS)</h4>
<div class="callout formula"><span class="co-label">Formula</span><strong>P</strong>arentheses, <strong>E</strong>xponents, <strong>M</strong>ultiplication and <strong>D</strong>ivision (left to right), <strong>A</strong>ddition and <strong>S</strong>ubtraction (left to right).</div>
<p>"MD" is one step done left to right (whichever comes first), and "AS" is one step done left to right. A fraction bar acts like invisible parentheses: simplify the whole top and whole bottom before dividing.</p>

<h4>Worked example (substitution + PEMDAS)</h4>
<p>Evaluate $\dfrac{a^2-b}{a-b}$ when $a=-3$ and $b=5$.</p>
<ul>
<li><strong>Substitute</strong> using parentheses: $\dfrac{(-3)^2-(5)}{(-3)-(5)}$.</li>
<li><strong>Top:</strong> exponent first, $(-3)^2=9$, then $9-5=4$.</li>
<li><strong>Bottom:</strong> $-3-5=-8$.</li>
<li><strong>Divide:</strong> $\dfrac{4}{-8}=-\dfrac{1}{2}$.</li>
</ul>
<p>Answer: $-\dfrac{1}{2}$. The parentheses around each substituted value are what keep $(-3)^2=9$ from being miscomputed as $-9$.</p>

<div class="callout warn"><span class="co-label">Common errors</span>
<ul>
<li><strong>Adding bottoms:</strong> $\dfrac{1}{2}+\dfrac{1}{3}\ne\dfrac{2}{5}$. Never add denominators; get an LCD first ($\dfrac{3}{6}+\dfrac{2}{6}=\dfrac{5}{6}$).</li>
<li><strong>Forgetting to distribute the full negative:</strong> $-(x-4)$ is $-x+4$, <em>not</em> $-x-4$.</li>
<li><strong>$-3^2$ vs $(-3)^2$:</strong> without parentheses, $-3^2=-9$ (exponent before the sign); with them, $(-3)^2=9$. When substituting a negative, always write parentheses.</li>
<li><strong>Left-to-right slips:</strong> $8-3+2=7$ (go left to right), not $8-5=3$. Same for $\div$ and $\times$.</li>
<li><strong>Flipping the wrong fraction when dividing:</strong> in $\dfrac{a}{b}\div\dfrac{c}{d}$ you flip only the <em>second</em> fraction.</li>
</ul>
</div>

<div class="callout"><span class="co-label">Used later</span>These exact skills power simplifying the difference quotient in $1.3$ (combining fractions over a common denominator and distributing the negative from $f(x+h)-f(x)$), and they appear in every later computation — solving equations, factoring, and evaluating functions.</div>`,
          ws:[
            {part: R`A — Add and subtract fractions (find the LCD)`, items: items(R`$\dfrac{3}{7}+\dfrac{2}{7}$ @@ $\dfrac{5}{6}-\dfrac{1}{6}$ @@ $\dfrac{1}{2}+\dfrac{1}{3}$ @@ $\dfrac{3}{4}-\dfrac{1}{6}$ @@ $\dfrac{5}{8}+\dfrac{1}{12}$ @@ $\dfrac{7}{10}-\dfrac{2}{15}$`)},
            {part: R`B — Multiply, divide, and simplify fractions`, items: items(R`$\dfrac{2}{3}\cdot\dfrac{6}{5}$ @@ $\dfrac{4}{9}\cdot\dfrac{3}{8}$ @@ $\dfrac{3}{4}\div\dfrac{9}{8}$ @@ $\dfrac{5}{6}\div\dfrac{10}{3}$ @@ Simplify $\dfrac{18}{24}$. @@ $\dfrac{2}{3}\div 4$ (write $4$ as $\dfrac{4}{1}$ first).`)},
            {part: R`C — Signed-number arithmetic`, items: items(R`$-7+(-4)$ @@ $-9+15$ @@ $6-(-8)$ @@ $(-3)(-7)$ @@ $\dfrac{-20}{-5}$ @@ $-2+(-5)-(-3)$`)},
            {part: R`D — Distribute the negative sign`, items: items(R`$-(x-9)$ @@ $-(2a+3b-1)$ @@ $5-(x-4)$ @@ $-(3-2y)+7$ @@ Find the error: a student wrote $-(x-6)=-x-6$. Correct it. @@ Simplify $8-(2x+5)-(x-3)$.`)},
            {part: R`E — Order of operations (PEMDAS)`, items: items(R`$8-3+2$ @@ $4+3\cdot 5$ @@ $20\div 4\cdot 2$ @@ $2+3(4-1)^2$ @@ $\dfrac{6+2\cdot 3}{4-1}$ @@ Find the error: a student computed $-3^2=9$. Is that right? Explain. @@ $(-2)^3+5\cdot(-1)$`)},
            {part: R`F — Evaluate by substitution`, items: items(R`Evaluate $2x+5$ when $x=-3$. @@ Evaluate $x^2-4x$ when $x=-2$. @@ Evaluate $\dfrac{a-b}{a+b}$ when $a=2,\ b=-6$. @@ Evaluate $-(x-y)$ when $x=4,\ y=9$. @@ Evaluate $\dfrac{(x+h)^2-x^2}{h}$ when $x=3,\ h=2$ (a preview of the difference quotient).`)}
          ],
          key:[
            {part: R`A — Add and subtract fractions (find the LCD)`, sols: items(R`Same denominator, add tops: $\dfrac{3+2}{7}=\dfrac{5}{7}$. <strong>$\dfrac{5}{7}$</strong> @@ $\dfrac{5-1}{6}=\dfrac{4}{6}=\dfrac{2}{3}$. <strong>$\dfrac{2}{3}$</strong> @@ LCD $=6$: $\dfrac{3}{6}+\dfrac{2}{6}=\dfrac{5}{6}$. <strong>$\dfrac{5}{6}$</strong> @@ LCD $=12$: $\dfrac{9}{12}-\dfrac{2}{12}=\dfrac{7}{12}$. <strong>$\dfrac{7}{12}$</strong> @@ LCD $=24$: $\dfrac{15}{24}+\dfrac{2}{24}=\dfrac{17}{24}$. <strong>$\dfrac{17}{24}$</strong> @@ LCD $=30$: $\dfrac{21}{30}-\dfrac{4}{30}=\dfrac{17}{30}$. <strong>$\dfrac{17}{30}$</strong>`)},
            {part: R`B — Multiply, divide, and simplify fractions`, sols: items(R`Straight across: $\dfrac{2\cdot 6}{3\cdot 5}=\dfrac{12}{15}=\dfrac{4}{5}$. <strong>$\dfrac{4}{5}$</strong> @@ $\dfrac{4\cdot 3}{9\cdot 8}=\dfrac{12}{72}=\dfrac{1}{6}$. <strong>$\dfrac{1}{6}$</strong> @@ Flip the second: $\dfrac{3}{4}\cdot\dfrac{8}{9}=\dfrac{24}{36}=\dfrac{2}{3}$. <strong>$\dfrac{2}{3}$</strong> @@ $\dfrac{5}{6}\cdot\dfrac{3}{10}=\dfrac{15}{60}=\dfrac{1}{4}$. <strong>$\dfrac{1}{4}$</strong> @@ Divide top and bottom by $6$: $\dfrac{18\div 6}{24\div 6}=\dfrac{3}{4}$. <strong>$\dfrac{3}{4}$</strong> @@ $\dfrac{2}{3}\div\dfrac{4}{1}=\dfrac{2}{3}\cdot\dfrac{1}{4}=\dfrac{2}{12}=\dfrac{1}{6}$. <strong>$\dfrac{1}{6}$</strong>`)},
            {part: R`C — Signed-number arithmetic`, sols: items(R`Same sign, add and keep it: <strong>$-11$</strong>. @@ Different signs, subtract $15-9=6$, keep the bigger sign (positive): <strong>$6$</strong>. @@ Subtract becomes add the opposite: $6+8=$ <strong>$14$</strong>. @@ Same signs (both negative) $\to$ positive: <strong>$21$</strong>. @@ Same signs $\to$ positive: $\dfrac{-20}{-5}=$ <strong>$4$</strong>. @@ $-2+(-5)=-7$, then $-7-(-3)=-7+3=$ <strong>$-4$</strong>.`)},
            {part: R`D — Distribute the negative sign`, sols: items(R`Flip every term: <strong>$-x+9$</strong>. @@ Each term changes sign: <strong>$-2a-3b+1$</strong>. @@ $5-(x-4)=5-x+4=$ <strong>$-x+9$</strong> (or $9-x$). @@ $-(3-2y)+7=-3+2y+7=$ <strong>$2y+4$</strong>. @@ Error: only the first term was flipped. The $-6$ must also change sign. Correct: <strong>$-x+6$</strong>. @@ $8-(2x+5)-(x-3)=8-2x-5-x+3=$ <strong>$-3x+6$</strong>.`)},
            {part: R`E — Order of operations (PEMDAS)`, sols: items(R`Left to right: $8-3=5$, then $5+2=$ <strong>$7$</strong>. @@ Multiply first: $3\cdot 5=15$, then $4+15=$ <strong>$19$</strong>. @@ Left to right (M and D equal rank): $20\div 4=5$, then $5\cdot 2=$ <strong>$10$</strong>. @@ Parentheses $4-1=3$, exponent $3^2=9$, times $3$ is $27$, then $2+27=$ <strong>$29$</strong>. @@ Top: $6+2\cdot 3=6+6=12$. Bottom: $4-1=3$. Divide: $\dfrac{12}{3}=$ <strong>$4$</strong>. @@ Not right. Without parentheses the exponent applies only to $3$, so $-3^2=-(3^2)=-9$. It would equal $9$ only if written $(-3)^2$. <strong>$-9$</strong>. @@ $(-2)^3=-8$ and $5\cdot(-1)=-5$, so $-8+(-5)=$ <strong>$-13$</strong>.`)},
            {part: R`F — Evaluate by substitution`, sols: items(R`$2(-3)+5=-6+5=$ <strong>$-1$</strong>. @@ $(-2)^2-4(-2)=4+8=$ <strong>$12$</strong>. @@ $\dfrac{2-(-6)}{2+(-6)}=\dfrac{8}{-4}=$ <strong>$-2$</strong>. @@ $-(4-9)=-(-5)=$ <strong>$5$</strong>. @@ Top: $(3+2)^2-3^2=25-9=16$. Bottom: $h=2$. So $\dfrac{16}{2}=$ <strong>$8$</strong>.`)}
          ]
        },
        {
          id:'0.2', name:'Exponent & Radical Rules',
          blurb: R`The rules that let you combine, simplify, and rewrite powers and roots — including negative, zero, and fractional exponents — and convert freely between radical form like $\sqrt[3]{x}$ and exponent form like $x^{1/3}$.`,
          videos:[
            {rank:1, t:'Properties of Exponents - Algebra 2', ch:'The Organic Chemistry Tutor', id:'etMK3xViMAc', note:'Best first watch — every exponent rule with worked examples.'},
            {rank:2, t:'Practice these skills — interactive drills', ch:'Khan Academy', url:'https://www.khanacademy.org/math/algebra-basics', note:'Drill with instant feedback until the steps feel automatic.'}
          ],
          cs: R`<h4>What an exponent means</h4>
<p>An exponent is a shortcut for repeated multiplication. In $b^n$, the <strong>base</strong> $b$ is the thing being multiplied and the <strong>exponent</strong> $n$ counts how many copies. So $2^3 = 2\cdot 2\cdot 2 = 8$. Every rule below comes from this one idea — if you ever forget a rule, write the base out the long way and count.</p>

<div class="callout formula"><span class="co-label">Formula</span>The exponent rules (assume bases are not zero where needed):
<ul>
<li><strong>Product rule</strong> (same base, multiply): $b^m \cdot b^n = b^{m+n}$ — <em>add</em> the exponents.</li>
<li><strong>Quotient rule</strong> (same base, divide): $\dfrac{b^m}{b^n} = b^{m-n}$ — <em>subtract</em> the exponents.</li>
<li><strong>Power rule</strong> (power of a power): $(b^m)^n = b^{mn}$ — <em>multiply</em> the exponents.</li>
<li><strong>Power of a product</strong>: $(ab)^n = a^n b^n$.</li>
<li><strong>Power of a quotient</strong>: $\left(\dfrac{a}{b}\right)^n = \dfrac{a^n}{b^n}$.</li>
<li><strong>Zero exponent</strong>: $b^0 = 1$ (for $b \ne 0$).</li>
<li><strong>Negative exponent</strong>: $b^{-n} = \dfrac{1}{b^n}$ — a negative exponent means "reciprocal," NOT a negative number.</li>
</ul>
</div>

<h4>Why $b^0 = 1$ and why $b^{-n}$ flips</h4>
<p>Follow the pattern $2^3=8,\ 2^2=4,\ 2^1=2$ — each step divides by $2$. Keep going: $2^0 = 1$, then $2^{-1} = \tfrac12$, then $2^{-2} = \tfrac14$. The quotient rule agrees: $\dfrac{b^2}{b^2} = b^{2-2} = b^0$, and that fraction is also $1$. And $\dfrac{b^2}{b^5} = b^{2-5} = b^{-3}$, which equals $\dfrac{1}{b^3}$.</p>

<h4>Negative exponents: move and flip</h4>
<p>A factor with a negative exponent moves across the fraction bar and the exponent turns positive. $\dfrac{x^{-2}}{1} = \dfrac{1}{x^2}$, and $\dfrac{1}{x^{-2}} = x^2$. Only the factor that carries the negative exponent moves — not the whole expression.</p>

<h4>Radicals and fractional (rational) exponents</h4>
<p>A radical is a root: $\sqrt{x}$ asks "what squared gives $x$," and $\sqrt[n]{x}$ asks "what to the $n$ gives $x$." The number $n$ is the <strong>index</strong> (a plain square root has index $2$). Roots are just fractional exponents.</p>
<div class="callout formula"><span class="co-label">Formula</span>$b^{1/n} = \sqrt[n]{b}$  and  $b^{m/n} = \sqrt[n]{b^{\,m}} = \left(\sqrt[n]{b}\right)^{m}$. <br>Read the fraction as <strong>"root on the bottom, power on the top."</strong> Example: $8^{2/3} = \left(\sqrt[3]{8}\right)^2 = 2^2 = 4$.</div>

<h4>Simplifying a square root</h4>
<p>To simplify $\sqrt{N}$, pull out perfect squares. Factor $N$ so one factor is the largest perfect square you can find, then take its root outside.</p>
<table class="ref"><thead><tr><th>Step</th><th>Example: $\sqrt{72}$</th></tr></thead><tbody>
<tr><td>Find largest perfect-square factor</td><td>$72 = 36 \cdot 2$</td></tr>
<tr><td>Split the radical</td><td>$\sqrt{36}\cdot\sqrt{2}$</td></tr>
<tr><td>Take the perfect-square root out</td><td>$6\sqrt{2}$</td></tr>
</tbody></table>
<p>For variables under a root, divide the exponent by the index: $\sqrt{x^{10}} = x^{5}$ (because $10/2 = 5$), and $\sqrt[3]{x^{12}} = x^{4}$.</p>

<div class="callout"><span class="co-label">Worked example</span>Simplify $\dfrac{(2x^3)^2 \cdot x^{-4}}{x^{0}}$ completely.<br>
Step 1, power of a product on top: $(2x^3)^2 = 2^2 (x^3)^2 = 4x^{6}$.<br>
Step 2, the bottom: $x^0 = 1$, so it disappears.<br>
Step 3, multiply the top: $4x^{6}\cdot x^{-4} = 4x^{6+(-4)} = 4x^{2}$.<br>
Answer: <strong>$4x^2$</strong>.</div>

<div class="callout"><span class="co-label">Worked example</span>Write $\dfrac{1}{\sqrt[3]{x^{2}}}$ as a single power of $x$.<br>
Root on bottom is index $3$, power on top is $2$: $\sqrt[3]{x^2} = x^{2/3}$. The reciprocal flips the sign: $\dfrac{1}{x^{2/3}} = x^{-2/3}$.<br>
Answer: <strong>$x^{-2/3}$</strong>.</div>

<div class="callout warn"><span class="co-label">Common errors</span>
<ul>
<li><strong>Adding exponents when you should multiply.</strong> $(x^3)^2 = x^{6}$, not $x^5$. Power of a power multiplies; only a product of like bases adds.</li>
<li><strong>Treating a negative exponent as a negative number.</strong> $2^{-3} = \tfrac18$, a positive number — not $-8$ and not $-6$.</li>
<li><strong>$b^0 = 0$.</strong> No: any nonzero base to the zero power is $1$.</li>
<li><strong>$x^2 \cdot x^3 = x^6$.</strong> No — same base, so <em>add</em>: $x^{5}$. Multiplying the exponents is the power rule, a different situation.</li>
<li><strong>Splitting a root over a sum.</strong> $\sqrt{a+b} \ne \sqrt{a}+\sqrt{b}$. The product rule $\sqrt{ab}=\sqrt a\sqrt b$ works only for multiplication, never for $+$ or $-$.</li>
<li><strong>Leaving a root unsimplified.</strong> $\sqrt{72}$ is not finished — pull out the perfect square to get $6\sqrt{2}$.</li>
</ul>
</div>

<div class="callout"><span class="co-label">Where this goes next</span>These rules are the engine for <strong>power functions (4.2)</strong> like $f(x)=x^{3/2}$, for <strong>exponential functions (5.1)</strong> where the variable sits in the exponent, and for finding <strong>domains of radical expressions (1.2)</strong>, where you must know that an even root needs a non-negative inside.</div>`,

          key:[
            {part: R`A — Product, quotient, and power rules`, sols: items(R`Same base, add exponents: $x^{5+3} = $ <strong>$x^8$</strong>. @@ Same base, subtract exponents: $y^{9-4} = $ <strong>$y^5$</strong>. @@ Power of a power, multiply: $a^{4\cdot 3} = $ <strong>$a^{12}$</strong>. @@ Apply the exponent to each factor: $2^4 (x^3)^4 = 16 x^{12} = $ <strong>$16x^{12}$</strong>. @@ Numbers: $12/4 = 3$. Then $x^{7-2} = x^5$ and $y^{2-2} = y^0 = 1$. Result: <strong>$3x^5$</strong>. @@ Apply the power to top and bottom: $\dfrac{(a^2)^3}{(b^5)^3} = $ <strong>$\dfrac{a^6}{b^{15}}$</strong>.`)},
            {part: R`B — Zero and negative exponents`, sols: items(R`Any nonzero base to the zero power is $1$: <strong>$1$</strong>. @@ $5^{-2} = \dfrac{1}{5^2} = $ <strong>$\dfrac{1}{25}$</strong>. @@ A negative exponent means reciprocal: <strong>$\dfrac{1}{x^6}$</strong>. @@ Dividing by a negative power flips it up: $\dfrac{1}{x^{-3}} = $ <strong>$x^3$</strong>. @@ Subtract exponents: $x^{2-7} = x^{-5} = $ <strong>$\dfrac{1}{x^5}$</strong>. @@ $(3x^{-2})^{-1} = 3^{-1} x^{(-2)(-1)} = \dfrac{1}{3}x^{2} = $ <strong>$\dfrac{x^2}{3}$</strong>.`)},
            {part: R`C — Radical ⇄ exponent form`, sols: items(R`Index $5$ becomes denominator: <strong>$x^{1/5}$</strong>. @@ Power $2$ on top, root $3$ on bottom: <strong>$x^{2/3}$</strong>. @@ Denominator $4$ is the index: <strong>$\sqrt[4]{x}$</strong>. @@ Top is the power, bottom is the root: <strong>$\sqrt{x^{3}}$</strong> (also written $\left(\sqrt{x}\right)^3$). @@ $\dfrac{1}{\sqrt{x}} = \dfrac{1}{x^{1/2}} = $ <strong>$x^{-1/2}$</strong>.`)},

            {part: R`F — Find the error / concept check`, sols: items(R`The student multiplied the exponents, but multiplying like bases means you <em>add</em> them: $x^{4+3}$. Correct answer: <strong>$x^7$</strong>. @@ This is a power of a power, so you <em>multiply</em> the exponents (the student added): $x^{2\cdot 5}$. Correct answer: <strong>$x^{10}$</strong>. @@ A negative exponent means reciprocal, not a negative number: $2^{-3} = \dfrac{1}{2^3} = \dfrac{1}{8}$. Correct answer: <strong>$\dfrac{1}{8}$</strong>. @@ You cannot split a root over addition: $\sqrt{a+b} \ne \sqrt a + \sqrt b$. You must add inside first: $\sqrt{9+16} = \sqrt{25} = $ <strong>$5$</strong>. @@ False. $72 = 36\cdot 2$ contains the perfect square $36$, so it simplifies to <strong>$6\sqrt{2}$</strong>; it is not yet fully simplified.`)}

          id:'0.3', name:'Factoring & Simplifying Expressions',
          blurb: R`Expand and combine like terms, then reverse the process: pull out a GCF, factor $x^2+bx+c$ and $ax^2+bx+c$, recognize a difference of squares, and use factoring to simplify rational expressions.`,
          videos:[
            {rank:1, t:'Factoring Trinomials & Polynomials, Basic Introduction - Algebra', ch:'The Organic Chemistry Tutor', id:'9MUDAr1PnlE', note:'Best first watch — factoring trinomials and polynomials from the basics.'},

          ],
          cs: R`<![CDATA[<h4>Two directions: expanding vs. factoring</h4>
<p><strong>Expanding</strong> turns a product into a sum: $2(x+3)=2x+6$. <strong>Factoring</strong> goes backward, turning a sum into a product: $2x+6=2(x+3)$. Factoring is the engine behind finding zeros, simplifying fractions, and completing the square, so it is worth getting fluent.</p>

<h4>Distributing (expanding)</h4>
<p>Multiply the outside term by <em>every</em> term inside the parentheses. With two binomials, use <strong>FOIL</strong> (First, Outer, Inner, Last) — it is just distribution done twice.</p>
<div class="callout formula"><span class="co-label">Formula</span>$(a+b)(c+d)=ac+ad+bc+bd$. Squaring a binomial: $(a+b)^2=a^2+2ab+b^2$ and $(a-b)^2=a^2-2ab+b^2$. The middle term $2ab$ is the one people forget.</div>
<p>Example: $(x+4)^2=x^2+2(x)(4)+4^2=x^2+8x+16$. It is <em>not</em> $x^2+16$.</p>

<h4>Combining like terms</h4>
<p>Like terms have the <em>same variable to the same power</em>. Add their coefficients; leave the variable part unchanged. $5x+3x=8x$, and $x^2$ and $x$ are <strong>not</strong> like terms, so $x^2+x$ does not combine.</p>

<h4>Factoring out a GCF (always do this first)</h4>
<p>The <strong>greatest common factor</strong> is the largest number and lowest power of each variable shared by every term. Pull it out front; what remains goes in parentheses. Check by re-distributing.</p>
<p>Example: $6x^3+9x^2=3x^2(2x+3)$, since $3x^2$ divides both terms.</p>

<h4>Factoring $x^2+bx+c$</h4>
<p>Find two numbers that <strong>multiply to $c$</strong> and <strong>add to $b$</strong>. Then $x^2+bx+c=(x+m)(x+n)$ where $m\cdot n=c$ and $m+n=b$.</p>
<p>Example: $x^2+7x+12$. Need product $12$, sum $7$: that is $3$ and $4$. So $x^2+7x+12=(x+3)(x+4)$.</p>
<div class="callout"><span class="co-label">Sign tips</span>If $c>0$ the two numbers share the sign of $b$. If $c<0$ they have opposite signs (the bigger one matches the sign of $b$).</div>

<h4>Factoring $ax^2+bx+c$ (the AC method)</h4>
<ul><li>Multiply $a\cdot c$.</li><li>Find two numbers that multiply to $a\cdot c$ and add to $b$.</li><li>Split the middle term using those numbers, then factor by grouping.</li></ul>
<p>Example: $2x^2+7x+3$. Here $a\cdot c=6$, and $6$ and $1$ multiply to $6$, add to $7$. Split: $2x^2+6x+1x+3=2x(x+3)+1(x+3)=(x+3)(2x+1)$.</p>

<h4>Difference of squares</h4>
<div class="callout formula"><span class="co-label">Formula</span>$a^2-b^2=(a+b)(a-b)$. Example: $x^2-25=(x+5)(x-5)$. A <em>sum</em> of squares $a^2+b^2$ does NOT factor over the reals.</div>

<h4>Simplifying rational expressions</h4>
<p>Factor the top and bottom completely, then cancel any factor that appears in both. You may only cancel <strong>factors</strong> (things multiplied), never individual terms.</p>
<p>Example: $\dfrac{x^2-9}{x^2+x-6}=\dfrac{(x+3)(x-3)}{(x+3)(x-2)}=\dfrac{x-3}{x-2}$.</p>

<table class="ref"><thead><tr><th>Pattern</th><th>Factored form</th></tr></thead><tbody>
<tr><td>$ka+kb$</td><td>$k(a+b)$ (GCF)</td></tr>
<tr><td>$x^2+bx+c$</td><td>$(x+m)(x+n)$, $mn=c$, $m+n=b$</td></tr>
<tr><td>$a^2-b^2$</td><td>$(a+b)(a-b)$</td></tr>
<tr><td>$a^2+2ab+b^2$</td><td>$(a+b)^2$</td></tr>
</tbody></table>

<div class="callout warn"><span class="co-label">Common errors</span><ul><li>$(x+4)^2\ne x^2+16$. You must include the middle term: $x^2+8x+16$.</li><li>Forgetting to factor out the GCF first, which makes the rest harder or impossible.</li><li>Cancelling terms instead of factors: $\dfrac{x+3}{x}\ne 3$. You can only cancel a full factor that multiplies the whole top and bottom.</li><li>$x^2+9$ does not factor (sum of squares). Only a <em>difference</em> of squares factors.</li><li>Sign slips: $x^2-5x+6=(x-2)(x-3)$, not $(x+2)(x+3)$.</li></ul></div>

<div class="callout"><span class="co-label">Used later</span>Factoring is how you find zeros of polynomials (1.2) and identify domain restrictions of rational functions (4.3, 4.4); recognizing perfect-square patterns sets up completing the square (4.1).</div>]]>`,

            {part: R`A — Distribute and expand`, sols: items(R`Multiply each inside term by $3$: $3\cdot 2x - 3\cdot 5$. <strong>$6x-15$</strong> @@ Distribute the $-2$ to both terms: <strong>$-8x-14$</strong> @@ First $x\cdot x=x^2$, Outer $x\cdot 2=2x$, Inner $5\cdot x=5x$, Last $5\cdot 2=10$; combine the middle: <strong>$x^2+7x+10$</strong> @@ $2x\cdot x=2x^2$, $2x\cdot 4=8x$, $-3\cdot x=-3x$, $-3\cdot 4=-12$; combine: <strong>$2x^2+5x-12$</strong> @@ $(x+6)^2=x^2+2(x)(6)+36$. <strong>$x^2+12x+36$</strong> (do not forget the middle term) @@ $(3x-2)^2=(3x)^2-2(3x)(2)+2^2=9x^2-12x+4$. <strong>$9x^2-12x+4$</strong>`)},
            {part: R`B — Combine like terms`, sols: items(R`All are like terms: $7+4-2=9$. <strong>$9x$</strong> @@ $x^2$ terms: $5-1=4$, giving $4x^2$; $x$ terms: $3+8=11$, giving $11x$. <strong>$4x^2+11x$</strong> @@ Variables: $4a-a=3a$; constants: $9+2-6=5$. <strong>$3a+5$</strong> @@ Distribute: $2x+6+4x-4$; combine: $6x+2$. <strong>$6x+2$</strong> @@ $x^2$ and $x$ are <strong>not like terms</strong> (different powers), so they cannot be combined into a single term, and you never add exponents when adding. The expression $x^2+x$ is already simplified. <strong>$x^2+x$</strong>`)},
            {part: R`C — Factor out the GCF`, sols: items(R`GCF of $6$ and $15$ is $3$: $6x+15=3(2x+5)$. <strong>$3(2x+5)$</strong> @@ GCF is $4x$: $8x^2-12x=4x(2x-3)$. <strong>$4x(2x-3)$</strong> @@ GCF is $5x^2$: $10x^3+25x^2=5x^2(2x+5)$. <strong>$5x^2(2x+5)$</strong> @@ GCF is $3ab$: $9a^2b-6ab^2=3ab(3a-2b)$. <strong>$3ab(3a-2b)$</strong> @@ The student only pulled the $4$ out of the first term, not the $x$. Both terms share $4x$. Correct: <strong>$4x(x+2)$</strong> (check: $4x\cdot x=4x^2$, $4x\cdot 2=8x$)`)},
            {part: R`D — Factor $x^2+bx+c$`, sols: items(R`Product $10$, sum $7$: $2$ and $5$. <strong>$(x+2)(x+5)$</strong> @@ Product $20$, sum $9$: $4$ and $5$. <strong>$(x+4)(x+5)$</strong> @@ Product $6$, sum $-5$: $-2$ and $-3$. <strong>$(x-2)(x-3)$</strong> @@ Product $-15$, sum $2$: $5$ and $-3$. <strong>$(x+5)(x-3)$</strong> @@ Product $-12$, sum $-1$: $3$ and $-4$. <strong>$(x+3)(x-4)$</strong> @@ Expanding $(x+2)(x+3)=x^2+5x+6$ — the middle term has the wrong sign. We need product $6$, sum $-5$, which is $-2$ and $-3$. Correct: <strong>$(x-2)(x-3)$</strong>`)},
            {part: R`E — Factor $ax^2+bx+c$ and difference of squares`, sols: items(R`Difference of squares with $a=x$, $b=7$: <strong>$(x+7)(x-7)$</strong> @@ $9x^2=(3x)^2$ and $16=4^2$: <strong>$(3x+4)(3x-4)$</strong> @@ AC method: $a\cdot c=6$, need two numbers multiplying to $6$, adding to $7$: $6$ and $1$. Split: $2x^2+6x+x+3=2x(x+3)+1(x+3)$. <strong>$(x+3)(2x+1)$</strong> @@ $a\cdot c=24$, need product $24$, sum $10$: $6$ and $4$. Split: $3x^2+6x+4x+8=3x(x+2)+4(x+2)$. <strong>$(x+2)(3x+4)$</strong> @@ GCF first: $2x^2-18=2(x^2-9)$; then difference of squares: $2(x+3)(x-3)$. <strong>$2(x+3)(x-3)$</strong> @@ No. $x^2+25$ is a <strong>sum</strong> of squares, not a difference, and a sum of squares does not factor over the real numbers. <strong>It does not factor (it is prime over the reals).</strong>`)},
            {part: R`F — Simplify rational expressions`, sols: items(R`Factor the top: $\dfrac{6x+12}{3}=\dfrac{6(x+2)}{3}=2(x+2)$, or distribute: $2x+4$. <strong>$2x+4$</strong> @@ Top is a difference of squares: $\dfrac{(x+4)(x-4)}{x+4}$; cancel $(x+4)$. <strong>$x-4$</strong> (for $x\ne -4$) @@ $\dfrac{(x+2)(x+3)}{(x+3)(x-3)}$; cancel $(x+3)$. <strong>$\dfrac{x+2}{x-3}$</strong> @@ Factor: $\dfrac{2x(x+4)}{(x+4)(x-3)}$; cancel $(x+4)$. <strong>$\dfrac{2x}{x-3}$</strong> @@ You may only cancel <strong>factors</strong> (things multiplied across the whole top and bottom), and here $x$ is added to $4$, not multiplied by the whole numerator. So the $x$ does not cancel and $\dfrac{x+4}{x}$ is already simplified. <strong>The simplification is invalid; $\dfrac{x+4}{x}$ cannot be reduced.</strong>`)}

        {
          id:'0.4', name:'Solving Equations',
          blurb: R`Isolate the unknown: solve linear equations (even with fractions), rearrange literal equations for any variable, and crack quadratics by factoring, square roots, and the quadratic formula — always checking your answer.`,
          videos:[
            {rank:1, t:'Solving Quadratic Equations Using The Quadratic Formula & By Factoring - Algebra 2', ch:'The Organic Chemistry Tutor', id:'qwpxeaz2GBI', note:'Best first watch — the quadratic formula and solving, step by step.'},
            {rank:2, t:'Practice these skills — interactive drills', ch:'Khan Academy', url:'https://www.khanacademy.org/math/algebra-basics', note:'Drill with instant feedback until the steps feel automatic.'}
          ],
          cs: R`<h4>What "solving" means</h4>
<p>To <strong>solve</strong> an equation is to find every value of the variable that makes the two sides equal. The golden rule: <em>whatever you do to one side, do to the other</em>. Legal moves are add, subtract, multiply, or divide both sides by the same thing (never divide by zero).</p>
<div class="callout"><span class="co-label">Always check</span>Substitute your answer back into the <em>original</em> equation. If both sides come out equal, you are done. This one habit catches almost every arithmetic slip.</div>

<h4>Linear equations</h4>
<p>A linear equation has the variable to the first power only. Strategy: clear fractions, expand brackets, collect the variable on one side and numbers on the other, then divide.</p>
<ul>
<li><strong>Clear fractions first.</strong> Multiply <em>every term</em> by the least common denominator (LCD). This turns a messy fraction equation into a clean one.</li>
<li>Watch the sign when you move a term across the equals sign — moving it flips its sign.</li>
</ul>
<div class="callout formula"><span class="co-label">Formula</span>Three outcomes: a normal equation gives <strong>one solution</strong> (e.g. $x=5$); an always-true result like $7=7$ means <strong>all real numbers</strong>; a false result like $3=8$ means <strong>no solution</strong>.</div>

<h4>Literal equations (solve for a letter)</h4>
<p>Same rules, but the answer is an expression instead of a number. Treat the variable you want as "the unknown" and treat every other letter as if it were just a number. Isolate it the same way you would isolate $x$.</p>
<p>Example: solve $A=\tfrac12 bh$ for $h$. Multiply both sides by 2: $2A=bh$. Divide by $b$: $h=\dfrac{2A}{b}$.</p>

<h4>Quadratic equations — three methods</h4>
<p>A quadratic has the form $ax^2+bx+c=0$ (with $a\neq 0$). First get one side equal to zero. Then pick the easiest method.</p>
<table class="ref"><thead><tr><th>Method</th><th>Use it when</th></tr></thead><tbody>
<tr><td>Factoring + Zero-Product</td><td>The quadratic factors nicely</td></tr>
<tr><td>Square-root method</td><td>There is no middle ($bx$) term: $x^2=k$ or $(x-h)^2=k$</td></tr>
<tr><td>Quadratic formula</td><td>Always works — your safety net</td></tr>
</tbody></table>
<div class="callout formula"><span class="co-label">Formula</span><strong>Zero-Product Property:</strong> if $A\cdot B=0$ then $A=0$ or $B=0$.<br><strong>Square root:</strong> if $x^2=k$ then $x=\pm\sqrt{k}$ (do not forget the $\pm$).<br><strong>Quadratic formula:</strong> for $ax^2+bx+c=0$, $\;x=\dfrac{-b\pm\sqrt{b^2-4ac}}{2a}$.</div>
<p>The piece under the root, $b^2-4ac$, is the <strong>discriminant</strong>. Positive gives two real solutions, zero gives one (repeated), negative gives no real solutions.</p>
<p><strong>Completing the square (brief idea):</strong> rewrite $x^2+bx$ as a perfect square by adding $\left(\tfrac{b}{2}\right)^2$ to both sides, then use the square-root method. For $x^2+6x=7$: add $\left(\tfrac{6}{2}\right)^2=9$ to both sides to get $(x+3)^2=16$, so $x+3=\pm4$, giving $x=1$ or $x=-7$. This is also where the quadratic formula comes from.</p>

<h4>Fully worked example (quadratic formula)</h4>
<p>Solve $2x^2+x-6=0$.</p>
<ul>
<li>Identify $a=2,\;b=1,\;c=-6$.</li>
<li>Discriminant: $b^2-4ac=(1)^2-4(2)(-6)=1+48=49$.</li>
<li>$x=\dfrac{-1\pm\sqrt{49}}{2(2)}=\dfrac{-1\pm7}{4}$.</li>
<li>Two answers: $x=\dfrac{-1+7}{4}=\dfrac{6}{4}=\dfrac{3}{2}$ and $x=\dfrac{-1-7}{4}=\dfrac{-8}{4}=-2$.</li>
<li><strong>Check $x=-2$:</strong> $2(-2)^2+(-2)-6=8-2-6=0$. True. <strong>Solutions: $x=\tfrac32$ or $x=-2$.</strong></li>
</ul>

<div class="callout warn"><span class="co-label">Common errors</span>
<ul>
<li>Forgetting the $\pm$ in the square-root method — you lose half your answers.</li>
<li>Dividing by a variable. Never divide $x^2=4x$ by $x$ (you would lose the solution $x=0$). Instead move everything to one side: $x^2-4x=0$, factor to $x(x-4)=0$.</li>
<li>When clearing fractions, multiplying only <em>some</em> terms by the LCD. Every term gets multiplied.</li>
<li>Sign slips in $-b$ and in $-4ac$ when $c$ is negative: $-4(2)(-6)=+48$, not $-48$.</li>
<li>Trying to factor or square-root a quadratic that still has a nonzero side. Get it to $=0$ (for factoring) or isolate the squared term (for square roots) first.</li>
</ul>
</div>

<div class="callout"><span class="co-label">Where this leads</span>Solving equations is the engine for the rest of the course: solving $f(x)=k$ is just an equation in $x$; finding the <em>zeros</em> (x-intercepts) of a function means solving $f(x)=0$; and finding an <em>inverse</em> means solving $y=f(x)$ for $x$. Master this and those later topics become routine.</div>`,

          cs: R`<h4>What a function is</h4>
<p>A <strong>function</strong> assigns to each input <em>exactly one</em> output. The inputs form the <strong>domain</strong>; the outputs form the <strong>range</strong>. The mental model: an input goes into a machine and one output comes out.</p>
<div class="callout"><span class="co-label">The Rule of Four</span>One function has four faces — <strong>words, table, graph, formula</strong> — and the central skill of the course is translating among them. The same function can appear as the rule "two dollars per item plus a five-dollar fee," the formula $C(n)=2n+5$, the table $(0,5),(1,7),(2,9)$, and a line of slope $2$ with vertical intercept $5$.</div>
<h4>Is it a function? Three tests</h4>
<table class="ref"><thead><tr><th>Given as</th><th>It is a function exactly when…</th></tr></thead><tbody>
<tr><td>Ordered pairs / table</td><td>no input repeats with a <em>different</em> output</td></tr>
<tr><td>A graph</td><td>every vertical line meets it at most once (Vertical Line Test)</td></tr>
<tr><td>An equation</td><td>solving for $y$ gives one $y$ per $x$ — e.g. $y^2=x$ fails</td></tr>
</tbody></table>
<p>The same output may come from two different inputs; that is allowed. One input giving two different outputs is fatal.</p>
<h4>Function notation</h4>
<p>$f(x)$ means "the output of $f$ at input $x$." It is <strong>not</strong> multiplication.</p>
<ul>
<li><strong>At a number:</strong> substitute. If $f(x)=x^2-3x$, then $f(4)=16-12=4$.</li>
<li><strong>At an expression:</strong> replace <em>every</em> $x$ with the whole expression in parentheses, so $f(a+h)=(a+h)^2-3(a+h)$.</li>
<li><strong>Solve</strong> $f(x)=k$: set the formula equal to $k$ and solve for $x$.</li>
<li><strong>Interpret:</strong> in a model $P=f(t)$, the statement $f(5)=200$ means "at input $5$ the output is $200$," stated with units.</li>
</ul>

          cs: R`<h4>The idea</h4>
<p>The <strong>domain</strong> is every allowable input $x$; the <strong>range</strong> is every resulting output $y$.</p>
<h4>Domain from a formula — only three things can break</h4>
<table class="ref"><thead><tr><th>Issue</th><th>Requirement</th></tr></thead><tbody>
<tr><td>Division by zero</td><td>denominator $\neq 0$</td></tr>
<tr><td>Even root of a negative ($\sqrt{\ },\ \sqrt[4]{\ }$)</td><td>inside $\ge 0$</td></tr>
<tr><td>Log of a non-positive ($\log,\ \ln$)</td><td>inside $> 0$ (used later)</td></tr>
</tbody></table>
<p>If none is present — a polynomial, $\sin x$, $\cos x$ — the domain is all reals, $(-\infty,\infty)$. With two issues at once, take the <em>overlap</em>. A square root in a denominator needs the inside strictly $>0$.</p>
<h4>Domain & range from a graph</h4>
<p>Domain is the graph's shadow on the horizontal axis (sweep left to right); range is its shadow on the vertical axis (sweep bottom to top). An <strong>open circle</strong> excludes (parenthesis); a <strong>closed dot</strong> includes (bracket); an <strong>arrow</strong> continues to $\pm\infty$.</p>
<div class="callout formula"><span class="co-label">Interval notation</span>$(a,b)$ excludes ends, $[a,b]$ includes, mixes allowed. Join pieces with $\cup$. $\infty$ and $-\infty$ always take parentheses. "All reals except $2$" $=(-\infty,2)\cup(2,\infty)$.</div>
<div class="callout"><span class="co-label">Parent domains to memorize</span>Polynomials, $\sin x$, $\cos x$: all reals. $1/x$: $x\neq0$. $\sqrt{x}$: $x\ge0$. $\ln x$: $x>0$.</div>
<p><strong>Worked example.</strong> $f(x)=\dfrac{\sqrt{x+2}}{x-3}$: the root needs $x\ge-2$, the denominator needs $x\neq3$, so the domain is $[-2,3)\cup(3,\infty)$.</p>

          ],
          cs: R`<h4>Average rate of change</h4>
<div class="callout formula"><span class="co-label">Definition</span>Over $[a,b]$, $\ \text{AROC}=\dfrac{\Delta y}{\Delta x}=\dfrac{f(b)-f(a)}{b-a}.$ It answers: on average, how many output units per input unit did $f$ change? Always carry units.</div>
<p><strong>Geometric meaning:</strong> it is the slope of the <strong>secant line</strong> through $(a,f(a))$ and $(b,f(b))$.</p>
<p><strong>From a table:</strong> pick the two rows and apply the formula. <strong>Linearity test:</strong> for <em>equally spaced</em> inputs, a constant AROC (equal first differences) means the function is linear and that constant is the slope; if the AROC changes, it is curved. Two matching intervals only <em>suggest</em> linearity — one constant AROC across <em>every</em> interval is what proves it.</p>
<h4>The difference quotient</h4>
<div class="callout formula"><span class="co-label">Formula</span>Over $[x,x+h]$: $\ \dfrac{f(x+h)-f(x)}{h}.$ Simplify to a formula in $x$ and $h$. Calculus shrinks $h\to0$ to get the <strong>derivative</strong>.</div>
<p><strong>Worked example.</strong> For $f(x)=x^2$: $\dfrac{(x+h)^2-x^2}{h}=\dfrac{2xh+h^2}{h}=2x+h$; as $h\to0$ this becomes $2x$.</p>
<p><strong>Sign:</strong> positive means it rose on average; negative means it fell; zero means equal endpoints (no net change), though it may have moved in between.</p>
<div class="callout warn"><span class="co-label">Common errors</span>Averaging the $y$-values instead of $\Delta y/\Delta x$. Reversing order — keep "later minus earlier" top and bottom. In the difference quotient, distribute the minus across <em>all</em> of $f(x)$.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>This is the derivative in embryo: secant becomes tangent, average rate becomes instantaneous rate. Everything in Calculus 1 grows from here.</div>`,

          ],
          cs: R`<h4>Piecewise functions</h4>
<p>A different rule on different parts of the domain. <strong>Evaluate:</strong> find which condition the input meets, use that piece. <strong>Graph:</strong> draw each piece only over its interval; <strong>open circle</strong> excludes an endpoint, <strong>closed dot</strong> includes it.</p>
<h4>Symmetry</h4>
<table class="ref"><thead><tr><th>Type</th><th>Test</th><th>Symmetric about</th><th>Examples</th></tr></thead><tbody>
<tr><td>Even</td><td>$f(-x)=f(x)$</td><td>the vertical axis</td><td>$x^2,\ |x|,\ \cos x$</td></tr>
<tr><td>Odd</td><td>$f(-x)=-f(x)$</td><td>the origin</td><td>$x^3,\ x,\ \sin x$</td></tr>
<tr><td>Neither</td><td>matches neither</td><td>—</td><td>$x^2+x,\ x^3+1$</td></tr>
</tbody></table>
<p>Test by computing the general $f(-x)$ and comparing to $f(x)$ and $-f(x)$ — not by plugging in one number.</p>
<h4>Increasing / decreasing & extrema</h4>
<p>Read left to right: rising is increasing, falling is decreasing, flat is constant — reported as intervals of $x$. A <strong>local maximum</strong> is a peak and a <strong>local minimum</strong> a valley; they occur where the function switches between increasing and decreasing. The <em>value</em> is the output ($y$); the <em>location</em> is the input ($x$).</p>
<h4>Concavity</h4>
<p><strong>Concave up</strong> bends up like a cup (slopes increasing); <strong>concave down</strong> bends down like a cap (slopes decreasing); an <strong>inflection point</strong> is where concavity switches. It is independent of increasing/decreasing — a function can be increasing while concave down (rising but leveling off).</p>
<p><strong>Worked example.</strong> $f(x)=x^3+x$: $f(-x)=-x^3-x=-(x^3+x)=-f(x)$, so $f$ is <strong>odd</strong>.</p>
<div class="callout warn"><span class="co-label">Common errors</span>Forgetting open/closed dots at boundaries; confusing "increasing" (slope) with "concave up" (change in slope); giving a max/min location when the value is asked.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>Increasing/decreasing ↔ sign of the first derivative; concavity ↔ sign of the second derivative; local extrema ↔ critical points. You learn to read by eye what calculus computes exactly.</div>`,

          ],
          cs: R`<h4>What makes a function linear</h4>
<p>A <strong>linear function</strong> changes at a <em>constant rate</em>. Its formula is $f(x)=mx+b$, where $m$ is the <strong>slope</strong> (the rate of change) and $b$ is the <strong>vertical intercept</strong> (the output when $x=0$).</p>
<div class="callout formula"><span class="co-label">Slope</span>$m=\dfrac{\Delta y}{\Delta x}=\dfrac{\text{rise}}{\text{run}}=\dfrac{y_2-y_1}{x_2-x_1}.$ It is the same between <em>every</em> pair of points on the line.</div>
<h4>Spotting linearity</h4>
<table class="ref"><thead><tr><th>Representation</th><th>Linear when…</th></tr></thead><tbody>
<tr><td>Table</td><td>equal steps in $x$ give equal jumps in $y$ (constant first differences)</td></tr>
<tr><td>Graph</td><td>the points lie on a straight line</td></tr>
<tr><td>Formula</td><td>$x$ appears only to the first power, as $mx+b$</td></tr>
</tbody></table>
<h4>Reading the slope</h4>
<table class="ref"><thead><tr><th>Slope</th><th>Line</th></tr></thead><tbody>
<tr><td>$m>0$</td><td>increasing (rises left to right)</td></tr>
<tr><td>$m<0$</td><td>decreasing (falls)</td></tr>
<tr><td>$m=0$</td><td>horizontal, $y=b$</td></tr>
<tr><td>undefined</td><td>vertical, $x=a$</td></tr>
</tbody></table>
<div class="callout"><span class="co-label">Interpreting slope in context</span>The slope carries units of <em>output per input</em> — "30 dollars per month," "0.04 gallons used per mile." The intercept is the starting value, at $x=0$.</div>
<div class="callout warn"><span class="co-label">Common errors</span>Flipping the slope formula to $\dfrac{x_2-x_1}{y_2-y_1}$. Calling a horizontal line's slope "undefined" — it is $0$; only a <em>vertical</em> line has undefined slope.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>A linear function's average rate of change equals its slope on every interval — the one function whose instantaneous rate (derivative) is constant.</div>`,

          cs: R`<h4>Three forms of a line</h4>
<table class="ref"><thead><tr><th>Form</th><th>Equation</th><th>Use when you know…</th></tr></thead><tbody>
<tr><td>Slope-intercept</td><td>$y=mx+b$</td><td>the slope and the $y$-intercept</td></tr>
<tr><td>Point-slope</td><td>$y-y_1=m(x-x_1)$</td><td>the slope and any one point</td></tr>
<tr><td>Standard</td><td>$Ax+By=C$</td><td>you want integer coefficients or intercepts</td></tr>
</tbody></table>
<h4>Building the equation</h4>
<ul>
<li><strong>Slope + point:</strong> drop into point-slope, then simplify to $y=mx+b$.</li>
<li><strong>Two points:</strong> find $m=\dfrac{y_2-y_1}{x_2-x_1}$ first, then use point-slope with either point.</li>
<li><strong>From a table:</strong> $m$ is the constant jump per unit step; $b$ is the value at $x=0$.</li>
</ul>
<div class="callout formula"><span class="co-label">Parallel and perpendicular</span><strong>Parallel</strong> lines have <em>equal</em> slopes: $m_1=m_2$. <strong>Perpendicular</strong> lines have slopes that are <em>negative reciprocals</em>: $m_1 m_2=-1$, so $m_2=-\dfrac{1}{m_1}$.</div>
<h4>Special lines</h4>
<p><strong>Horizontal:</strong> $y=b$ (slope $0$). <strong>Vertical:</strong> $x=a$ (undefined slope — not a function).</p>
<div class="callout warn"><span class="co-label">Common errors</span>Plugging a point in as $(x,y)$ instead of $(x_1,y_1)$ in point-slope. Swapping the rules — equal slopes are parallel; negative reciprocals are perpendicular.</div>

          ],
          cs: R`<h4>Scatter plots and correlation</h4>
<p>A <strong>scatter plot</strong> shows paired data as points. The <strong>correlation</strong> describes the pattern: its <em>direction</em> (positive — rising; negative — falling; or none) and its <em>strength</em> (how tightly the points hug a line).</p>
<div class="callout formula"><span class="co-label">Correlation coefficient</span>$r$ runs from $-1$ to $1$. Near $\pm1$ means a strong linear pattern; near $0$ means little or no linear relationship. The sign gives the direction; strength is judged by $|r|$.</div>
<h4>Line of best fit</h4>
<p>The <strong>line of best fit</strong> (least-squares regression line) is the straight line $y=mx+b$ closest to all the points — it minimizes the total squared vertical distance. Use it as a model: read its slope (a rate) and intercept (a starting value), and substitute an $x$ to <strong>predict</strong>.</p>
<table class="ref"><thead><tr><th>Predicting…</th><th>Name</th><th>Reliability</th></tr></thead><tbody>
<tr><td>inside the data's $x$-range</td><td>interpolation</td><td>usually reliable</td></tr>
<tr><td>outside the data's $x$-range</td><td>extrapolation</td><td>risky — the trend may not continue</td></tr>
</tbody></table>
<div class="callout warn"><span class="co-label">Correlation is not causation</span>A strong $r$ does not mean one variable causes the other — a hidden third variable can drive both (ice-cream sales and drownings both rise with summer heat).</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>Least-squares fitting minimizes a sum of squared errors — a first taste of optimization, which calculus solves by setting a derivative to zero.</div>`,

            {part: R`From real data: lines of best fit, correlation, and prediction`, items: items(R`A campus coffee cart records the outside high temperature (in degrees Fahrenheit) and how many iced coffees it sells on six different mornings:<br>$$\begin{array}{c|cccccc} \text{Temp } x \;(^\circ F) & 55 & 60 & 68 & 72 & 80 & 85 \\ \hline \text{Iced coffees } y & 18 & 24 & 31 & 35 & 44 & 50 \end{array}$$<br>A statistics app reports the line of best fit as $\hat{y} = 1.05x - 39$, where $x$ is temperature in degrees Fahrenheit and $\hat{y}$ is the predicted number of iced coffees sold.<br>(a) Interpret the slope $1.05$ with correct units in this context.<br>(b) The model gives a $y$-intercept of $-39$. Explain what this number would mean literally, and why it does NOT make sense as a real prediction here. @@ Using the same coffee-cart model $\hat{y} = 1.05x - 39$ (with $x$ = outside high temperature in degrees Fahrenheit and $\hat{y}$ = predicted iced coffees sold), and the recorded data:<br>$$\begin{array}{c|cccccc} \text{Temp } x \;(^\circ F) & 55 & 60 & 68 & 72 & 80 & 85 \\ \hline \text{Iced coffees } y & 18 & 24 & 31 & 35 & 44 & 50 \end{array}$$<br>(a) On the $72$-degree morning the cart actually sold $35$ iced coffees. Compute the predicted value $\hat{y}$ at $x = 72$, then find the residual (observed minus predicted).<br>(b) Was the model's prediction too high or too low for that morning? Explain how you can tell from the sign of the residual. @@ A study tracks how many hours per week each of seven students spends on social media ($x$) and their reported number of hours of sleep per night ($y$):<br>$$\begin{array}{c|ccccccc} x \;(\text{hr/week}) & 5 & 8 & 12 & 15 & 20 & 25 & 30 \\ \hline y \;(\text{hr/night}) & 8.4 & 8.0 & 7.5 & 7.1 & 6.6 & 6.0 & 5.5 \end{array}$$<br>The line of best fit is $\hat{y} = -0.11x + 8.9$, where $x$ is social-media hours per week and $\hat{y}$ is predicted hours of sleep per night.<br>(a) Interpret the slope $-0.11$ with correct units             {part: R`From real data: lines of best fit, correlation, and prediction`, sols: items(R`(a) The slope is $1.05$ iced coffees per degree Fahrenheit. It means that for each additional $1^\circ F$ of outside high temperature, the model predicts about $1.05$ more iced coffees sold that morning. <strong>Slope $= 1.05$ iced coffees sold per degree Fahrenheit; warmer mornings predict more iced coffee sales (about one extra cup per degree).</strong><br>(b) The $y$-intercept $-39$ is the predicted number of iced coffees when $x = 0$, i.e. on a morning with an outside high of $0^\circ F$. Literally it predicts selling $-39$ iced coffees, which is impossible (you cannot sell a negative number of cups), and $0^\circ F$ is also far outside the recorded temperatures of $55$ to $85$ degrees, so the intercept is not a meaningful real-world prediction here. <strong>The intercept would mean $-39$ iced coffees sold at $0^\circ F$; it is meaningless because sales cannot be negative and $0^\circ F$ is far outside the data range.</strong> @@ (a) Predicted value: $\hat{y} = 1.05(72) - 39 = 75.6 - 39 = 36.6$ iced coffees. The observed value is $35$ iced coffees, so the residual is<br>$$\text{residual} = \text{observed} - \text{predicted} = 35 - 36.6 = -1.6 \text{ iced coffees.}$$<br><strong>$\hat{y} = 36.6$ iced coffees; residual $= 35 - 36.6 = -1.6$ iced coffees.</strong><br>(b) The residual is negative, which means the observed sales ($35$) were lower than the model predicted ($36.6$). A negative residual (observed below predicted) tells us the model overestimated sales that morning, so the prediction was slightly too high. <strong>The prediction was too high; the negative residual means the actual sales fell below the predicted line.</strong> @@ (a) The slope is $-0.11$ hours of sleep per hour of social media per week. It means that for each additional $1$ hour per week spent on social media, the model predicts about $0.11$ fewer hours of sleep per night. <strong>Slope $= -0           videos:[

          ],
          cs: R`<h4>The parent-function library</h4>
<p>Every transformation starts from a known basic shape. Memorize these.</p>
<table class="ref"><thead><tr><th>Parent</th><th>Shape</th><th>Anchor points</th><th>Domain</th></tr></thead><tbody>
<tr><td>$f(x)=x$</td><td>line through the origin</td><td>$(-1,-1),(0,0),(1,1)$</td><td>$(-\infty,\infty)$</td></tr>
<tr><td>$f(x)=x^2$</td><td>parabola opening up (cup)</td><td>$(-1,1),(0,0),(1,1)$</td><td>$(-\infty,\infty)$</td></tr>
<tr><td>$f(x)=x^3$</td><td>increasing S-curve</td><td>$(-1,-1),(0,0),(1,1)$</td><td>$(-\infty,\infty)$</td></tr>
<tr><td>$f(x)=\sqrt{x}$</td><td>upper half of a sideways parabola; starts at the origin, opens right</td><td>$(0,0),(1,1),(4,2)$</td><td>$[0,\infty)$</td></tr>
<tr><td>$f(x)=|x|$</td><td>V-shape, corner at the origin</td><td>$(-1,1),(0,0),(1,1)$</td><td>$(-\infty,\infty)$</td></tr>
<tr><td>$f(x)=\dfrac1x$</td><td>two hyperbola branches; the axes are asymptotes</td><td>$(-1,-1),(1,1),(2,\tfrac12)$</td><td>$x\neq0$</td></tr>
</tbody></table>
<h4>Shifts</h4>
<table class="ref"><thead><tr><th>Change</th><th>Effect</th><th>Note</th></tr></thead><tbody>
<tr><td>$f(x)+k$</td><td>up $k$</td><td>outside — moves as expected</td></tr>
<tr><td>$f(x)-k$</td><td>down $k$</td><td>outside</td></tr>
<tr><td>$f(x-h)$</td><td>right $h$</td><td>inside — <em>opposite</em> of the sign</td></tr>
<tr><td>$f(x+h)$</td><td>left $h$</td><td>inside</td></tr>
</tbody></table>
<div class="callout warn"><span class="co-label">The classic trap</span>Horizontal shifts go the <em>opposite</em> way from the sign: $f(x-3)$ moves <strong>right</strong> $3$ (solve $x-3=0$). Vertical shifts behave normally.</div>
<h4>Reflections</h4>
<p><strong>$-f(x)$</strong> flips over the $x$-axis (outputs negate). <strong>$f(-x)$</strong> flips over the $y$-axis (inputs negate).</p>
<div class="callout"><span class="co-label">Effect on a point</span>If $(a,b)$ is on $f$, then it is at $(a,b+k)$ under $f(x)+k$, at $(a+h,b)$ under $f(x-h)$, at $(a,-b)$ under $-f(x)$, and at $(-a,b)$ under $f(-x)$.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>Recognizing a complicated function as a shifted, reflected parent makes its graph, domain, and limits readable at a glance.</div>`,

<h4>Completing the square</h4>
<p>To convert $x^2+bx+c$ to vertex form: take half of $b$, square it, add and subtract it. Example: $x^2+6x+5=(x^2+6x+9)-9+5=(x+3)^2-4$, so the vertex is $(-3,-4)$.</p>

          cs: R`<h4>Power functions</h4>
<p>A <strong>power function</strong> has the form $f(x)=kx^n$ for a constant $k$ and exponent $n$. Its shape depends on $n$: even powers look like a parabola (both ends together), odd powers look like a cubic (ends opposite), exponents between $0$ and $1$ (like $\sqrt{x}=x^{1/2}$) rise but bend down, and negative exponents (like $x^{-1}=1/x$) give hyperbola branches.</p>
<h4>Variation</h4>
<table class="ref"><thead><tr><th>Type</th><th>Equation</th><th>Meaning</th></tr></thead><tbody>
<tr><td>Direct</td><td>$y=kx$</td><td>$y$ rises in proportion to $x$</td></tr>
<tr><td>Direct (power)</td><td>$y=kx^n$</td><td>e.g. area varies with the square of the side</td></tr>
<tr><td>Inverse</td><td>$y=\dfrac{k}{x}$</td><td>$y$ falls as $x$ rises (product $xy=k$ is constant)</td></tr>
</tbody></table>
<div class="callout formula"><span class="co-label">Find the constant first</span>Substitute the given pair to solve for $k$, write the full equation, then answer the question. Direct: $k=\dfrac{y}{x}$. Inverse: $k=xy$.</div>

<div class="callout warn"><span class="co-label">Common errors</span>Mixing up direct and inverse (does $y$ rise or fall with $x$?). Forgetting to solve for $k$ before predicting.</div>`,

          cs: R`<h4>End behavior</h4>

<p>Higher multiplicity flattens the graph near the zero. A degree-$n$ polynomial has at most $n$ real zeros and at most $n-1$ turning points.</p>

          cs: R`<h4>Domain</h4>
<p>A <strong>rational function</strong> is $\dfrac{p(x)}{q(x)}$. Its domain excludes every $x$ that makes the denominator zero.</p>
<h4>Vertical asymptotes and holes</h4>
<p>Factor and cancel first. A factor that <em>remains</em> in the denominator gives a <strong>vertical asymptote</strong> at its zero; a factor that <em>cancels</em> gives a <strong>hole</strong> there instead.</p>

<tr><td>top exactly one more</td><td>a slant (oblique) asymptote — divide to find it</td></tr>
</tbody></table>
<div class="callout formula"><span class="co-label">Intercepts</span>$x$-intercepts are the zeros of the numerator that are still in the domain. The $y$-intercept is the value at $x=0$ (if defined).</div>

          cs: R`<h4>Composition</h4>
<p>$(f\circ g)(x)=f\big(g(x)\big)$: do $g$ first, then feed the result into $f$. <strong>Order matters</strong> — usually $f\circ g\neq g\circ f$.</p>
<p><strong>Decomposing</strong> reverses this: write a messy function as an inside $g$ and an outside $f$. For $h(x)=\sqrt{x+5}$, take $g(x)=x+5$ (inside) and $f(x)=\sqrt{x}$ (outside).</p>
<h4>Inverse functions</h4>
<div class="callout formula"><span class="co-label">Find an inverse</span>Write $y=f(x)$, <strong>swap $x$ and $y$</strong>, and solve for $y$. The result is $f^{-1}(x)$. It undoes $f$: $f\big(f^{-1}(x)\big)=x$ and $f^{-1}\big(f(x)\big)=x$.</div>
<p>A function has an inverse only if it is <strong>one-to-one</strong> — each output comes from a single input. Test a graph with the <strong>horizontal line test</strong>. The graph of $f^{-1}$ is the reflection of $f$ over the line $y=x$, and their domains and ranges swap.</p>
<div class="callout warn"><span class="co-label">Common errors</span>Writing $f^{-1}(x)$ as $\dfrac{1}{f(x)}$ — the $-1$ is not a reciprocal. Forgetting to swap before solving. Calling a non-one-to-one function (like $x^2$ over all reals) invertible.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>The chain rule differentiates compositions, and inverse-function derivatives are reciprocals — both rest on this algebra.</div>`,

          cs: R`<h4>The exponential family</h4>
<p>An <strong>exponential function</strong> is $f(x)=a\,b^x$ with base $b>0$, $b\neq1$. The constant $a$ is the <strong>initial value</strong> (the $y$-intercept, at $x=0$). The base sets the behavior: $b>1$ gives <strong>growth</strong>, $0<b<1$ gives <strong>decay</strong>.</p>
<div class="callout formula"><span class="co-label">Constant percent change</span>Each unit step multiplies the output by $b$. Writing $b=1+r$, the quantity changes by the rate $r$ each step (e.g. $b=1.08$ is $+8\%$ per step; $b=0.9$ is $-10\%$).</div>
<h4>Graph features</h4>
<p>Domain is all real numbers; range is $(0,\infty)$ when $a>0$; the line $y=0$ is a <strong>horizontal asymptote</strong>. The graph never touches the $x$-axis.</p>
<div class="callout"><span class="co-label">The number e</span>$e\approx2.71828$ is the base of <strong>continuous</strong> growth: $f(x)=a\,e^{kx}$, with $k>0$ growth and $k<0$ decay.</div>
<div class="callout warn"><span class="co-label">Common errors</span>Reading $a$ as the base. Thinking the graph reaches $0$ — it only approaches it. Confusing exponential growth (multiply by a ratio) with linear growth (add a constant).</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>$e^x$ is the unique function equal to its own derivative — the reason $e$ runs through all of calculus.</div>`,

          cs: R`<h4>Three signatures in data</h4>
<table class="ref"><thead><tr><th>Family</th><th>Equal $x$-steps produce…</th><th>Form</th></tr></thead><tbody>
<tr><td>Linear</td><td>a constant <em>difference</em></td><td>$mx+b$</td></tr>
<tr><td>Exponential</td><td>a constant <em>ratio</em></td><td>$a\,b^x$</td></tr>
<tr><td>Power</td><td>neither (depends on $x^n$)</td><td>$k\,x^n$</td></tr>
