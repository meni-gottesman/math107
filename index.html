<div class="callout formula"><span class="co-label">The deciding test</span>Take equal steps in $x$. If the $y$-values change by a constant <strong>difference</strong>, it is linear; if they change by a constant <strong>ratio</strong> (each divided by the previous is the same), it is exponential.</div>
<h4>The long run</h4>
<p>Exponential growth eventually overtakes <em>any</em> polynomial or power function — it may start slower, but it wins as $x$ grows large. This is why "exponential" is shorthand for explosive growth.</p>

          videos:[

          ],
          cs: R`<h4>Definition</h4>
<div class="callout formula"><span class="co-label">Log is an exponent</span>$\log_b(x)=y$ means exactly $b^{\,y}=x$. A logarithm answers "what power of $b$ gives $x$?" It is the <strong>inverse</strong> of the exponential $b^x$.</div>
<p><strong>Common log</strong> $\log x$ is base $10$; <strong>natural log</strong> $\ln x$ is base $e$.</p>
<h4>Properties</h4>
<table class="ref"><thead><tr><th>Rule</th><th>Statement</th></tr></thead><tbody>
<tr><td>Product</td><td>$\log_b(MN)=\log_b M+\log_b N$</td></tr>
<tr><td>Quotient</td><td>$\log_b\!\left(\dfrac{M}{N}\right)=\log_b M-\log_b N$</td></tr>
<tr><td>Power</td><td>$\log_b(M^p)=p\,\log_b M$</td></tr>
<tr><td>Change of base</td><td>$\log_b x=\dfrac{\ln x}{\ln b}=\dfrac{\log x}{\log b}$</td></tr>
</tbody></table>
<p>Also $\log_b 1=0$, $\log_b b=1$, and $\log_b(b^x)=x$.</p>
<div class="callout warn"><span class="co-label">Common errors</span>$\log(M+N)$ is <em>not</em> $\log M+\log N$. The product rule applies to a product inside one log, not to a sum.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>$\ln x$ has the clean derivative $1/x$, and the log rules turn products into sums — making hard derivatives easy by "logarithmic differentiation."</div>`,
          ws:[
            {part:'A — Convert between exponential and log form', items: items(R`
$2^3=8$ to log form @@ $\log_5 25=2$ to exponential form @@ $10^2=100$ to log form @@ $\ln e=1$ to exponential form`)},
            {part:'B — Evaluate', items: items(R`
$\log_2 8$ @@ $\log_3 81$ @@ $\log_{10} 1000$ @@ $\log_5 1$ @@ $\ln e^4$ @@ $\log_2 \tfrac14$`)},
            {part:'C — Expand using properties', items: items(R`
$\log_b(xy)$ @@ $\log_b\!\left(\dfrac{x}{y}\right)$ @@ $\log_b(x^3)$ @@ $\log_b\!\left(\dfrac{x^2 y}{z}\right)$`)},
            {part:'D — Condense to a single log', items: items(R`
$\log_b x+\log_b y$ @@ $\log_b 8-\log_b 2$ @@ $3\log_b x$ @@ $2\log_b x+\log_b y$`)},

        {

            {rank:3, t:'Logarithmic functions (lecture)', ch:'Professor Leonard', url:LEONARD, note:'Deeper treatment of graphs and solving.'}
          ],
          cs: R`<h4>The log graph</h4>
<p>$y=\log_b x$ is the inverse of $y=b^x$, so its graph is the reflection over $y=x$. Domain is $(0,\infty)$, range is all reals, and $x=0$ is a <strong>vertical asymptote</strong>. It passes through $(1,0)$.</p>
<h4>Solving exponential equations</h4>
<ul>
<li><strong>Same base:</strong> rewrite both sides with one base and set the exponents equal. $2^x=8\Rightarrow 2^x=2^3\Rightarrow x=3$.</li>
<li><strong>Different bases:</strong> take a log of both sides and use the power rule. $3^x=20\Rightarrow x=\dfrac{\ln 20}{\ln 3}$.</li>
</ul>
<h4>Solving logarithmic equations</h4>
<p>Condense to one log, rewrite in exponential form, and solve. <strong>Then check</strong>: reject any solution that makes the inside of a log zero or negative (extraneous).</p>
<div class="callout warn"><span class="co-label">Common errors</span>Forgetting to check log-equation answers for the domain. Splitting $\log(x+y)$ when solving.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>The vertical asymptote of $\ln x$ at $x=0$ is a one-sided limit going to $-\infty$ — exactly the kind of behavior limits make precise.</div>`,
          ws:[
            {part:'A — Log graph features', items: items(R`
Domain of $y=\log_2 x$ @@ Range of $y=\log_2 x$ @@ Vertical asymptote of $y=\ln x$ @@ A point every $\log_b x$ passes through`)},
            {part:'B — Solve (same base)', items: items(R`
$2^x=16$ @@ $3^{x}=27$ @@ $5^{2x}=125$ @@ $\left(\tfrac12\right)^x=8$`)},
            {part:'C — Solve (take a log)', items: items(R`
$3^x=20$ @@ $2^x=7$ @@ $e^x=10$ @@ $10^x=250$`)},
            {part:'D — Solve log equations', items: items(R`
$\log_2 x=5$ @@ $\log_3(x-1)=2$ @@ $\ln x=0$ @@ $\log_2 x+\log_2(x-2)=3$`)},
            {part:'E — Extraneous solutions', items: items(R`
Solve $\log(x-3)=1$ and state the domain restriction @@ Why must $\log_2 x+\log_2(x-2)=3$ reject a negative candidate?`)},
            {part:'F — Conceptual', items: items(R`

            {part:'E', sols: items(R`

            {part: R`From real data: fitting and using exponential models`, items: items(R`A town's population is recorded twice. In the year 2010 (call this $x=0$, where $x$ is years after 2010) the population was 5000 people. In 2015 ($x=5$) it was 8000 people. The population grows exponentially, so it can be modeled by $y=a\cdot b^{x}$. (a) Find $a$. (b) Find $b$, rounded to four decimal places, by using the two data points. (c) State the yearly growth rate as a percent. (d) Write the full model $y=a\cdot b^{x}$ and explain in a sentence what $a$ and $b$ mean, with units. @@ A biologist measures a bacteria culture. At $x=0$ hours there are 1200 cells, and at $x=2$ hours there are 1860 cells. The count grows exponentially as $y=a\cdot b^{x}$. (a) Find $a$ and $b$ (round $b$ to four decimal places). (b) What is the hourly growth rate as a percent? (c) Using logarithms, find the time $x$ (to one decimal place, in hours) when the culture first reaches 5000 cells. Write a sentence interpreting your answer. @@ A cup of coffee cools, and the amount it is above room temperature is recorded each minute:<br>$$\begin{array}{c|cccc} x \text{ (minutes)} & 0 & 1 & 2 & 3 \\ \hline y \text{ (degrees above room temp)} & 80 & 68 & 57.8 & 49.13 \end{array}$$<br>(a) Show this data has a constant ratio by computing $\tfrac{68}{80}$, $\tfrac{57.8}{68}$, and $\tfrac{49.13}{57.8}$, and state that common ratio $b$. (b) Write the exponential model $y=a\cdot b^{x}$. (c) State the per-minute decay rate as a percent. (d) Using logarithms, find the time $x$ (to one decimal place) when the coffee is 40 degrees above room temperature. @@ A new car is worth 24000 dollars when purchased (at $x=0$ years) and 18000 dollars after $x=3$ years. Its value decays exponentially, $y=a\cdot b^{x}$. (a) Find $a$ and $b$ (round $b$ to four decimal places). (b) State the yearly rate of value lost as a percent. (c) Using logarithms, find the time $x$ (to one decimal place, in years) when the car is worth 10000             {part: R`From real data: fitting and using exponential models`, sols: items(R`(a) At $x=0$, $y=a\cdot b^{0}=a$, and the data gives $y=5000$, so $a=5000$. (b) Use the second point: $8000=5000\cdot b^{5}$, so $b^{5}=\tfrac{8000}{5000}=1.6$. Then $b=1.6^{1/5}\approx 1.0986$. (c) Since $b\approx 1.0986=1+0.0986$, the growth rate is about <strong>9.86 percent per year</strong>. (d) The model is $y=5000\cdot(1.0986)^{x}$. Here $a=5000$ is the population in 2010 (people), and $b\approx 1.0986$ means each year the population is multiplied by about $1.0986$, i.e. grows about 9.86 percent per year. @@ (a) At $x=0$, $a=1200$. From $1860=1200\cdot b^{2}$ we get $b^{2}=\tfrac{1860}{1200}=1.55$, so $b=1.55^{1/2}\approx 1.2450$. (b) The hourly growth rate is about $1.2450-1=0.2450$, or <strong>about 24.5 percent per hour</strong>. (c) Solve $5000=1200\cdot(1.245)^{x}$. Then $(1.245)^{x}=\tfrac{5000}{1200}\approx 4.1667$, so $x=\dfrac{\ln(4.1667)}{\ln(1.245)}\approx \dfrac{1.4271}{0.2191}\approx 6.5$. <strong>The culture first reaches 5000 cells at about $x=6.5$ hours.</strong> @@ (a) $\tfrac{68}{80}=0.85$, $\tfrac{57.8}{68}=0.85$, $\tfrac{49.13}{57.8}=0.85$. The common ratio is $b=0.85$. (b) At $x=0$, $a=80$, so $y=80\cdot(0.85)^{x}$. (c) Since $b=0.85=1-0.15$, the decay rate is <strong>15 percent per minute</strong>. (d) Solve $40=80\cdot(0.85)^{x}$, so $(0.85)^{x}=0.5$ and $x=\dfrac{\ln(0.5)}{\ln(0.85)}\approx \dfrac{-0.6931}{-0.1625}\approx 4.3$. <strong>The coffee is 40 degrees above room temperature at about $x=4.3$ minutes.</strong> @@ (a) At $x=0$, $a=24000$. From $18000=24000\cdot b^{3}$, $b^{3}=\tfrac{18000}{24000}=0.75$, so $b=0.75^{1/3}\approx 0.9086$. (b) Since $b\approx 0.9086=1-0.0914$, the car loses about <strong>9.14 percent of its value per year</strong>. (c) Solve $10000=24000\cdot(0.9086)^{x}$, so $(0.9086)^{x}=\tfrac{10000}{24000}\approx 0.4167$ and $x=\dfrac{\ln(0.4167)}{\ln(0.9086)}\approx \dfrac{-0.8755}{-0.0959}\approx 9.1$. <strong>The car is worth 10000 dollars at about $x=9.1$ years.</strong> @@ (a) At $x=0$, $a=50$. From $30=50\cdot b^{4}$, $b^{4}=\tfrac{30}{50}=0.6$, so $b=0.6^{1/4}\approx 0.8801$. (b) Since $b\approx 0.8801=1-0.1199$, the decay rate is <strong>about 11.99 percent per hour</strong>. (c) Half-life is the time to reach $25$ milligrams (half of 50). Solve $25=50\cdot(0.8801)^{x}$, so $(0.8801)^{x}=0.5$ and $x=\dfrac{\ln(0.5)}{\ln(0.8801)}\approx \dfrac{-0.6931}{-0.1277}\approx 5.4$. <strong>The half-life is about 5.4 hours, meaning the amount of tracer is cut in half about every 5.4 hours.</strong> @@ (a) At $x=0$, $a=200$. From $150=200\cdot b^{1}$, $b=\tfrac{150}{200}=0.75$. So $y=200\cdot(0.75)^{x}$. (b) Since $b=0.75=1-0.25$, the decay rate is <strong>25 percent per hour</strong>. (c) Solve $50=200\cdot(0.75)^{x}$, so $(0.75)^{x}=\tfrac{50}{200}=0.25$ and $x=\dfrac{\ln(0.25)}{\ln(0.75)}\approx \dfrac{-1.3863}{-0.2877}\approx 4.8$ hours. (d) Half-life: $(0.75)^{x}=0.5$, so $x=\dfrac{\ln(0.5)}{\ln(0.75)}\approx \dfrac{-0.6931}{-0.2877}\approx 2.4$. <strong>The amount reaches 50 milligrams at about 4.8 hours, and the half-life is about 2.4 hours.</strong>`)}

          cs: R`<h4>Core identities</h4>
<div class="callout formula"><span class="co-label">Pythagorean</span>$\sin^2\theta+\cos^2\theta=1$, and dividing through gives $1+\tan^2\theta=\sec^2\theta$ and $1+\cot^2\theta=\csc^2\theta$.</div>
<p><strong>Quotient:</strong> $\tan\theta=\dfrac{\sin\theta}{\cos\theta}$, $\cot\theta=\dfrac{\cos\theta}{\sin\theta}$. <strong>Reciprocal:</strong> $\csc,\sec,\cot$ are reciprocals of $\sin,\cos,\tan$.</p>
<h4>Solving trig equations</h4>
<p>Isolate the trig function, find the reference solution, then list <em>all</em> solutions in the requested interval using the function's symmetry and period.</p>

          videos:[

          ],
          cs: R`<h4>The deciding signatures</h4>
<table class="ref"><thead><tr><th>What you see</th><th>Family</th></tr></thead><tbody>
<tr><td>constant <em>difference</em> per step</td><td>linear</td></tr>
<tr><td>constant <em>ratio</em> per step</td><td>exponential</td></tr>
<tr><td>values like $x^n$ (squares, cubes)</td><td>power / polynomial</td></tr>
<tr><td>repeating, oscillating values</td><td>sinusoidal (trigonometric)</td></tr>
<tr><td>levels off, slow then flat (asymptote)</td><td>logarithmic / bounded</td></tr>
<tr><td>two branches with asymptotes</td><td>rational</td></tr>

<div class="callout formula"><span class="co-label">The first test, always</span>Take equal steps in $x$. Constant difference means linear; constant ratio means exponential. If neither, look at the shape: oscillation points to trig, a ceiling points to a logarithm, asymptotes point to a rational function.</div>

            {part: R`Choosing the right family: reading the data's signature`, items: items(R`A water-testing lab tracks a bacteria colony, recording the count (in thousands) every hour for the first 5 hours after a sample is contaminated:<br>$$\begin{array}{c|cccccc} t \text{ (hours)} & 0 & 1 & 2 & 3 & 4 & 5 \\ \hline P \text{ (thousands)} & 2 & 3 & 4.5 & 6.75 & 10.125 & 15.1875 \end{array}$$<br>(a) Compute the successive differences ($P$ at the next hour minus $P$ now) and the successive ratios ($P$ at the next hour divided by $P$ now). (b) Based on which one is (nearly) constant, name the best function family. (c) Write a model $P(t) = a\cdot b^{t}$ for the data, and state in a sentence what $a$ and $b$ mean in context, with units where appropriate. @@ A pharmacist measures the amount of a drug (in milligrams) remaining in a patient's bloodstream at the end of each hour:<br>$$\begin{array}{c|ccccc} t \text{ (hours)} & 0 & 1 & 2 & 3 & 4 \\ \hline A \text{ (mg)} & 80 & 60 & 45 & 33.75 & 25.3125 \end{array}$$<br>(a) Compute the successive ratios $A(t+1)/A(t)$. Are they constant? (b) Name the best function family, and explain how you can tell from the ratio that this is DECAY rather than growth. (c) Write a model $A(t) = a\cdot b^{t}$, and interpret $b$ as a percent change per hour ("the drug amount decreases by ___ percent each hour"). @@ A new cafe opens in a small town. The owner records total registered loyalty-card members (in hundreds) at the end of each month:<br>$$\begin{array}{c|cccccc} m \text{ (months)} & 0 & 2 & 4 & 6 & 8 & 10 \\ \hline N \text{ (hundreds)} & 0.5 & 1.4 & 3.0 & 4.6 & 5.6 & 6.0 \end{array}$$<br>The town has a fixed population, so there is a hard maximum number of possible members. (a) Describe the SHAPE of this data in words (how does the growth rate change early vs. late?). (b) A classmate says "it levels off, so it must be logarithmic, $N = a + b\ln(m)$." Explain using the data why a logarithm is the WRONG family here. (c) Name the family that fits a slow start, fast middle, and leveling toward a ceiling, and estimate the ceiling value (the carrying capacity) from the data, with units. @@ A coastal sensor records the water height (in meters above a fixed marker) at a pier every 3 hours over one day:<br>$$\begin{array}{c|ccccccccc} t \text{ (hours)} & 0 & 3 & 6 & 9 & 12 & 15 & 18 & 21 & 24 \\ \hline H \text{ (m)} & 1.0 & 2.5 & 4.0 & 2.5 & 1.0 & 2.5 & 4.0 & 2.5 & 1.0 \end{array}$$<br>(a) Explain why this data cannot be exponential or quadratic (what does it keep doing?). (b) Name the best function family. (c) From the data, find the period (in hours), the midline (in meters), and the amplitude (in meters), and state what each represents physically for the tide. @@ Two thin tables are given below. Without computing a full model, decide for EACH whether the better family is QUADRATIC (constant second differences, a turning point) or EXPONENTIAL (constant ratio, no turning point), and justify with one numeric check.<br>Dataset 1 (height of a thrown ball, in meters, vs. time in seconds):<br>$$\begin{array}{c|ccccc} t & 0 & 1 & 2 & 3 & 4 \\ \hline h & 0 & 25 & 40 & 45 & 40 \end{array}$$<br>Dataset 2 (value of a rare coin, in dollars, vs. years held):<br>$$\begin{array}{c|ccccc} t & 0 & 1 & 2 & 3 & 4 \\ \hline V & 100 & 120 & 144 & 172.8 & 207.36 \end{array}$$<br>For each dataset: (a) name the family, (b) show the single check (a second difference for one, a ratio for the other) that rules out the other family, and (c) say in words what the data is doing that matches that family.`)}

a linear table has a constant difference between terms; an exponential table has a constant ratio @@ a repeating, oscillating pattern`)},
            {part: R`Choosing the right family: reading the data's signature`, sols: items(R`(a) Successive differences ($P_{next}-P_{now}$): $3-2=1$, $4.5-3=1.5$, $6.75-4.5=2.25$, $10.125-6.75=3.375$, $15.1875-10.125=5.0625$. These are increasing, NOT constant. Successive ratios ($P_{next}/P_{now}$): $3/2=1.5$, $4.5/3=1.5$, $6.75/4.5=1.5$, $10.125/6.75=1.5$, $15.1875/10.125=1.5$. These are constant at $1.5$. (b) Because the RATIOS are constant (not the differences), the best family is <strong>exponential</strong>. (c) The model is $P(t)=a\cdot b^{t}$ with $a=P(0)=2$ and $b=1.5$, giving $$P(t)=2\,(1.5)^{t}.$$ Here $a=2$ is the initial count at $t=0$, i.e. $2$ thousand $=2000$ bacteria, and $b=1.5$ is the hourly growth factor: the colony multiplies by $1.5$ each hour (a $50\%$ increase per hour). <strong>$P(t)=2\,(1.5)^{t}$ thousand bacteria; $a=2$ thousand is the starting count, $b=1.5$ means it grows $50\%$ per hour.</strong> @@ (a) Successive ratios $A(t+1)/A(t)$: $60/80=0.75$, $45/60=0.75$, $33.75/45=0.75$, $25.3125/33.75=0.75$. They are constant at $0.75$, so YES, the ratios are constant. (b) A constant ratio means the best family is <strong>exponential</strong>. Because the ratio $b=0.75$ is between $0$ and $1$ (less than $1$), each hour's amount is smaller than the last, so this is DECAY rather than growth; a ratio greater than $1$ would indicate growth. (c) The model is $A(t)=a\cdot b^{t}$ with $a=A(0)=80$ and $b=0.75$: $$A(t)=80\,(0.75)^{t}.$$ Since $b=0.75=1-0.25$, the amount decreases by $0.25=25\%$ each hour. <strong>$A(t)=80\,(0.75)^{t}$ mg; the drug amount decreases by $25$ percent each hour.</strong> @@ (a) Early on the data rises slowly then quickly: from $m=0$ to $2$ it gains $0.9$, from $2$ to $4$ it gains $1.6$ (speeding up). Then it slows: $4$ to $6$ gains $1.6$, $6$ to $8$ gains $1.0$, $8$ to $10$ gains only $0.4$. So the growth rate starts slow, peaks in the middle, and tapers off near the end — an S-shaped curve approaching a ceiling. (b) A logarithm $N=a+b\ln(m)$ is the WRONG family for two reasons grounded in the data. First, $\ln(m)$ grows without bound (it has no ceiling and keeps rising forever), but this data levels off toward a fixed maximum set by the town's population, so it must approach a horizontal asymptote that a log curve never has. Second, $\ln(0)$ is undefined, yet the data has a real value $N=0.5$ at $m=0$, so a logarithmic model cannot even be evaluated at the start. Also, a log curve rises fastest at the very beginning and only slows down, whereas this data starts slow and speeds up first — the opposite early behavior. (c) The family with a slow start, fast middle, and leveling toward a ceiling is <strong>logistic</strong>. The carrying capacity is the value $N$ approaches: the increments shrink toward $0$ and $N$ is flattening near $6.0$ hundred, so the ceiling is about $650$ members (slightly above the last point $6.0$). <strong>Logistic; carrying capacity is approximately $6.5$ hundred, i.e. about $650$ loyalty members.</strong> @@ (a) The data cannot be exponential or quadratic because it keeps REPEATING: the values rise $1.0\to2.5\to4.0$, fall back $4.0\to2.5\to1.0$, then rise and fall again identically. An exponential function is always increasing or always decreasing (it never turns back), and a quadratic has exactly one turning point; neither can oscillate up and down repeatedly. (b) The best family is <strong>sinusoidal (trigonometric)</strong>. (c) Reading the data: it returns to the same state ($H=1.0$ rising) at $t=0$, $t=12$, and $t=24$, so the period is $12$ hours. The maximum is $4.0$ m and the minimum is $1.0$ m, so the midline is $\frac{4.0+1.0}{2}=2.5$ m and the amplitude is $\frac{4.0-1.0}{2}=1.5$ m. Physically: the period of $12$ hours is the time for one full tide cycle (low to high to low); the midline of $2.5$ m is the average water height about which the tide oscillates; the amplitude of $1.5$ m is how far the water rises above or falls below that average (the half-range from mean to high tide). <strong>Period $=12$ hours, midline $=2.5$ m, amplitude $=1.5$ m.</strong> @@ Dataset 1 (ball height): (a) <strong>Quadratic</strong>. (b) Check second differences. First differences of $h=0,25,40,45,40$: $25,15,5,-5$. Second differences: $15-25=-10$, $5-15=-10$, $-5-5=-10$ — constant at $-10$. The ratios are NOT constant ($25/0$ is undefined and $40/25=1.6\ne45/40=1.125$), which rules out exponential. (c) The data rises, reaches a peak around $t=3$ ($h=45$), and falls — it has a turning point, exactly what a quadratic (parabola) does. Dataset 2 (coin value): (a) <strong>Exponential</strong>. (b) Check ratios. $120/100=1.2$, $144/120=1.2$, $172.8/144=1.2$, $207.36/172.8=1.2$ — constant at $1.2$. The second differences are NOT constant (first differences $20,24,28.8,34.56$ give second differences $4,4.8,5.76$, which increase), ruling out quadratic. (c) The value keeps multiplying by the same factor $1.2$ each year and never turns around — it only increases — which matches exponential growth. <strong>Dataset 1: quadratic (constant 2nd difference $-10$, has a turning point). Dataset 2: exponential (constant ratio $1.2$, no turning point).</strong>`)}

            {part: R`Readiness bridges: difference quotients, doubling time, and the secant-to-tangent idea`, items: items(R`A power company models a small town's monthly electricity use (in megawatt-hours) by the function $f(x)=x^2+3x$, where $x$ is the number of years since the town's first census. To study how fast usage is changing, set up and fully simplify the difference quotient $\dfrac{f(x+h)-f(x)}{h}$. Show every algebra step: expand $f(x+h)$, subtract $f(x)$, combine like terms, and cancel the $h$, simplifying to a final expression of the form $2x+h+3$. Then state in one sentence what this expression becomes as $h\to 0$, and give the units of that result. @@ Use your simplified difference quotient from the previous problem to estimate how fast the town's electricity usage is changing exactly $x=4$ years after the first census. First substitute $x=4$ and let $h\to 0$ in the expression $2x+h+3$. Then write a sentence interpreting the number you get, being careful to include the correct units (megawatt-hours per year). @@ A biologist grows a bacterial culture whose mass (in milligrams) follows the exponential model $P(t)=5\cdot 2^{t/3}$, where $t$ is measured in hours. (a) Confirm by plugging in $t=0$ that the starting mass is $5$ milligrams. (b) The doubling time is the value of $t$ for which $P(t)=2\cdot 5=10$ milligrams. Set up the equation $5\cdot 2^{t/3}=10$ and SOLVE it for $t$ using logarithms, giving a decimal answer to two places. (c) State the doubling time in words with units. @@ A savings account grows according to $A(t)=800\cdot(1.06)^{t}$, where $A$ is the balance in dollars (written as words: 800 dollars at the start) and $t$ is time in years. The balance doubles when $A(t)=1600$. Set up the equation $800\cdot(1.06)^{t}=1600$ and solve for the doubling time $t$ using logarithms. Show the step where you take $\log$ of both sides and use the power rule $\log(1.06^{t})=t\log(1.06)$. Give your answer to two decimal places and state it as a sentence with units. @@ Here is a small table of distances (in meters) that a runner has covered, measured by a GPS watch:\n$$\begin{array}{c|c} t\text{ (seconds)} & d\text{ (meters)} \\ \hline 2 & 14 \\ 5 & 41 \end{array}$$\n(a) Compute the average rate of change of distance with respect to time between $t=2$ and $t=5$ using $\dfrac{d(5)-d(2)}{5-2}$, and give units. (b) Explain in ONE line how this average rate of change (the slope of the secant line through these two points) is connected to the runner's instantaneous speed (the derivative) at a single instant. @@ Fill in the bridge between the two big ideas of the course. In one line each, answer: (a) Geometrically, what line does the difference quotient $\dfrac{f(x+h)-f(x)}{h}$ give the slope of, for $h\neq 0$? (b) As $h\to 0$, that secant line approaches what line, and the difference quotient becomes what single quantity (the start of Calculus 1)? Use the words secant, tangent, and derivative in your answer.`)}

            {part: R`Readiness bridges: difference quotients, doubling time, and the secant-to-tangent idea`, sols: items(R`Set up the quotient and expand. $f(x+h)=(x+h)^2+3(x+h)=x^2+2xh+h^2+3x+3h$, and $f(x)=x^2+3x$. Subtract: $f(x+h)-f(x)=(x^2+2xh+h^2+3x+3h)-(x^2+3x)=2xh+h^2+3h$. Divide by $h$: $\dfrac{2xh+h^2+3h}{h}=\dfrac{h(2x+h+3)}{h}=2x+h+3$ (for $h\neq 0$). As $h\to 0$, the $h$ term drops out and the expression becomes $2x+3$. This is the instantaneous rate of change of electricity usage, with units of megawatt-hours per year. <strong>The simplified difference quotient is $2x+h+3$, and as $h\to 0$ it becomes $2x+3$ megawatt-hours per year.</strong> @@ Substitute $x=4$ into $2x+h+3$ to get $2(4)+h+3=11+h$. Letting $h\to 0$ gives $11+0=11$. The units are megawatt-hours per year. Interpretation: exactly $4$ years after the first census, the town's monthly electricity usage is increasing at a rate of about $11$ megawatt-hours per year. <strong>The usage is changing at $11$ megawatt-hours per year at $x=4$.</strong> @@ (a) $P(0)=5\cdot 2^{0/3}=5\cdot 2^{0}=5\cdot 1=5$ milligrams, confirming the starting mass. (b) Solve $5\cdot 2^{t/3}=10$. Divide both sides by $5$: $2^{t/3}=2$. Take $\ln$ of both sides: $\dfrac{t}{3}\ln 2=\ln 2$, so $\dfrac{t}{3}=1$, giving $t=3$. To two decimals, $t=3.00$ hours. (You can also see directly that $2^{t/3}=2^{1}$ forces $t/3=1$.) (c) In words: the bacterial mass doubles every $3.00$ hours. <strong>The doubling time is $3.00$ hours.</strong> @@ Solve $800\cdot(1.06)^{t}=1600$. Divide both sides by $800$: $(1.06)^{t}=2$. Take $\log$ of both sides: $\log(1.06^{t})=\log 2$. Apply the power rule: $t\log(1.06)=\log 2$. Divide: $t=\dfrac{\log 2}{\log(1.06)}=\dfrac{0.30103}{0.025306}\approx 11.90$. So $t\approx 11.90$ years. Sentence: at a $6$ percent annual growth rate, the balance of 800 dollars takes about $11.90$ years to double to 1600 dollars. <strong>The doubling time is about $11.90$ years.</strong> @@ (a) Average rate of change $=\dfrac{d(5)-d(2)}{5-2}=\dfrac{41-14}{3}=\dfrac{27}{3}=9$ meters per second. (b) One line: the secant slope of $9$ meters per second is the runner's average speed over the interval, and as we shrink the time interval toward a single instant, that secant slope approaches the instantaneous speed (the derivative) at that instant. <strong>The average rate of change is $9$ meters per second, and shrinking the interval to an instant turns this secant slope into the instantaneous speed (the derivative).</strong> @@ (a) For $h\neq 0$, the difference quotient $\dfrac{f(x+h)-f(x)}{h}$ is the slope of the secant line through the two points $(x,f(x))$ and $(x+h,f(x+h))$. (b) As $h\to 0$ the second point slides into the first, the secant line approaches the tangent line at $(x,f(x))$, and the difference quotient becomes the derivative, the instantaneous rate of change at that point. <strong>The difference quotient is the secant slope; as $h\to 0$ the secant approaches the tangent line and the quotient becomes the derivative.</strong>`)}

/* ---------- App ---------- */
const view = document.getElementById('view');
const sidebar = document.getElementById('sidebar');
const SUB_PARTS = [['lesson','Lesson'],['worksheet','Worksheet'],['answers','Answers reviewed']];

function findSub(id){
  for(const u of COURSE.units){ if(u.locked) continue; const s=(u.subtopics||[]).find(x=>x.id===id); if(s) return {u,s}; }
  return null;
}
function unlockedSubs(){ const a=[]; COURSE.units.forEach(u=>{ if(!u.locked)(u.subtopics||[]).forEach(s=>a.push({u,s})); }); return a; }
function totalItems(){ return unlockedSubs().length*3 + COURSE.tests.length; }
function doneItems(){
  let n=0;
  unlockedSubs().forEach(({s})=>SUB_PARTS.forEach(([k])=>{ if(Store.sub(s.id+':'+k)) n++; }));
  COURSE.tests.forEach(t=>{ if(Store.sub('test:'+t.id)) n++; });
  return n;
}
function subDone(s){ return SUB_PARTS.every(([k])=>Store.sub(s.id+':'+k)); }
function subPartial(s){ return SUB_PARTS.some(([k])=>Store.sub(s.id+':'+k)); }
function unitProgress(u){
  if(u.locked) return 0; const subs=u.subtopics||[]; if(!subs.length) return 0;
  let d=0; subs.forEach(s=>SUB_PARTS.forEach(([k])=>{ if(Store.sub(s.id+':'+k)) d++; }));
  return d/(subs.length*3);
}

/* ----- routing ----- */
let route = {type:'overview'};
function go(r){ route=r; Store.set('last', JSON.stringify(r)); render(); closeDrawer(); const rm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches; window.scrollTo({top:0,behavior:rm?'auto':'smooth'}); }

function updateRing(){
  const tot=totalItems(), d=doneItems(), pct = tot? Math.round(d/tot*100):0;
  const C=2*Math.PI*16;
  document.getElementById('ringFill').style.strokeDashoffset = C*(1-pct/100);
  document.getElementById('ringPct').textContent = pct+'%';
  const rw=document.getElementById('ringWrap'); if(rw) rw.setAttribute('aria-label','Course progress: '+pct+' percent complete, '+d+' of '+tot+' items');
}

/* ----- sidebar ----- */
function buildSidebar(){
  let h = '';
  h += '<div class="nav-section-label">Get started</div>';
  h += navItem('overview', '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M12 2l10 10-10 10L2 12z"/></svg>', 'Course overview', route.type==='overview');
  h += '<div class="nav-section-label">Units</div>';
  COURSE.units.forEach(u=>{
    const expanded = u.open && !u.locked;
    const pct = Math.round(unitProgress(u)*100);
    h += '<div data-unit="'+u.id+'">';
    h += '<button class="unit-head'+(u.locked?' locked':'')+'" aria-expanded="'+(expanded?'true':'false')+'" data-toggle="'+u.id+'">';
    h += '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 6 6 6-6 6"/></svg>';
    h += '<span class="un">'+u.n+'</span><span class="nm">'+u.name+'</span>';
    h += u.locked ? '<svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>' : '';
    h += '</button>';
    if(!u.locked) h += '<div class="unit-bar"><i style="width:'+pct+'%"></i></div>';
    h += '<div class="sublist" data-sublist="'+u.id+'"'+(expanded?'':' hidden')+'>';
    (u.subtopics||[]).forEach(s=>{
      if(u.locked){
        h += '<div class="nav-item" style="cursor:default;opacity:.6"><span class="num">'+s.id+'</span><span class="txt">'+s.name+'</span></div>';
      } else {
        const active = route.type==='sub' && route.id===s.id;
        const cls = subDone(s)?'dot done':(subPartial(s)?'dot partial':'dot');
        h += '<button class="nav-item'+(active?' active':'')+'" data-sub="'+s.id+'"><span class="num">'+s.id+'</span><span class="txt">'+s.name+'</span><span class="'+cls+'"></span></button>';
      }
    });
    if(u.locked) h += '<div class="nav-item" style="cursor:default;font-size:12.5px;color:var(--ink-faint)"><span class="num"></span><span class="txt">Content coming soon</span></div>';
    h += '</div></div>';
  });
  h += '<div class="nav-section-label">Assessments</div>';
  COURSE.tests.forEach(t=>{
    const active = route.type==='test' && route.id===t.id;
    const cls = Store.sub('test:'+t.id)?'dot done':'dot';
    h += '<button class="nav-item'+(active?' active':'')+'" data-test="'+t.id+'"><span class="num"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span class="txt">'+t.name.replace(' — Functions','').replace('Test','Test')+'</span><span class="'+cls+'"></span></button>';
  });
  sidebar.innerHTML = h;
  if(searchQuery) filterSidebar(searchQuery);
  // wire
  sidebar.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.getAttribute('data-toggle'); const list=sidebar.querySelector('[data-sublist="'+id+'"]');
    const exp=b.getAttribute('aria-expanded')==='true'; b.setAttribute('aria-expanded',(!exp).toString());
    if(list) list.hidden=exp;
  }));
  sidebar.querySelectorAll('[data-sub]').forEach(b=>b.addEventListener('click',()=>go({type:'sub',id:b.getAttribute('data-sub')})));
  sidebar.querySelectorAll('[data-test]').forEach(b=>b.addEventListener('click',()=>go({type:'test',id:b.getAttribute('data-test')})));
  sidebar.querySelectorAll('.nav-item[data-sub], .nav-item[data-test]').forEach(()=>{});
  const ov = sidebar.querySelector('[data-nav="overview"]'); if(ov) ov.addEventListener('click',()=>go({type:'overview'}));
}
function navItem(id,icon,label,active){
  return '<button class="nav-item'+(active?' active':'')+'" data-nav="'+id+'"><span class="num">'+icon+'</span><span class="txt">'+label+'</span></button>';
}

/* ----- views ----- */
function vidCard(v){
  const watch = v.id ? 'https://www.youtube.com/watch?v='+v.id : v.url;
  let actions = '';
  if(v.id){
    actions += '<button class="btn-sm primary" data-embed="'+v.id+'" data-embed-title="'+escapeHtml(v.t)+'" aria-expanded="false">Watch here</button>';
    actions += '<a class="btn-sm" href="'+watch+'" target="_blank" rel="noopener">Open on YouTube</a>';
  } else {
    actions += '<a class="btn-sm primary" href="'+watch+'" target="_blank" rel="noopener">Open video</a>';
  }
  return '<div class="vid"><div class="rank">'+v.rank+'</div><div class="vmeta">'
    +'<p class="vtitle">'+v.t+'</p><div class="vchan">'+v.ch+'</div>'
    +'<p class="vnote">'+v.note+'</p><div class="vactions">'+actions+'</div>'
    +'<div class="embed-slot"></div></div></div>';
}
function renderProblems(parts, isKey){
  let n=0, h='';
  parts.forEach(p=>{
    h += '<div class="wpart"><h5>'+(p.part||p.label)+'</h5><ol class="problems'+(isKey?' sol':'')+'">';
    (p.items||p.sols||p.q||p.s||[]).forEach(it=>{ n++; h+='<li><span class="pn">'+n+'.</span><span class="pb">'+it+'</span></li>'; });
    h += '</ol></div>';
  });
  return h;
}

function renderSub(id){
  const f = findSub(id); if(!f){ renderOverview(); return; }
  const {u,s}=f; const tab = route.tab||'lesson';
  let h = '<div class="view">';
  h += '<div class="eyebrow"><span>Unit '+u.n+'</span><span style="color:var(--line-strong)">/</span><span>'+s.id+'</span></div>';
  h += '<h1 class="page-title">'+s.name+'</h1>';
  h += '<p class="lede">'+(s.blurb||'')+'</p>';
  // completion chips
  h += '<div class="progress-chips">';
  SUB_PARTS.forEach(([k,label])=>{
    const on = Store.sub(s.id+':'+k);
    h += '<button class="chip'+(on?' on':'')+'" aria-pressed="'+(on?'true':'false')+'" data-mark="'+s.id+':'+k+'"><span class="box" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 12l5 5L20 6"/></svg></span>'+label+'</button>';
  });
  h += '</div>';
  // tabs (WAI-ARIA tabs pattern)
  h += '<div class="tabs" role="tablist" aria-label="Lesson views">';
  [['lesson','Lesson'],['worksheet','Worksheet'],['key','Answer key']].forEach(([k,label],i)=>{
    const sel = tab===k;
    h += '<button class="tab'+(sel?' active':'')+'" role="tab" id="tab-'+k+'" aria-selected="'+(sel?'true':'false')+'" aria-controls="panelBody" tabindex="'+(sel?'0':'-1')+'" data-tab="'+k+'">'+label+'</button>';
  });
  h += '</div><div class="panel-body" id="panelBody" role="tabpanel" aria-labelledby="tab-'+tab+'" tabindex="0">';
  if(tab==='lesson'){
    h += '<div class="cs">'+s.cs+'</div>';
    h += '<h4 style="font-family:var(--font-display);font-size:20px;margin:28px 0 6px">Ranked videos</h4>';
    h += '<p style="color:var(--ink-soft);margin-top:0;font-size:14.5px">Ordered by usefulness for this topic. Watch #1 first; reach for the others to go deeper or for extra practice.</p>';
    h += '<div class="vid-grid">'+s.videos.map(vidCard).join('')+'</div>';
  } else if(tab==='worksheet'){
    h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px"><p style="margin:0;color:var(--ink-soft);font-size:14.5px">Work these closed-book, then check the answer key.</p><button class="btn-sm" onclick="window.print()">Print / save PDF</button></div>';
    h += renderProblems(s.ws,false);
  } else {
    if(!revealed[s.id]){
      h += '<div class="key-gate"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="var(--ink-faint)" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>'
        +'<p>Try the worksheet first. Reveal the worked solutions only when you are ready to check.</p>'
        +'<button class="btn-sm primary" data-reveal="'+s.id+'">Reveal answer key</button></div>';
    } else {
      h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px"><p style="margin:0;color:var(--ink-soft);font-size:14.5px">Worked solutions. For each miss, redo the problem from scratch.</p><button class="btn-sm" data-hide="'+s.id+'">Hide</button></div>';
      h += renderProblems(s.key,true);
    }
  }
  h += '</div>';
  // notes
  h += '<div class="notes"><label><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> My notes for '+s.id+'</label>'
    +'<textarea id="noteArea" placeholder="Jot down sticking points, formulas to remember, or questions for your tutor…">'+escapeHtml(Store.note(s.id))+'</textarea>'
    +'<div class="saved" id="noteSaved" aria-live="polite"></div></div>';
  // pager
  const list = unlockedSubs(); const idx = list.findIndex(x=>x.s.id===id);
  const prev = idx>0?list[idx-1]:null, next = idx<list.length-1?list[idx+1]:null;
  h += '<div class="pager">';
  h += prev? '<a href="#" data-go="'+prev.s.id+'"><span class="pk">← Previous</span><span class="pt">'+prev.s.id+' '+prev.s.name+'</span></a>' : '<a aria-disabled="true"><span class="pk">← Previous</span><span class="pt">Start of course</span></a>';
  h += next? '<a class="next" href="#" data-go="'+next.s.id+'"><span class="pk">Next →</span><span class="pt">'+next.s.id+' '+next.s.name+'</span></a>' : '<a class="next" aria-disabled="true"><span class="pk">Next →</span><span class="pt">End of course</span></a>';
  h += '</div></div>';
  view.innerHTML = h;
  wireSub(s);
}
const revealed = {};
function wireSub(s){
  view.querySelectorAll('[data-mark]').forEach(b=>b.addEventListener('click',()=>{
    const on=Store.toggle(b.getAttribute('data-mark')); b.classList.toggle('on',on); b.setAttribute('aria-pressed',on?'true':'false'); updateRing(); refreshSidebarState();
  }));
  view.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{ route.tab=b.getAttribute('data-tab'); renderSub(s.id); const nt=view.querySelector('.tab.active'); if(nt) nt.focus(); }));
  const tablist=view.querySelector('[role="tablist"]');
  if(tablist) tablist.addEventListener('keydown',e=>{
    const tabs=Array.prototype.slice.call(tablist.querySelectorAll('[role="tab"]'));
    const i=tabs.indexOf(document.activeElement); if(i<0) return; let j=i;
    if(e.key==='ArrowRight'||e.key==='ArrowDown') j=(i+1)%tabs.length;
    else if(e.key==='ArrowLeft'||e.key==='ArrowUp') j=(i-1+tabs.length)%tabs.length;
    else if(e.key==='Home') j=0; else if(e.key==='End') j=tabs.length-1; else return;
    e.preventDefault(); tabs[j].focus(); tabs[j].click();
  });
  view.querySelectorAll('[data-reveal]').forEach(b=>b.addEventListener('click',()=>{ revealed[s.id]=true; renderSub(s.id); const hb=view.querySelector('[data-hide]'); if(hb) hb.focus(); }));
  view.querySelectorAll('[data-hide]').forEach(b=>b.addEventListener('click',()=>{ revealed[s.id]=false; renderSub(s.id); const rb=view.querySelector('[data-reveal]'); if(rb) rb.focus(); }));
  view.querySelectorAll('[data-go]').forEach(a=>a.addEventListener('click',e=>{ e.preventDefault(); route.tab='lesson'; go({type:'sub',id:a.getAttribute('data-go')}); }));
  view.querySelectorAll('[data-embed]').forEach(b=>b.addEventListener('click',()=>{
    const slot=b.closest('.vid').querySelector('.embed-slot');
    if(slot.querySelector('iframe')){ slot.innerHTML=''; b.textContent='Watch here'; b.setAttribute('aria-expanded','false'); return; }
    slot.innerHTML='<div class="embed" role="region" aria-label="Embedded video player"><iframe src="https://www.youtube-nocookie.com/embed/'+b.getAttribute('data-embed')+'" title="'+(b.getAttribute('data-embed-title')||'Video')+'" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>';
    b.textContent='Close video'; b.setAttribute('aria-expanded','true');
  }));
  const ta=view.querySelector('#noteArea');
  if(ta){ let t; ta.addEventListener('input',()=>{ const sv=view.querySelector('#noteSaved'); try{ Store.setNote(s.id,ta.value); sv.textContent=Store.persists?'Saved':'Saved for this session only'; }catch(err){ sv.textContent='Could not save — storage unavailable'; } clearTimeout(t); t=setTimeout(()=>{ sv.textContent=''; },1600); }); }
  typeset(view);
}

function renderTest(id){
  const t = COURSE.tests.find(x=>x.id===id); if(!t){ renderOverview(); return; }
  let h='<div class="view">';
  h += '<div class="eyebrow">Assessment</div><h1 class="page-title">'+t.name+'</h1>';
  h += '<div class="meta-row">'
    +'<span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>'+t.time+'</span>'
    +'<span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16"/><rect x="8" y="9" width="3" height="7"/><rect x="14" y="6" width="3" height="10"/></svg>'+t.points+'</span>'
    +'<span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L20 6"/><path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9"/></svg>'+t.items+'</span>'
    +'<button class="btn-sm" onclick="window.print()" style="margin-left:auto">Print / save PDF</button></div>';
  h += '<p class="lede">'+t.intro+'</p>';
  t.sections.forEach(sec=>{
    h += '<div class="tsection"><h5>'+sec.title+'</h5><ol class="problems">';
    let n=0; sec.q.forEach(q=>{ n++; h+='<li><span class="pn">'+n+'.</span><span class="pb">'+q+'</span></li>'; });
    h += '</ol></div>';
  });
  // rubric
  h += '<details style="margin:18px 0;border:1px solid var(--line);border-radius:12px;padding:6px 16px;background:var(--panel)"><summary style="cursor:pointer;font-weight:600;padding:10px 0">Grading rubric</summary><div class="cs" style="padding-bottom:10px">'+t.rubric+'</div></details>';
  // key gate
  if(!revealed['test:'+id]){
    h += '<div class="key-gate"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="var(--ink-faint)" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><p>Take the test under time first, then reveal the answer key to grade it.</p><button class="btn-sm primary" data-reveal-test="'+id+'">Reveal answer key</button></div>';
  } else {
    h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin:8px 0"><h3 style="font-family:var(--font-display);font-size:20px;margin:0">Answer key</h3><button class="btn-sm" data-hide-test="'+id+'">Hide</button></div>';
    h += renderProblems(t.key,true);
  }
  // score + completion
  const sc = Store.score('test:'+id);
  h += '<div class="score-box"><label for="scoreIn">Your score</label><input id="scoreIn" type="number" min="0" max="100" inputmode="numeric" aria-describedby="masteryOut" value="'+(sc!=null?sc:'')+'" placeholder="0–100"/>'
    +'<span id="masteryOut" aria-live="polite">'+masteryBadge(sc)+'</span>'
    +'<button class="chip'+(Store.sub('test:'+id)?' on':'')+'" data-mark-test="'+id+'" style="margin-left:auto"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 12l5 5L20 6"/></svg></span>Mark completed</button></div>';
  h += '</div>';
  view.innerHTML=h;
  view.querySelectorAll('[data-reveal-test]').forEach(b=>b.addEventListener('click',()=>{ revealed['test:'+id]=true; renderTest(id); }));
  view.querySelectorAll('[data-hide-test]').forEach(b=>b.addEventListener('click',()=>{ revealed['test:'+id]=false; renderTest(id); }));
  view.querySelectorAll('[data-mark-test]').forEach(b=>b.addEventListener('click',()=>{ Store.toggle('test:'+id); b.classList.toggle('on'); updateRing(); refreshSidebarState(); }));
  const inp=view.querySelector('#scoreIn');
  if(inp) inp.addEventListener('input',()=>{ let v=inp.value===''?null:Math.max(0,Math.min(100,+inp.value)); Store.setScore('test:'+id,v); view.querySelector('#masteryOut').innerHTML=masteryBadge(v); });
  typeset(view);
}
function masteryBadge(sc){
  if(sc==null||isNaN(sc)) return '<span class="mastery m0">Enter a score</span>';
  if(sc>=90) return '<span class="mastery m3">Mastered — advance</span>';
  if(sc>=80) return '<span class="mastery m2">Proficient — review misses</span>';
  if(sc>=70) return '<span class="mastery m2">Developing — redo sections</span>';
  return '<span class="mastery m1">Not yet — re-study & retake</span>';
}

function renderOverview(){
  const tot=totalItems(), d=doneItems(), pct=tot?Math.round(d/tot*100):0;
  let h='<div class="view">';
  h += '<div class="hero"><div class="h-eye">Occidental College · Precalculus</div><h2>Your MATH 107 study workspace</h2>'
    +'<p>Learn each topic, practice with full worksheets, check worked answers, and take timed tests — all in one place, with your progress saved as you go.</p></div>';
  h += '<div class="grid-2"><div class="card"><h3>The Rule of Four</h3><p style="margin-top:0;color:var(--ink-soft);font-size:14.5px">Every function wears four faces. The course is about translating between them.</p>'
    +'<table class="ref"><tbody>'
    +'<tr><td><strong>Geometric</strong></td><td>a graph — what the behavior looks like</td></tr>'
    +'<tr><td><strong>Numeric</strong></td><td>a table — the values and how fast they change</td></tr>'
    +'<tr><td><strong>Symbolic</strong></td><td>a formula — how to compute it exactly</td></tr>'
    +'<tr><td><strong>Verbal</strong></td><td>words — what it means</td></tr>'
    +'</tbody></table></div>'
    +'<div class="card"><h3>How to use this site</h3><ol class="steps">'
    +'<li>Open a subtopic and read the <strong>Lesson</strong>; watch video #1.</li>'
    +'<li>Do the <strong>Worksheet</strong> closed-book.</li>'
    +'<li>Reveal the <strong>Answer key</strong> and fix every miss.</li>'
    +'<li>Tick the three boxes to mark it done — the ring fills up.</li>'
    +'<li>After a unit, take its <strong>Test</strong> and log your score.</li>'
    +'</ol></div></div>';
  h += '<hr class="rule"><div class="eyebrow">The plan</div><h1 class="page-title" style="font-size:26px">An algebra toolkit plus seven units · thirty-two subtopics</h1>';
  h += '<div class="roadmap">';
  COURSE.units.forEach(u=>{
    const ready=!u.locked;
    h += '<div class="rm-unit"><div class="rm-h"><span class="un">Unit '+u.n+'</span><span class="nm">'+u.name+'</span><span class="tag '+(ready?'ready':'soon')+'">'+(ready?'Ready':'Coming soon')+'</span></div><div class="subchips">';
    (u.subtopics||[]).forEach(s=>{ h += ready? '<span class="cl" data-jump="'+s.id+'">'+s.id+' '+s.name+'</span>' : '<span>'+s.id+' '+s.name+'</span>'; });
    h += '</div></div>';
  });
  h += '</div>';
  h += '<hr class="rule"><div class="eyebrow">Assessments</div><h1 class="page-title" style="font-size:26px">Test battery</h1>'
    +'<p class="lede">A diagnostic, seven unit tests, a midterm after Unit 4, and a cumulative final — all ten are ready to take now.</p><div class="subchips" style="gap:10px">';
  COURSE.tests.forEach(t=>{ h += '<span class="cl" data-jumptest="'+t.id+'" style="font-size:13.5px;padding:7px 13px">'+t.name+' · '+t.time+'</span>'; });
  h += '</div>';
  h += '<div class="card" style="margin-top:26px"><h3>Resources</h3><p style="margin:0;color:var(--ink-soft);font-size:14.5px">Free textbook: <a href="https://openstax.org/details/books/precalculus-2e" target="_blank" rel="noopener">OpenStax Precalculus 2e</a> (the section-by-section spine). Graphing: <a href="https://www.desmos.com/calculator" target="_blank" rel="noopener">Desmos</a>. Notes &amp; common errors: <a href="https://tutorial.math.lamar.edu" target="_blank" rel="noopener">Paul\u2019s Online Math Notes</a>.</p>'
    +(Store.persists?'':'<p style="margin:12px 0 0;font-size:13px;color:var(--amber)">Note: this preview can\u2019t save to your browser, so progress lasts only for this session. Once the site is on your GitHub Pages (or opened as a downloaded file), progress saves automatically.</p>')
    +'</div>';
  h += '</div>';
  view.innerHTML=h;
  view.querySelectorAll('[data-jump]').forEach(s=>s.addEventListener('click',()=>{ route.tab='lesson'; go({type:'sub',id:s.getAttribute('data-jump')}); }));
  view.querySelectorAll('[data-jumptest]').forEach(s=>s.addEventListener('click',()=>go({type:'test',id:s.getAttribute('data-jumptest')})));
  typeset(view);
}

function render(){
  buildSidebar();
  if(route.type==='sub') renderSub(route.id);
  else if(route.type==='test') renderTest(route.id);
  else renderOverview();
  updateRing();
}
function refreshSidebarState(){ buildSidebar(); }

/* ----- helpers ----- */
function typeset(el){
  if(window.renderMathInElement){
    try{ renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false,ignoredTags:['script','noscript','style','textarea']}); }catch(e){}
  }
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

/* ----- search ----- */
let searchQuery='';
function filterSidebar(q){
  searchQuery=(q||'').trim().toLowerCase();
  let visible=0;
  sidebar.querySelectorAll('[data-unit]').forEach(block=>{
    let any=false;
    block.querySelectorAll('[data-sub]').forEach(row=>{
      const match = !searchQuery || row.textContent.toLowerCase().includes(searchQuery);
      row.style.display = match?'':'none'; if(match){ any=true; visible++; }
    });
    const list=block.querySelector('.sublist');
    if(searchQuery){ if(list) list.hidden=false; block.style.display = any?'':'none'; }
    else { block.style.display=''; }
  });
  const st=document.getElementById('searchStatus');
  if(st) st.textContent = searchQuery ? (visible+' topic'+(visible===1?'':'s')+' match'+(visible===1?'es':'')) : '';
  return visible;
}
document.getElementById('searchInput').addEventListener('input',e=>{
  filterSidebar(e.target.value);
  if(e.target.value.trim() && window.matchMedia && window.matchMedia('(max-width:880px)').matches && !sidebar.classList.contains('open')) openDrawer();
});

/* ----- theme ----- */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t); Store.set('theme',t);
  document.getElementById('themeIcon').innerHTML = t==='dark'
    ? '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
  const tb=document.getElementById('themeBtn'); if(tb){ tb.setAttribute('aria-label', t==='dark'?'Switch to light mode':'Switch to dark mode'); tb.setAttribute('aria-pressed', t==='dark'?'true':'false'); }
}
document.getElementById('themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));

/* ----- reset ----- */
(function(){
  const modal=document.getElementById('resetModal');
  const btn=document.getElementById('resetBtn');
  const confirmBtn=document.getElementById('rmConfirm');
  const cancelBtn=document.getElementById('rmCancel');
  let prevFocus=null;
  function openModal(){ prevFocus=document.activeElement; modal.hidden=false; confirmBtn.focus(); }
  function closeModal(){ modal.hidden=true; if(prevFocus&&prevFocus.focus){ try{prevFocus.focus();}catch(e){} } }
  btn.addEventListener('click',openModal);
  cancelBtn.addEventListener('click',closeModal);
  modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });
  modal.addEventListener('keydown',e=>{
    if(e.key==='Escape'){ e.preventDefault(); closeModal(); return; }
    if(e.key==='Tab'){ const first=cancelBtn,last=confirmBtn;
      if(e.shiftKey&&document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault(); first.focus(); } }
  });
  confirmBtn.addEventListener('click',()=>{
    const snap=JSON.stringify({done:Store.get('done')||{}, notes:Store.get('notes')||{}, scores:Store.get('scores')||{}});
    Store.reset(); render(); closeModal();
    const t=document.getElementById('toast');
    t.innerHTML='Progress reset <button class="toast-undo" id="undoReset">Undo</button>';
    t.classList.add('show');
    let timer=setTimeout(()=>{ t.classList.remove('show'); },6000);
    const u=document.getElementById('undoReset');
    if(u) u.addEventListener('click',()=>{ try{ const s=JSON.parse(snap); Store.set('done',s.done); Store.set('notes',s.notes); Store.set('scores',s.scores); }catch(e){} render(); clearTimeout(timer); t.classList.remove('show'); t.textContent=''; });
  });
})();

/* ----- drawer ----- */
const scrim=document.getElementById('scrim');
let drawerPrevFocus=null;
function openDrawer(){ sidebar.classList.add('open'); scrim.classList.add('show'); const mb=document.getElementById('menuBtn'); if(mb) mb.setAttribute('aria-expanded','true'); drawerPrevFocus=document.activeElement; const first=sidebar.querySelector('button,a,[tabindex]'); if(first) first.focus(); }
function closeDrawer(){ const wasOpen=sidebar.classList.contains('open'); sidebar.classList.remove('open'); scrim.classList.remove('show'); const mb=document.getElementById('menuBtn'); if(mb) mb.setAttribute('aria-expanded','false'); if(wasOpen && drawerPrevFocus && drawerPrevFocus.focus){ try{ drawerPrevFocus.focus(); }catch(e){} drawerPrevFocus=null; } }
document.getElementById('menuBtn').addEventListener('click',()=>sidebar.classList.contains('open')?closeDrawer():openDrawer());
scrim.addEventListener('click',closeDrawer);
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && sidebar.classList.contains('open')) closeDrawer(); });

/* ----- init ----- */
(function init(){
  try{
    applyTheme(Store.get('theme')||'light');
    const last=Store.get('last'); if(last){ try{ route=JSON.parse(last); }catch(e){} }
    if(route.type==='sub' && !findSub(route.id)) route={type:'overview'};
    render();
  }catch(err){
    view.innerHTML='<div class="empty"><p>Something went wrong loading the workspace.</p><pre style="font-size:12px;color:var(--ink-faint)">'+escapeHtml(String(err))+'</pre></div>';
    console.error(err);
  }
})();
</script>
</body>
