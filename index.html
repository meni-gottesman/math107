<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MATH 107 ┬Ę Data, Functions &amp; Graphs ŌĆö Study Workspace</title>
<meta name="description" content="An interactive precalculus study workspace for Occidental MATH 107: lessons, ranked videos, worksheets, answer keys, and timed tests with progress tracking." />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- KaTeX (math rendering) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<style>
:root{
  --ink:#16243c; --ink-soft:#41506b; --ink-faint:#7e8aa1;
  --teal:#0e7c7b; --cyan:#127d92; --cyan-bright:#1593a8;
  --paper:#faf9f5; --panel:#ffffff; --panel-2:#f3f5f9;
  --line:#e6eaf1; --line-strong:#d3dae6;
  --grid:#eef1f7;
  --good:#2f8f5b; --good-bg:#e8f3ec; --amber:#bd8324; --amber-bg:#f8f0e0;
  --shadow:0 1px 2px rgba(20,30,50,.04),0 6px 22px rgba(20,30,50,.06);
  --shadow-lg:0 10px 40px rgba(20,30,50,.14);
  --radius:14px; --radius-sm:9px;
  --sidebar-w:312px;
  --font-display:'Spectral',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,monospace;
}
[data-theme="dark"]{
  --ink:#e9edf5; --ink-soft:#b3bdd0; --ink-faint:#7a86a0;
  --teal:#4fc5c0; --cyan:#5cc6d8; --cyan-bright:#6dd2e3;
  --paper:#0e1626; --panel:#152034; --panel-2:#1b2840;
  --line:#243352; --line-strong:#2d3f63;
  --grid:#172238;
  --good:#5cc08a; --good-bg:#16301f; --amber:#dcae6a; --amber-bg:#2c2616;
  --shadow:0 1px 2px rgba(0,0,0,.2),0 8px 26px rgba(0,0,0,.28);
  --shadow-lg:0 14px 48px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-body); color:var(--ink); background:var(--paper);
  -webkit-font-smoothing:antialiased; line-height:1.6; font-size:16px;
}
a{color:var(--cyan-bright); text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2.5px solid var(--cyan-bright); outline-offset:2px; border-radius:4px}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:18px;
  padding:12px 22px; background:color-mix(in srgb,var(--panel) 86%, transparent);
  backdrop-filter:saturate(140%) blur(10px); border-bottom:1px solid var(--line);
}
.brand{display:flex; align-items:center; gap:13px; min-width:0}
.brand .mark{
  flex:0 0 auto; width:42px; height:42px; border-radius:11px; display:grid; place-items:center;
  background:linear-gradient(150deg,var(--ink),#27395c); color:#fff; position:relative; overflow:hidden;
  box-shadow:var(--shadow);
}
.brand .mark svg{width:26px;height:26px}
.brand-txt{min-width:0}
.brand .eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.18em; color:var(--teal); text-transform:uppercase; font-weight:600}
.brand h1{font-family:var(--font-display); font-weight:600; font-size:18px; margin:0; line-height:1.1; letter-spacing:.1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.spacer{flex:1 1 auto}
.tools{display:flex; align-items:center; gap:10px}
.search{position:relative; display:flex; align-items:center}
.search input{
  font-family:var(--font-body); font-size:13.5px; color:var(--ink);
  background:var(--panel-2); border:1px solid var(--line); border-radius:999px;
  padding:8px 14px 8px 34px; width:200px; transition:width .2s, box-shadow .2s;
}
.search input::placeholder{color:var(--ink-faint)}
.search input:focus{width:240px; box-shadow:0 0 0 3px color-mix(in srgb,var(--cyan-bright) 18%,transparent)}
.search svg{position:absolute; left:11px; width:15px; height:15px; color:var(--ink-faint); pointer-events:none}
.iconbtn{
  display:grid; place-items:center; width:38px; height:38px; border-radius:10px; cursor:pointer;
  background:var(--panel-2); border:1px solid var(--line); color:var(--ink-soft); transition:.15s;
}
.iconbtn:hover{color:var(--ink); border-color:var(--line-strong); transform:translateY(-1px)}
.iconbtn svg{width:18px;height:18px}
.ring{display:flex; align-items:center; gap:9px}
.ring svg{width:38px;height:38px; transform:rotate(-90deg)}
.ring .track{fill:none; stroke:var(--line-strong); stroke-width:4}
.ring .fill{fill:none; stroke:var(--teal); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.ring .pct{font-family:var(--font-mono); font-weight:600; font-size:13px; color:var(--ink)}
.ring .lbl{font-size:11px; color:var(--ink-faint); line-height:1.1; max-width:64px}
.hamburger{display:none}

/* ---------- Layout ---------- */
.layout{display:grid; grid-template-columns:var(--sidebar-w) 1fr; min-height:calc(100vh - 67px)}
.sidebar{
  border-right:1px solid var(--line); background:var(--panel);
  position:sticky; top:67px; height:calc(100vh - 67px); overflow-y:auto; padding:18px 14px 60px;
}
.sidebar::-webkit-scrollbar{width:9px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:9px; border:3px solid var(--panel)}
.nav-section-label{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); padding:6px 12px; margin-top:8px; font-weight:600}
.nav-item{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left; cursor:pointer;
  padding:9px 12px; border-radius:10px; border:0; background:transparent; color:var(--ink-soft);
  font-family:var(--font-body); font-size:14px; line-height:1.25; transition:.13s;
}
.nav-item:hover{background:var(--panel-2); color:var(--ink)}
.nav-item.active{background:color-mix(in srgb,var(--teal) 12%,transparent); color:var(--ink); font-weight:600}
.nav-item.active .num{color:var(--teal)}
.nav-item .num{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint); flex:0 0 auto; width:26px}
.nav-item .txt{flex:1 1 auto; min-width:0}
.dot{flex:0 0 auto; width:15px; height:15px; border-radius:50%; border:2px solid var(--line-strong); display:grid; place-items:center}
.dot.done{background:var(--good); border-color:var(--good)}
.dot.done::after{content:""; width:5px; height:5px; background:#fff; border-radius:50%}
.dot.partial{border-color:var(--teal); background:radial-gradient(circle at center, var(--teal) 0 40%, transparent 42%)}

.unit-head{
  display:flex; align-items:center; gap:9px; width:100%; cursor:pointer; padding:11px 12px; border:0; border-radius:10px;
  background:transparent; color:var(--ink); font-family:var(--font-body); font-weight:600; font-size:14px; transition:.13s; margin-top:2px;
}
.unit-head:hover{background:var(--panel-2)}
.unit-head .chev{width:14px;height:14px; color:var(--ink-faint); transition:transform .2s; flex:0 0 auto}
.unit-head[aria-expanded="true"] .chev{transform:rotate(90deg)}
.unit-head .un{font-family:var(--font-mono); font-size:11px; color:var(--teal); flex:0 0 auto}
.unit-head .nm{flex:1 1 auto; min-width:0; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.unit-head.locked{color:var(--ink-faint)}
.unit-head.locked .un{color:var(--ink-faint)}
.lock{width:13px;height:13px;color:var(--ink-faint);flex:0 0 auto}
.unit-bar{height:3px; border-radius:3px; background:var(--line); margin:2px 14px 0; overflow:hidden}
.unit-bar > i{display:block; height:100%; background:var(--teal); border-radius:3px; transition:width .5s}
.sublist{overflow:hidden; padding-left:10px; margin-left:14px; border-left:1px solid var(--line)}
.sublist[hidden]{display:none}

/* ---------- Content ---------- */
.content{
  padding:40px clamp(20px,5vw,72px) 100px; max-width:980px; margin:0 auto; width:100%;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:26px 26px; background-position:-1px -1px;
}
.content-inner{background:var(--paper)}
.view{animation:fade .35s ease}
@keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}

.eyebrow{font-family:var(--font-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--teal); font-weight:600; display:flex; align-items:center; gap:10px}
.page-title{font-family:var(--font-display); font-weight:600; font-size:clamp(28px,4vw,40px); line-height:1.12; margin:10px 0 6px; letter-spacing:-.3px}
.lede{font-size:17px; color:var(--ink-soft); max-width:64ch; margin:0 0 8px}
hr.rule{border:0; border-top:1px solid var(--line); margin:26px 0}

/* completion chips */
.progress-chips{display:flex; flex-wrap:wrap; gap:10px; margin:22px 0 8px}
.chip{
  display:inline-flex; align-items:center; gap:9px; cursor:pointer; user-select:none;
  font-size:13.5px; font-weight:500; padding:9px 15px 9px 12px; border-radius:999px;
  background:var(--panel); border:1.5px solid var(--line-strong); color:var(--ink-soft); transition:.15s;
}
.chip:hover{border-color:var(--teal); color:var(--ink)}
.chip .box{width:18px; height:18px; border-radius:6px; border:2px solid var(--line-strong); display:grid; place-items:center; transition:.15s}
.chip .box svg{width:12px;height:12px; color:#fff; opacity:0; transform:scale(.5); transition:.15s}
.chip.on{background:var(--good-bg); border-color:var(--good); color:var(--ink)}
.chip.on .box{background:var(--good); border-color:var(--good)}
.chip.on .box svg{opacity:1; transform:none}

/* tabs */
.tabs{display:flex; gap:4px; border-bottom:1px solid var(--line); margin:18px 0 0}
.tab{
  font-family:var(--font-body); font-size:14.5px; font-weight:500; cursor:pointer; color:var(--ink-faint);
  background:transparent; border:0; padding:12px 16px; border-bottom:2.5px solid transparent; margin-bottom:-1px; transition:.13s;
}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink); border-bottom-color:var(--teal); font-weight:600}
.tab .tnum{font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-left:6px}
.panel-body{padding:22px 0}

/* cheat sheet typography */
.cs h4{font-family:var(--font-display); font-size:20px; font-weight:600; color:var(--ink); margin:26px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--line)}
.cs h4:first-child{margin-top:4px}
.cs p{margin:10px 0}
.cs ul,.cs ol{margin:10px 0; padding-left:22px}
.cs li{margin:5px 0}
.cs strong{color:var(--ink); font-weight:600}
.cs em{color:var(--ink-soft)}
table.ref{border-collapse:collapse; width:100%; margin:14px 0; font-size:14.5px; box-shadow:var(--shadow); border-radius:10px; overflow:hidden}
table.ref th,table.ref td{text-align:left; padding:10px 14px; border-bottom:1px solid var(--line)}
table.ref thead th{background:var(--ink); color:#fff; font-family:var(--font-mono); font-size:11.5px; letter-spacing:.05em; text-transform:uppercase; font-weight:500}
[data-theme="dark"] table.ref thead th{background:#0b1422}
table.ref tbody tr:nth-child(even){background:var(--panel-2)}
table.ref tbody tr:last-child td{border-bottom:0}
.callout{background:var(--panel-2); border-left:3px solid var(--teal); border-radius:0 10px 10px 0; padding:14px 18px; margin:16px 0}
.callout.formula{border-left-color:var(--cyan-bright)}
.callout .co-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); font-weight:600; display:block; margin-bottom:4px}
.callout.warn{border-left-color:var(--amber); background:var(--amber-bg)}
.callout.warn .co-label{color:var(--amber)}

/* video cards */
.vid-grid{display:grid; gap:12px; margin:8px 0}
.vid{display:flex; gap:14px; align-items:flex-start; padding:14px; border:1px solid var(--line); border-radius:12px; background:var(--panel); box-shadow:var(--shadow); transition:.15s}
.vid:hover{border-color:var(--line-strong); transform:translateY(-1px)}
.vid .rank{flex:0 0 auto; width:30px; height:30px; border-radius:8px; background:color-mix(in srgb,var(--teal) 14%,transparent); color:var(--teal); font-family:var(--font-mono); font-weight:600; font-size:14px; display:grid; place-items:center}
.vid .vmeta{flex:1 1 auto; min-width:0}
.vid .vtitle{font-weight:600; font-size:15px; color:var(--ink); margin:0 0 2px}
.vid .vchan{font-size:12.5px; color:var(--ink-faint); font-family:var(--font-mono)}
.vid .vnote{font-size:13.5px; color:var(--ink-soft); margin:5px 0 9px}
.vid .vactions{display:flex; gap:8px; flex-wrap:wrap}
.btn-sm{font-size:12.5px; font-weight:500; padding:6px 12px; border-radius:8px; border:1px solid var(--line-strong); background:var(--panel-2); color:var(--ink-soft); cursor:pointer; transition:.13s; display:inline-flex; align-items:center; gap:6px}
.btn-sm:hover{color:var(--ink); border-color:var(--teal); text-decoration:none}
.btn-sm.primary{background:var(--teal); border-color:var(--teal); color:#fff}
.btn-sm.primary:hover{background:#0c6a69}
.embed{margin-top:12px; border-radius:12px; overflow:hidden; aspect-ratio:16/9; background:#000; box-shadow:var(--shadow)}
.embed iframe{width:100%; height:100%; border:0; display:block}

/* worksheet / key */
.wpart{margin:22px 0}
.wpart h5{font-family:var(--font-mono); font-size:12.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--teal); font-weight:600; margin:0 0 6px; padding-bottom:6px; border-bottom:1px solid var(--line)}
ol.problems{list-style:none; counter-reset:none; margin:0; padding:0}
ol.problems li{display:flex; gap:14px; padding:9px 4px; align-items:baseline; border-bottom:1px dashed var(--line)}
ol.problems li:last-child{border-bottom:0}
ol.problems li .pn{font-family:var(--font-mono); font-size:13px; color:var(--ink-faint); flex:0 0 auto; width:30px; text-align:right}
ol.problems li .pb{flex:1 1 auto}
.key-gate{display:grid; place-items:center; padding:42px 20px; text-align:center; border:1.5px dashed var(--line-strong); border-radius:14px; background:var(--panel-2)}
.key-gate p{max-width:46ch; color:var(--ink-soft); margin:10px 0 18px}
.sol .pb{color:var(--ink-soft)}
.sol .pb strong{color:var(--ink)}

/* notes */
.notes{margin-top:30px; border:1px solid var(--line); border-radius:14px; padding:18px; background:var(--panel); box-shadow:var(--shadow)}
.notes label{font-family:var(--font-mono); font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); font-weight:600; display:flex; align-items:center; gap:8px}
.notes textarea{width:100%; margin-top:10px; min-height:90px; resize:vertical; font-family:var(--font-body); font-size:14.5px; color:var(--ink); background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px}
.notes .saved{font-size:12px; color:var(--ink-faint); margin-top:6px; height:14px}

/* prev / next */
.pager{display:flex; justify-content:space-between; gap:12px; margin-top:38px}
.pager a{flex:1 1 0; min-width:0; border:1px solid var(--line); border-radius:12px; padding:14px 18px; background:var(--panel); box-shadow:var(--shadow); transition:.15s}
.pager a:hover{border-color:var(--teal); text-decoration:none; transform:translateY(-1px)}
.pager a.next{text-align:right}
.pager .pk{font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint)}
.pager .pt{display:block; font-weight:600; color:var(--ink); margin-top:3px}
.pager a[aria-disabled="true"]{opacity:.4; pointer-events:none}

/* tests */
.meta-row{display:flex; flex-wrap:wrap; gap:10px; margin:16px 0}
.pill{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:500; padding:7px 13px; border-radius:999px; background:var(--panel-2); border:1px solid var(--line); color:var(--ink-soft)}
.pill svg{width:14px;height:14px;color:var(--teal)}
.tsection{margin:24px 0}
.tsection h5{font-family:var(--font-display); font-size:18px; font-weight:600; color:var(--ink); margin:0 0 8px; padding-bottom:6px; border-bottom:1px solid var(--line)}
.score-box{display:flex; flex-wrap:wrap; align-items:center; gap:14px; margin-top:22px; padding:18px; border:1px solid var(--line); border-radius:14px; background:var(--panel); box-shadow:var(--shadow)}
.score-box label{font-weight:600; font-size:14px}
.score-box input{width:84px; font-family:var(--font-mono); font-size:15px; text-align:center; padding:9px; border:1px solid var(--line-strong); border-radius:9px; background:var(--panel-2); color:var(--ink)}
.mastery{font-weight:600; font-size:14px; padding:7px 14px; border-radius:999px}
.mastery.m0{background:var(--panel-2); color:var(--ink-faint)}
.mastery.m1{background:#fbeae6; color:#b4421f}
.mastery.m2{background:var(--amber-bg); color:var(--amber)}
.mastery.m3{background:var(--good-bg); color:var(--good)}
[data-theme="dark"] .mastery.m1{background:#3a1d16;color:#f0a48c}

/* overview specifics */
.hero{position:relative; padding:30px 30px 32px; border-radius:18px; overflow:hidden; margin-bottom:8px;
  background:linear-gradient(135deg,var(--ink),#243a5e); color:#fff; box-shadow:var(--shadow-lg)}
.hero::before{content:""; position:absolute; inset:0; opacity:.16;
  background-image:linear-gradient(#fff 1px,transparent 1px),linear-gradient(90deg,#fff 1px,transparent 1px); background-size:28px 28px}
.hero::after{content:""; position:absolute; right:-40px; top:-40px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle,var(--teal),transparent 70%); opacity:.45}
.hero .h-eye{position:relative; font-family:var(--font-mono); font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#8fe0db; font-weight:600}
.hero h2{position:relative; font-family:var(--font-display); font-weight:600; font-size:clamp(26px,4vw,38px); margin:10px 0 8px; line-height:1.1}
.hero p{position:relative; max-width:60ch; color:#d6deec; margin:0; font-size:16px}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:22px 0}
.card{border:1px solid var(--line); border-radius:14px; padding:18px 20px; background:var(--panel); box-shadow:var(--shadow)}
.card h3{font-family:var(--font-display); font-size:18px; font-weight:600; margin:0 0 8px}
.steps{counter-reset:step; list-style:none; padding:0; margin:8px 0}
.steps li{display:flex; gap:12px; padding:7px 0; align-items:flex-start}
.steps li::before{counter-increment:step; content:counter(step); flex:0 0 auto; width:24px; height:24px; border-radius:7px; background:color-mix(in srgb,var(--teal) 14%,transparent); color:var(--teal); font-family:var(--font-mono); font-weight:600; font-size:13px; display:grid; place-items:center}
.roadmap{display:grid; gap:10px; margin:14px 0}
.rm-unit{border:1px solid var(--line); border-radius:12px; padding:13px 16px; background:var(--panel); box-shadow:var(--shadow)}
.rm-unit .rm-h{display:flex; align-items:center; gap:10px; margin-bottom:8px}
.rm-unit .rm-h .un{font-family:var(--font-mono); font-size:12px; color:var(--teal); font-weight:600}
.rm-unit .rm-h .nm{font-weight:600}
.rm-unit .rm-h .tag{margin-left:auto; font-family:var(--font-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; padding:3px 9px; border-radius:999px}
.tag.ready{background:var(--good-bg); color:var(--good)}
.tag.soon{background:var(--panel-2); color:var(--ink-faint)}
.subchips{display:flex; flex-wrap:wrap; gap:7px}
.subchips span{font-size:12.5px; color:var(--ink-soft); background:var(--panel-2); border:1px solid var(--line); border-radius:999px; padding:4px 11px}
.subchips span.cl{cursor:pointer; transition:.13s}
.subchips span.cl:hover{border-color:var(--teal); color:var(--ink)}

.empty{display:grid; place-items:center; text-align:center; padding:60px 20px; color:var(--ink-faint)}
.empty svg{width:42px;height:42px;margin-bottom:14px;color:var(--line-strong)}
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:13.5px; box-shadow:var(--shadow-lg); opacity:0; pointer-events:none; transition:.3s; z-index:80}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

.scrim{display:none; position:fixed; inset:0; background:rgba(10,16,28,.5); z-index:35}

@media (max-width:880px){
  :root{--sidebar-w:300px}
  .hamburger{display:grid}
  .layout{grid-template-columns:1fr}

<p>The <strong>domain</strong> is every allowable input $x$; the <strong>range</strong> is every resulting output $y$.</p>
<h4>Domain from a formula ŌĆö only three things can break</h4>
<table class="ref"><thead><tr><th>Issue</th><th>Requirement</th></tr></thead><tbody>

</tbody></table>
<p>If none is present ŌĆö a polynomial, $\sin x$, $\cos x$ ŌĆö the domain is all reals, $(-\infty,\infty)$. With two issues at once, take the <em>overlap</em>. A square root in a denominator needs the inside strictly $>0$.</p>
<h4>Domain & range from a graph</h4>
<p>Domain is the graph's shadow on the horizontal axis (sweep left to right); range is its shadow on the vertical axis (sweep bottom to top). An <strong>open circle</strong> excludes (parenthesis); a <strong>closed dot</strong> includes (bracket); an <strong>arrow</strong> continues to $\pm\infty$.</p>
<div class="callout formula"><span class="co-label">Interval notation</span>$(a,b)$ excludes ends, $[a,b]$ includes, mixes allowed. Join pieces with $\cup$. $\infty$ and $-\infty$ always take parentheses. "All reals except $2$" $=(-\infty,2)\cup(2,\infty)$.</div>
<div class="callout"><span class="co-label">Parent domains to memorize</span>Polynomials, $\sin x$, $\cos x$: all reals. $1/x$: $x\neq0$. $\sqrt{x}$: $x\ge0$. $\ln x$: $x>0$.</div>
<p><strong>Worked example.</strong> $f(x)=\dfrac{\sqrt{x+2}}{x-3}$: the root needs $x\ge-2$, the denominator needs $x\neq3$, so the domain is $[-2,3)\cup(3,\infty)$.</p>
<div class="callout warn"><span class="co-label">Common errors</span>Reading the range off the horizontal axis; a bracket on $\infty$; forgetting a root and a denominator can both restrict at once.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>Domain restrictions become continuity and one-sided-limit issues; you can only differentiate where a function is defined.</div>`,

          ],
          cs: R`<h4>Average rate of change</h4>
<div class="callout formula"><span class="co-label">Definition</span>Over $[a,b]$, $\ \text{AROC}=\dfrac{\Delta y}{\Delta x}=\dfrac{f(b)-f(a)}{b-a}.$ It answers: on average, how many output units per input unit did $f$ change? Always carry units.</div>
<p><strong>Geometric meaning:</strong> it is the slope of the <strong>secant line</strong> through $(a,f(a))$ and $(b,f(b))$.</p>
<p><strong>From a table:</strong> pick the two rows and apply the formula. <strong>Linearity test:</strong> if AROC is the <em>same over every interval</em>, the function is linear and that constant is the slope; if it changes, the function is curved.</p>
<h4>The difference quotient</h4>
<div class="callout formula"><span class="co-label">Formula</span>Over $[x,x+h]$: $\ \dfrac{f(x+h)-f(x)}{h}.$ Simplify to a formula in $x$ and $h$. Calculus shrinks $h\to0$ to get the <strong>derivative</strong>.</div>
<p><strong>Worked example.</strong> For $f(x)=x^2$: $\dfrac{(x+h)^2-x^2}{h}=\dfrac{2xh+h^2}{h}=2x+h$; as $h\to0$ this becomes $2x$.</p>
<p><strong>Sign:</strong> positive means it rose on average; negative means it fell; zero means equal endpoints (no net change), though it may have moved in between.</p>
<div class="callout warn"><span class="co-label">Common errors</span>Averaging the $y$-values instead of $\Delta y/\Delta x$. Reversing order ŌĆö keep "later minus earlier" top and bottom. In the difference quotient, distribute the minus across <em>all</em> of $f(x)$.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>This is the derivative in embryo: secant becomes tangent, average rate becomes instantaneous rate. Everything in Calculus 1 grows from here.</div>`,

          cs: R`<h4>Piecewise functions</h4>
<p>A different rule on different parts of the domain. <strong>Evaluate:</strong> find which condition the input meets, use that piece. <strong>Graph:</strong> draw each piece only over its interval; <strong>open circle</strong> excludes an endpoint, <strong>closed dot</strong> includes it.</p>
<h4>Symmetry</h4>
<table class="ref"><thead><tr><th>Type</th><th>Test</th><th>Symmetric about</th><th>Examples</th></tr></thead><tbody>
<tr><td>Even</td><td>$f(-x)=f(x)$</td><td>the vertical axis</td><td>$x^2,\ |x|,\ \cos x$</td></tr>
<tr><td>Odd</td><td>$f(-x)=-f(x)$</td><td>the origin</td><td>$x^3,\ x,\ \sin x$</td></tr>
<tr><td>Neither</td><td>matches neither</td><td>ŌĆö</td><td>$x^2+x,\ x^3+1$</td></tr>
</tbody></table>
<p>Test by computing the general $f(-x)$ and comparing to $f(x)$ and $-f(x)$ ŌĆö not by plugging in one number.</p>
<h4>Increasing / decreasing & extrema</h4>
<p>Read left to right: rising is increasing, falling is decreasing, flat is constant ŌĆö reported as intervals of $x$. A <strong>local maximum</strong> is a peak and a <strong>local minimum</strong> a valley; they occur where the function switches between increasing and decreasing. The <em>value</em> is the output ($y$); the <em>location</em> is the input ($x$).</p>
<h4>Concavity</h4>
<p><strong>Concave up</strong> bends up like a cup (slopes increasing); <strong>concave down</strong> bends down like a cap (slopes decreasing); an <strong>inflection point</strong> is where concavity switches. It is independent of increasing/decreasing ŌĆö a function can be increasing while concave down (rising but leveling off).</p>
<p><strong>Worked example.</strong> $f(x)=x^3+x$: $f(-x)=-x^3-x=-(x^3+x)=-f(x)$, so $f$ is <strong>odd</strong>.</p>
<div class="callout warn"><span class="co-label">Common errors</span>Forgetting open/closed dots at boundaries; confusing "increasing" (slope) with "concave up" (change in slope); giving a max/min location when the value is asked.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>Increasing/decreasing Ōåö sign of the first derivative; concavity Ōåö sign of the second derivative; local extrema Ōåö critical points. You learn to read by eye what calculus computes exactly.</div>`,

          ],
          cs: R`<h4>What makes a function linear</h4>
<p>A <strong>linear function</strong> changes at a <em>constant rate</em>. Its formula is $f(x)=mx+b$, where $m$ is the <strong>slope</strong> (the rate of change) and $b$ is the <strong>vertical intercept</strong> (the output when $x=0$).</p>
<div class="callout formula"><span class="co-label">Slope</span>$m=\dfrac{\Delta y}{\Delta x}=\dfrac{\text{rise}}{\text{run}}=\dfrac{y_2-y_1}{x_2-x_1}.$ It is the same between <em>every</em> pair of points on the line.</div>
<h4>Spotting linearity</h4>
<table class="ref"><thead><tr><th>Representation</th><th>Linear whenŌĆ”</th></tr></thead><tbody>
<tr><td>Table</td><td>equal steps in $x$ give equal jumps in $y$ (constant first differences)</td></tr>
<tr><td>Graph</td><td>the points lie on a straight line</td></tr>
<tr><td>Formula</td><td>$x$ appears only to the first power, as $mx+b$</td></tr>
</tbody></table>
<h4>Reading the slope</h4>
<table class="ref"><thead><tr><th>Slope</th><th>Line</th></tr></thead><tbody>
<tr><td>$m>0$</td><td>increasing (rises left to right)</td></tr>
<tr><td>$m<0$</td><td>decreasing (falls)</td></tr>
<tr><td>$m=0$</td><td>horizontal, $y=b$</td></tr>
<tr><td>undefined</td><td>vertical, $x=a$</td></tr>
</tbody></table>
<div class="callout"><span class="co-label">Interpreting slope in context</span>The slope carries units of <em>output per input</em> ŌĆö "30 dollars per month," "0.04 gallons used per mile." The intercept is the starting value, at $x=0$.</div>
<div class="callout warn"><span class="co-label">Common errors</span>Flipping the slope formula to $\dfrac{x_2-x_1}{y_2-y_1}$. Calling a horizontal line's slope "undefined" ŌĆö it is $0$; only a <em>vertical</em> line has undefined slope.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>A linear function's average rate of change equals its slope on every interval ŌĆö the one function whose instantaneous rate (derivative) is constant.</div>`,

          ],
          cs: R`<h4>Three forms of a line</h4>
<table class="ref"><thead><tr><th>Form</th><th>Equation</th><th>Use when you knowŌĆ”</th></tr></thead><tbody>
<tr><td>Slope-intercept</td><td>$y=mx+b$</td><td>the slope and the $y$-intercept</td></tr>
<tr><td>Point-slope</td><td>$y-y_1=m(x-x_1)$</td><td>the slope and any one point</td></tr>
<tr><td>Standard</td><td>$Ax+By=C$</td><td>you want integer coefficients or intercepts</td></tr>
</tbody></table>
<h4>Building the equation</h4>
<ul>
<li><strong>Slope + point:</strong> drop into point-slope, then simplify to $y=mx+b$.</li>
<li><strong>Two points:</strong> find $m=\dfrac{y_2-y_1}{x_2-x_1}$ first, then use point-slope with either point.</li>
<li><strong>From a table:</strong> $m$ is the constant jump per unit step; $b$ is the value at $x=0$.</li>
</ul>
<div class="callout formula"><span class="co-label">Parallel and perpendicular</span><strong>Parallel</strong> lines have <em>equal</em> slopes: $m_1=m_2$. <strong>Perpendicular</strong> lines have slopes that are <em>negative reciprocals</em>: $m_1 m_2=-1$, so $m_2=-\dfrac{1}{m_1}$.</div>
<h4>Special lines</h4>
<p><strong>Horizontal:</strong> $y=b$ (slope $0$). <strong>Vertical:</strong> $x=a$ (undefined slope ŌĆö not a function).</p>
<div class="callout warn"><span class="co-label">Common errors</span>Plugging a point in as $(x,y)$ instead of $(x_1,y_1)$ in point-slope. Swapping the rules ŌĆö equal slopes are parallel; negative reciprocals are perpendicular.</div>

<p>The <strong>line of best fit</strong> (least-squares regression line) is the straight line $y=mx+b$ closest to all the points ŌĆö it minimizes the total squared vertical distance. Use it as a model: read its slope (a rate) and intercept (a starting value), and substitute an $x$ to <strong>predict</strong>.</p>

<p>Every transformation starts from a known basic shape. Memorize these.</p>
<table class="ref"><thead><tr><th>Parent</th><th>Shape</th><th>Parent</th><th>Shape</th></tr></thead><tbody>
<tr><td>$f(x)=x$</td><td>line</td><td>$f(x)=\sqrt{x}$</td><td>half-sideways parabola</td></tr>
<tr><td>$f(x)=x^2$</td><td>parabola (cup)</td><td>$f(x)=|x|$</td><td>V-shape</td></tr>
<tr><td>$f(x)=x^3$</td><td>S-curve</td><td>$f(x)=\dfrac1x$</td><td>two hyperbola branches</td></tr>

<h4>Shifts</h4>
<table class="ref"><thead><tr><th>Change</th><th>Effect</th><th>Note</th></tr></thead><tbody>
<tr><td>$f(x)+k$</td><td>up $k$</td><td>outside ŌĆö moves as expected</td></tr>

<tr><td>$f(x-h)$</td><td>right $h$</td><td>inside ŌĆö <em>opposite</em> of the sign</td></tr>
<tr><td>$f(x+h)$</td><td>left $h$</td><td>inside</td></tr>

<div class="callout warn"><span class="co-label">The classic trap</span>Horizontal shifts go the <em>opposite</em> way from the sign: $f(x-3)$ moves <strong>right</strong> $3$ (solve $x-3=0$). Vertical shifts behave normally.</div>

          cs: R`<h4>Vertical scaling (outside)</h4>

          cs: R`<h4>Three forms of a parabola</h4>
<table class="ref"><thead><tr><th>Form</th><th>Equation</th><th>Reveals</th></tr></thead><tbody>
<tr><td>Standard</td><td>$f(x)=ax^2+bx+c$</td><td>$y$-intercept $c$</td></tr>
<tr><td>Vertex</td><td>$f(x)=a(x-h)^2+k$</td><td>vertex $(h,k)$</td></tr>
<tr><td>Factored</td><td>$f(x)=a(x-r_1)(x-r_2)$</td><td>roots $r_1,r_2$</td></tr>
</tbody></table>
<div class="callout formula"><span class="co-label">Vertex from standard form</span>$h=-\dfrac{b}{2a}$, then $k=f(h)$. The axis of symmetry is $x=h$. If $a>0$ the parabola opens up (vertex is a minimum); if $a<0$ it opens down (maximum).</div>
<h4>Completing the square</h4>
<p>To convert $x^2+bx+c$ to vertex form: take half of $b$, square it, add and subtract it. Example: $x^2+6x+5=(x^2+6x+9)-9+5=(x+3)^2-4$, so the vertex is $(-3,-4)$.</p>
<h4>Solving and the discriminant</h4>
<p>Factor when possible; otherwise use $x=\dfrac{-b\pm\sqrt{b^2-4ac}}{2a}$. The <strong>discriminant</strong> $b^2-4ac$ tells the root count: positive gives two real roots, zero gives one (a double root), negative gives none (the parabola misses the $x$-axis).</p>
<div class="callout warn"><span class="co-label">Common errors</span>Forgetting the $a$ when computing $k$. Sign slips in $-b/2a$. Adding the completing-the-square term without subtracting it back.</div>

          cs: R`<h4>Composition</h4>
<p>$(f\circ g)(x)=f\big(g(x)\big)$: do $g$ first, then feed the result into $f$. <strong>Order matters</strong> ŌĆö usually $f\circ g\neq g\circ f$.</p>
<p><strong>Decomposing</strong> reverses this: write a messy function as an inside $g$ and an outside $f$. For $h(x)=\sqrt{x+5}$, take $g(x)=x+5$ (inside) and $f(x)=\sqrt{x}$ (outside).</p>
<h4>Inverse functions</h4>
<div class="callout formula"><span class="co-label">Find an inverse</span>Write $y=f(x)$, <strong>swap $x$ and $y$</strong>, and solve for $y$. The result is $f^{-1}(x)$. It undoes $f$: $f\big(f^{-1}(x)\big)=x$ and $f^{-1}\big(f(x)\big)=x$.</div>
<p>A function has an inverse only if it is <strong>one-to-one</strong> ŌĆö each output comes from a single input. Test a graph with the <strong>horizontal line test</strong>. The graph of $f^{-1}$ is the reflection of $f$ over the line $y=x$, and their domains and ranges swap.</p>
<div class="callout warn"><span class="co-label">Common errors</span>Writing $f^{-1}(x)$ as $\dfrac{1}{f(x)}$ ŌĆö the $-1$ is not a reciprocal. Forgetting to swap before solving. Calling a non-one-to-one function (like $x^2$ over all reals) invertible.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>The chain rule differentiates compositions, and inverse-function derivatives are reciprocals ŌĆö both rest on this algebra.</div>`,

          ],
          cs: R`<h4>The exponential family</h4>
<p>An <strong>exponential function</strong> is $f(x)=a\,b^x$ with base $b>0$, $b\neq1$. The constant $a$ is the <strong>initial value</strong> (the $y$-intercept, at $x=0$). The base sets the behavior: $b>1$ gives <strong>growth</strong>, $0<b<1$ gives <strong>decay</strong>.</p>
<div class="callout formula"><span class="co-label">Constant percent change</span>Each unit step multiplies the output by $b$. Writing $b=1+r$, the quantity changes by the rate $r$ each step (e.g. $b=1.08$ is $+8\%$ per step; $b=0.9$ is $-10\%$).</div>
<h4>Graph features</h4>
<p>Domain is all real numbers; range is $(0,\infty)$ when $a>0$; the line $y=0$ is a <strong>horizontal asymptote</strong>. The graph never touches the $x$-axis.</p>
<div class="callout"><span class="co-label">The number e</span>$e\approx2.71828$ is the base of <strong>continuous</strong> growth: $f(x)=a\,e^{kx}$, with $k>0$ growth and $k<0$ decay.</div>
<div class="callout warn"><span class="co-label">Common errors</span>Reading $a$ as the base. Thinking the graph reaches $0$ ŌĆö it only approaches it. Confusing exponential growth (multiply by a ratio) with linear growth (add a constant).</div>

          cs: R`<h4>Definition</h4>
<div class="callout formula"><span class="co-label">Log is an exponent</span>$\log_b(x)=y$ means exactly $b^{\,y}=x$. A logarithm answers "what power of $b$ gives $x$?" It is the <strong>inverse</strong> of the exponential $b^x$.</div>
<p><strong>Common log</strong> $\log x$ is base $10$; <strong>natural log</strong> $\ln x$ is base $e$.</p>
<h4>Properties</h4>
<table class="ref"><thead><tr><th>Rule</th><th>Statement</th></tr></thead><tbody>
<tr><td>Product</td><td>$\log_b(MN)=\log_b M+\log_b N$</td></tr>
<tr><td>Quotient</td><td>$\log_b\!\left(\dfrac{M}{N}\right)=\log_b M-\log_b N$</td></tr>
<tr><td>Power</td><td>$\log_b(M^p)=p\,\log_b M$</td></tr>
<tr><td>Change of base</td><td>$\log_b x=\dfrac{\ln x}{\ln b}=\dfrac{\log x}{\log b}$</td></tr>
</tbody></table>
<p>Also $\log_b 1=0$, $\log_b b=1$, and $\log_b(b^x)=x$.</p>
<div class="callout warn"><span class="co-label">Common errors</span>$\log(M+N)$ is <em>not</em> $\log M+\log N$. The product rule applies to a product inside one log, not to a sum.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>$\ln x$ has the clean derivative $1/x$, and the log rules turn products into sums ŌĆö making hard derivatives easy by "logarithmic differentiation."</div>`,

          cs: R`<h4>The log graph</h4>
<p>$y=\log_b x$ is the inverse of $y=b^x$, so its graph is the reflection over $y=x$. Domain is $(0,\infty)$, range is all reals, and $x=0$ is a <strong>vertical asymptote</strong>. It passes through $(1,0)$.</p>
<h4>Solving exponential equations</h4>
<ul>
<li><strong>Same base:</strong> rewrite both sides with one base and set the exponents equal. $2^x=8\Rightarrow 2^x=2^3\Rightarrow x=3$.</li>
<li><strong>Different bases:</strong> take a log of both sides and use the power rule. $3^x=20\Rightarrow x=\dfrac{\ln 20}{\ln 3}$.</li>
</ul>
<h4>Solving logarithmic equations</h4>
<p>Condense to one log, rewrite in exponential form, and solve. <strong>Then check</strong>: reject any solution that makes the inside of a log zero or negative (extraneous).</p>
<div class="callout warn"><span class="co-label">Common errors</span>Forgetting to check log-equation answers for the domain. Splitting $\log(x+y)$ when solving.</div>
<div class="callout formula"><span class="co-label">Calculus connection</span>The vertical asymptote of $\ln x$ at $x=0$ is a one-sided limit going to $-\infty$ ŌĆö exactly the kind of behavior limits make precise.</div>`,
          ws:[
            {part:'A ŌĆö Log graph features', items: items(R`
Domain of $y=\log_2 x$ @@ Range of $y=\log_2 x$ @@ Vertical asymptote of $y=\ln x$ @@ A point every $\log_b x$ passes through`)},
            {part:'B ŌĆö Solve (same base)', items: items(R`
$2^x=16$ @@ $3^{x}=27$ @@ $5^{2x}=125$ @@ $\left(\tfrac12\right)^x=8$`)},
            {part:'C ŌĆö Solve (take a log)', items: items(R`
$3^x=20$ @@ $2^x=7$ @@ $e^x=10$ @@ $10^x=250$`)},
            {part:'D ŌĆö Solve log equations', items: items(R`
$\log_2 x=5$ @@ $\log_3(x-1)=2$ @@ $\ln x=0$ @@ $\log_2 x+\log_2(x-2)=3$`)},
            {part:'E ŌĆö Extraneous solutions', items: items(R`

          key:[

$(0,\infty)$ @@ all reals @@ $x=0$ @@ $(1,0)$`)},
            {part:'B', sols: items(R`

$x=2^5=32$ @@ $x-1=9\Rightarrow x=10$ @@ $x=e^0=1$ @@ $\log_2[x(x-2)]=3\Rightarrow x^2-2x=8\Rightarrow x=4$ (reject $-2$)`)},
            {part:'E', sols: items(R`

            {part:'F', sols: items(R`
$\log_b x$ inverts $b^x$, whose outputs are only positive, so its inputs (the log's domain) are $x>0$ @@ they are inverses ŌĆö reflections of each other across $y=x$`)}
          ]

<tr><td>constant <em>difference</em> per step</td><td>linear</td></tr>
<tr><td>constant <em>ratio</em> per step</td><td>exponential</td></tr>
<tr><td>values like $x^n$ (squares, cubes)</td><td>power / polynomial</td></tr>
<tr><td>repeating, oscillating values</td><td>sinusoidal (trigonometric)</td></tr>
<tr><td>levels off, slow then flat (asymptote)</td><td>logarithmic / bounded</td></tr>
<tr><td>two branches with asymptotes</td><td>rational</td></tr>
</tbody></table>
<div class="callout formula"><span class="co-label">The first test, always</span>Take equal steps in $x$. Constant difference means linear; constant ratio means exponential. If neither, look at the shape: oscillation points to trig, a ceiling points to a logarithm, asymptotes point to a rational function.</div>
<div class="callout warn"><span class="co-label">Common errors</span>Checking only differences and missing a constant ratio. Forcing a line through data that clearly curves.</div>`,

</tbody></table>

/* ---------- App ---------- */
const view = document.getElementById('view');
const sidebar = document.getElementById('sidebar');
const SUB_PARTS = [['lesson','Lesson'],['worksheet','Worksheet'],['answers','Answers reviewed']];

function findSub(id){
  for(const u of COURSE.units){ if(u.locked) continue; const s=(u.subtopics||[]).find(x=>x.id===id); if(s) return {u,s}; }
  return null;
}
function unlockedSubs(){ const a=[]; COURSE.units.forEach(u=>{ if(!u.locked)(u.subtopics||[]).forEach(s=>a.push({u,s})); }); return a; }
function totalItems(){ return unlockedSubs().length*3 + COURSE.tests.length; }
function doneItems(){
  let n=0;
  unlockedSubs().forEach(({s})=>SUB_PARTS.forEach(([k])=>{ if(Store.sub(s.id+':'+k)) n++; }));
  COURSE.tests.forEach(t=>{ if(Store.sub('test:'+t.id)) n++; });
  return n;
}
function subDone(s){ return SUB_PARTS.every(([k])=>Store.sub(s.id+':'+k)); }
function subPartial(s){ return SUB_PARTS.some(([k])=>Store.sub(s.id+':'+k)); }
function unitProgress(u){
  if(u.locked) return 0; const subs=u.subtopics||[]; if(!subs.length) return 0;
  let d=0; subs.forEach(s=>SUB_PARTS.forEach(([k])=>{ if(Store.sub(s.id+':'+k)) d++; }));
  return d/(subs.length*3);
}

/* ----- routing ----- */
let route = {type:'overview'};
function go(r){ route=r; Store.set('last', JSON.stringify(r)); render(); closeDrawer(); window.scrollTo({top:0,behavior:'smooth'}); }

function updateRing(){
  const tot=totalItems(), d=doneItems(), pct = tot? Math.round(d/tot*100):0;
  const C=2*Math.PI*16;
  document.getElementById('ringFill').style.strokeDashoffset = C*(1-pct/100);
  document.getElementById('ringPct').textContent = pct+'%';
}

/* ----- sidebar ----- */
function buildSidebar(){
  let h = '';
  h += '<div class="nav-section-label">Get started</div>';
  h += navItem('overview', '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M12 2l10 10-10 10L2 12z"/></svg>', 'Course overview', route.type==='overview');
  h += '<div class="nav-section-label">Units</div>';
  COURSE.units.forEach(u=>{
    const expanded = u.open && !u.locked;
    const pct = Math.round(unitProgress(u)*100);
    h += '<div data-unit="'+u.id+'">';
    h += '<button class="unit-head'+(u.locked?' locked':'')+'" aria-expanded="'+(expanded?'true':'false')+'" data-toggle="'+u.id+'">';
    h += '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 6 6 6-6 6"/></svg>';
    h += '<span class="un">'+u.n+'</span><span class="nm">'+u.name+'</span>';
    h += u.locked ? '<svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>' : '';
    h += '</button>';
    if(!u.locked) h += '<div class="unit-bar"><i style="width:'+pct+'%"></i></div>';
    h += '<div class="sublist" data-sublist="'+u.id+'"'+(expanded?'':' hidden')+'>';
    (u.subtopics||[]).forEach(s=>{
      if(u.locked){
        h += '<div class="nav-item" style="cursor:default;opacity:.6"><span class="num">'+s.id+'</span><span class="txt">'+s.name+'</span></div>';
      } else {
        const active = route.type==='sub' && route.id===s.id;
        const cls = subDone(s)?'dot done':(subPartial(s)?'dot partial':'dot');
        h += '<button class="nav-item'+(active?' active':'')+'" data-sub="'+s.id+'"><span class="num">'+s.id+'</span><span class="txt">'+s.name+'</span><span class="'+cls+'"></span></button>';
      }
    });
    if(u.locked) h += '<div class="nav-item" style="cursor:default;font-size:12.5px;color:var(--ink-faint)"><span class="num"></span><span class="txt">Content coming soon</span></div>';
    h += '</div></div>';
  });
  h += '<div class="nav-section-label">Assessments</div>';
  COURSE.tests.forEach(t=>{
    const active = route.type==='test' && route.id===t.id;
    const cls = Store.sub('test:'+t.id)?'dot done':'dot';
    h += '<button class="nav-item'+(active?' active':'')+'" data-test="'+t.id+'"><span class="num"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span class="txt">'+t.name.replace(' ŌĆö Functions','').replace('Test','Test')+'</span><span class="'+cls+'"></span></button>';
  });
  sidebar.innerHTML = h;
  // wire
  sidebar.querySelectorAll('[data-toggle]').forEach(b=>b.addEventListener('click',()=>{
    const id=b.getAttribute('data-toggle'); const list=sidebar.querySelector('[data-sublist="'+id+'"]');
    const exp=b.getAttribute('aria-expanded')==='true'; b.setAttribute('aria-expanded',(!exp).toString());
    if(list) list.hidden=exp;
  }));
  sidebar.querySelectorAll('[data-sub]').forEach(b=>b.addEventListener('click',()=>go({type:'sub',id:b.getAttribute('data-sub')})));
  sidebar.querySelectorAll('[data-test]').forEach(b=>b.addEventListener('click',()=>go({type:'test',id:b.getAttribute('data-test')})));
  sidebar.querySelectorAll('.nav-item[data-sub], .nav-item[data-test]').forEach(()=>{});
  const ov = sidebar.querySelector('[data-nav="overview"]'); if(ov) ov.addEventListener('click',()=>go({type:'overview'}));
}
function navItem(id,icon,label,active){
  return '<button class="nav-item'+(active?' active':'')+'" data-nav="'+id+'"><span class="num">'+icon+'</span><span class="txt">'+label+'</span></button>';
}

/* ----- views ----- */
function vidCard(v){
  const watch = v.id ? 'https://www.youtube.com/watch?v='+v.id : v.url;
  let actions = '';
  if(v.id){
    actions += '<button class="btn-sm primary" data-embed="'+v.id+'">Watch here</button>';
    actions += '<a class="btn-sm" href="'+watch+'" target="_blank" rel="noopener">Open on YouTube</a>';
  } else {
    actions += '<a class="btn-sm primary" href="'+watch+'" target="_blank" rel="noopener">Open video</a>';
  }
  return '<div class="vid"><div class="rank">'+v.rank+'</div><div class="vmeta">'
    +'<p class="vtitle">'+v.t+'</p><div class="vchan">'+v.ch+'</div>'
    +'<p class="vnote">'+v.note+'</p><div class="vactions">'+actions+'</div>'
    +'<div class="embed-slot"></div></div></div>';
}
function renderProblems(parts, isKey){
  let n=0, h='';
  parts.forEach(p=>{
    h += '<div class="wpart"><h5>'+(p.part||p.label)+'</h5><ol class="problems'+(isKey?' sol':'')+'">';
    (p.items||p.sols||p.q||p.s||[]).forEach(it=>{ n++; h+='<li><span class="pn">'+n+'.</span><span class="pb">'+it+'</span></li>'; });
    h += '</ol></div>';
  });
  return h;
}

function renderSub(id){
  const f = findSub(id); if(!f){ renderOverview(); return; }
  const {u,s}=f; const tab = route.tab||'lesson';
  let h = '<div class="view">';
  h += '<div class="eyebrow"><span>Unit '+u.n+'</span><span style="color:var(--line-strong)">/</span><span>'+s.id+'</span></div>';
  h += '<h1 class="page-title">'+s.name+'</h1>';
  h += '<p class="lede">'+(s.blurb||'')+'</p>';
  // completion chips
  h += '<div class="progress-chips">';
  SUB_PARTS.forEach(([k,label])=>{
    const on = Store.sub(s.id+':'+k);
    h += '<button class="chip'+(on?' on':'')+'" data-mark="'+s.id+':'+k+'"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 12l5 5L20 6"/></svg></span>'+label+'</button>';
  });
  h += '</div>';
  // tabs
  h += '<div class="tabs">';
  [['lesson','Lesson'],['worksheet','Worksheet'],['key','Answer key']].forEach(([k,label],i)=>{
    h += '<button class="tab'+(tab===k?' active':'')+'" data-tab="'+k+'">'+label+'</button>';
  });
  h += '</div><div class="panel-body" id="panelBody">';
  if(tab==='lesson'){
    h += '<div class="cs">'+s.cs+'</div>';
    h += '<h4 style="font-family:var(--font-display);font-size:20px;margin:28px 0 6px">Ranked videos</h4>';
    h += '<p style="color:var(--ink-soft);margin-top:0;font-size:14.5px">Ordered by usefulness for this topic. Watch #1 first; reach for the others to go deeper or for extra practice.</p>';
    h += '<div class="vid-grid">'+s.videos.map(vidCard).join('')+'</div>';
  } else if(tab==='worksheet'){
    h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px"><p style="margin:0;color:var(--ink-soft);font-size:14.5px">Work these closed-book, then check the answer key.</p><button class="btn-sm" onclick="window.print()">Print / save PDF</button></div>';
    h += renderProblems(s.ws,false);
  } else {
    if(!revealed[s.id]){
      h += '<div class="key-gate"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="var(--ink-faint)" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>'
        +'<p>Try the worksheet first. Reveal the worked solutions only when you are ready to check.</p>'
        +'<button class="btn-sm primary" data-reveal="'+s.id+'">Reveal answer key</button></div>';
    } else {
      h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px"><p style="margin:0;color:var(--ink-soft);font-size:14.5px">Worked solutions. For each miss, redo the problem from scratch.</p><button class="btn-sm" data-hide="'+s.id+'">Hide</button></div>';
      h += renderProblems(s.key,true);
    }
  }
  h += '</div>';
  // notes
  h += '<div class="notes"><label><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg> My notes for '+s.id+'</label>'
    +'<textarea id="noteArea" placeholder="Jot down sticking points, formulas to remember, or questions for your tutorŌĆ”">'+escapeHtml(Store.note(s.id))+'</textarea>'
    +'<div class="saved" id="noteSaved"></div></div>';
  // pager
  const list = unlockedSubs(); const idx = list.findIndex(x=>x.s.id===id);
  const prev = idx>0?list[idx-1]:null, next = idx<list.length-1?list[idx+1]:null;
  h += '<div class="pager">';
  h += prev? '<a href="#" data-go="'+prev.s.id+'"><span class="pk">ŌåÉ Previous</span><span class="pt">'+prev.s.id+' '+prev.s.name+'</span></a>' : '<a aria-disabled="true"><span class="pk">ŌåÉ Previous</span><span class="pt">Start of course</span></a>';
  h += next? '<a class="next" href="#" data-go="'+next.s.id+'"><span class="pk">Next ŌåÆ</span><span class="pt">'+next.s.id+' '+next.s.name+'</span></a>' : '<a class="next" aria-disabled="true"><span class="pk">Next ŌåÆ</span><span class="pt">End of course</span></a>';
  h += '</div></div>';
  view.innerHTML = h;
  wireSub(s);
}
const revealed = {};
function wireSub(s){
  view.querySelectorAll('[data-mark]').forEach(b=>b.addEventListener('click',()=>{
    Store.toggle(b.getAttribute('data-mark')); b.classList.toggle('on'); updateRing(); refreshSidebarState();
  }));
  view.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{ route.tab=b.getAttribute('data-tab'); renderSub(s.id); }));
  view.querySelectorAll('[data-reveal]').forEach(b=>b.addEventListener('click',()=>{ revealed[s.id]=true; renderSub(s.id); }));
  view.querySelectorAll('[data-hide]').forEach(b=>b.addEventListener('click',()=>{ revealed[s.id]=false; renderSub(s.id); }));
  view.querySelectorAll('[data-go]').forEach(a=>a.addEventListener('click',e=>{ e.preventDefault(); route.tab='lesson'; go({type:'sub',id:a.getAttribute('data-go')}); }));
  view.querySelectorAll('[data-embed]').forEach(b=>b.addEventListener('click',()=>{
    const slot=b.closest('.vid').querySelector('.embed-slot');
    if(slot.querySelector('iframe')){ slot.innerHTML=''; b.textContent='Watch here'; return; }
    slot.innerHTML='<div class="embed"><iframe src="https://www.youtube-nocookie.com/embed/'+b.getAttribute('data-embed')+'" title="video" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>';
    b.textContent='Close video';
  }));
  const ta=view.querySelector('#noteArea');
  if(ta){ let t; ta.addEventListener('input',()=>{ Store.setNote(s.id,ta.value); const sv=view.querySelector('#noteSaved'); sv.textContent='Saved'; clearTimeout(t); t=setTimeout(()=>sv.textContent='',1200); }); }
  typeset(view);
}

function renderTest(id){
  const t = COURSE.tests.find(x=>x.id===id); if(!t){ renderOverview(); return; }
  let h='<div class="view">';
  h += '<div class="eyebrow">Assessment</div><h1 class="page-title">'+t.name+'</h1>';
  h += '<div class="meta-row">'
    +'<span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>'+t.time+'</span>'
    +'<span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16"/><rect x="8" y="9" width="3" height="7"/><rect x="14" y="6" width="3" height="10"/></svg>'+t.points+'</span>'
    +'<span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L20 6"/><path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9"/></svg>'+t.items+'</span>'
    +'<button class="btn-sm" onclick="window.print()" style="margin-left:auto">Print / save PDF</button></div>';
  h += '<p class="lede">'+t.intro+'</p>';
  t.sections.forEach(sec=>{
    h += '<div class="tsection"><h5>'+sec.title+'</h5><ol class="problems">';
    let n=0; sec.q.forEach(q=>{ n++; h+='<li><span class="pn">'+n+'.</span><span class="pb">'+q+'</span></li>'; });
    h += '</ol></div>';
  });
  // rubric
  h += '<details style="margin:18px 0;border:1px solid var(--line);border-radius:12px;padding:6px 16px;background:var(--panel)"><summary style="cursor:pointer;font-weight:600;padding:10px 0">Grading rubric</summary><div class="cs" style="padding-bottom:10px">'+t.rubric+'</div></details>';
  // key gate
  if(!revealed['test:'+id]){
    h += '<div class="key-gate"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="var(--ink-faint)" stroke-width="1.6"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg><p>Take the test under time first, then reveal the answer key to grade it.</p><button class="btn-sm primary" data-reveal-test="'+id+'">Reveal answer key</button></div>';
  } else {
    h += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin:8px 0"><h3 style="font-family:var(--font-display);font-size:20px;margin:0">Answer key</h3><button class="btn-sm" data-hide-test="'+id+'">Hide</button></div>';
    h += renderProblems(t.key,true);
  }
  // score + completion
  const sc = Store.score('test:'+id);
  h += '<div class="score-box"><label for="scoreIn">Your score</label><input id="scoreIn" type="number" min="0" max="100" value="'+(sc!=null?sc:'')+'" placeholder="0ŌĆō100"/>'
    +'<span id="masteryOut">'+masteryBadge(sc)+'</span>'
    +'<button class="chip'+(Store.sub('test:'+id)?' on':'')+'" data-mark-test="'+id+'" style="margin-left:auto"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 12l5 5L20 6"/></svg></span>Mark completed</button></div>';
  h += '</div>';
  view.innerHTML=h;
  view.querySelectorAll('[data-reveal-test]').forEach(b=>b.addEventListener('click',()=>{ revealed['test:'+id]=true; renderTest(id); }));
  view.querySelectorAll('[data-hide-test]').forEach(b=>b.addEventListener('click',()=>{ revealed['test:'+id]=false; renderTest(id); }));
  view.querySelectorAll('[data-mark-test]').forEach(b=>b.addEventListener('click',()=>{ Store.toggle('test:'+id); b.classList.toggle('on'); updateRing(); refreshSidebarState(); }));
  const inp=view.querySelector('#scoreIn');
  if(inp) inp.addEventListener('input',()=>{ let v=inp.value===''?null:Math.max(0,Math.min(100,+inp.value)); Store.setScore('test:'+id,v); view.querySelector('#masteryOut').innerHTML=masteryBadge(v); });
  typeset(view);
}
function masteryBadge(sc){
  if(sc==null||isNaN(sc)) return '<span class="mastery m0">Enter a score</span>';
  if(sc>=90) return '<span class="mastery m3">Mastered ŌĆö advance</span>';
  if(sc>=80) return '<span class="mastery m2">Proficient ŌĆö review misses</span>';
  if(sc>=70) return '<span class="mastery m2">Developing ŌĆö redo sections</span>';
  return '<span class="mastery m1">Not yet ŌĆö re-study & retake</span>';
}

function renderOverview(){
  const tot=totalItems(), d=doneItems(), pct=tot?Math.round(d/tot*100):0;
  let h='<div class="view">';
  h += '<div class="hero"><div class="h-eye">Occidental College ┬Ę Precalculus</div><h2>Your MATH 107 study workspace</h2>'
    +'<p>Learn each topic, practice with full worksheets, check worked answers, and take timed tests ŌĆö all in one place, with your progress saved as you go.</p></div>';
  h += '<div class="grid-2"><div class="card"><h3>The Rule of Four</h3><p style="margin-top:0;color:var(--ink-soft);font-size:14.5px">Every function wears four faces. The course is about translating between them.</p>'
    +'<table class="ref"><tbody>'
    +'<tr><td><strong>Geometric</strong></td><td>a graph ŌĆö what the behavior looks like</td></tr>'
    +'<tr><td><strong>Numeric</strong></td><td>a table ŌĆö the values and how fast they change</td></tr>'
    +'<tr><td><strong>Symbolic</strong></td><td>a formula ŌĆö how to compute it exactly</td></tr>'
    +'<tr><td><strong>Verbal</strong></td><td>words ŌĆö what it means</td></tr>'
    +'</tbody></table></div>'
    +'<div class="card"><h3>How to use this site</h3><ol class="steps">'
    +'<li>Open a subtopic and read the <strong>Lesson</strong>; watch video #1.</li>'
    +'<li>Do the <strong>Worksheet</strong> closed-book.</li>'
    +'<li>Reveal the <strong>Answer key</strong> and fix every miss.</li>'
    +'<li>Tick the three boxes to mark it done ŌĆö the ring fills up.</li>'
    +'<li>After a unit, take its <strong>Test</strong> and log your score.</li>'
    +'</ol></div></div>';
  h += '<hr class="rule"><div class="eyebrow">The plan</div><h1 class="page-title" style="font-size:26px">Seven units ┬Ę twenty-eight subtopics</h1>';
  h += '<div class="roadmap">';
  COURSE.units.forEach(u=>{
    const ready=!u.locked;
    h += '<div class="rm-unit"><div class="rm-h"><span class="un">Unit '+u.n+'</span><span class="nm">'+u.name+'</span><span class="tag '+(ready?'ready':'soon')+'">'+(ready?'Ready':'Coming soon')+'</span></div><div class="subchips">';
    (u.subtopics||[]).forEach(s=>{ h += ready? '<span class="cl" data-jump="'+s.id+'">'+s.id+' '+s.name+'</span>' : '<span>'+s.id+' '+s.name+'</span>'; });
    h += '</div></div>';
  });
  h += '</div>';
  h += '<hr class="rule"><div class="eyebrow">Assessments</div><h1 class="page-title" style="font-size:26px">Test battery</h1>'
    +'<p class="lede">A diagnostic, seven unit tests, a midterm after Unit 4, and a cumulative final ŌĆö all ten are ready to take now.</p><div class="subchips" style="gap:10px">';
  COURSE.tests.forEach(t=>{ h += '<span class="cl" data-jumptest="'+t.id+'" style="font-size:13.5px;padding:7px 13px">'+t.name+' ┬Ę '+t.time+'</span>'; });
  h += '</div>';
  h += '<div class="card" style="margin-top:26px"><h3>Resources</h3><p style="margin:0;color:var(--ink-soft);font-size:14.5px">Free textbook: <a href="https://openstax.org/details/books/precalculus-2e" target="_blank" rel="noopener">OpenStax Precalculus 2e</a> (the section-by-section spine). Graphing: <a href="https://www.desmos.com/calculator" target="_blank" rel="noopener">Desmos</a>. Notes &amp; common errors: <a href="https://tutorial.math.lamar.edu" target="_blank" rel="noopener">Paul\u2019s Online Math Notes</a>.</p>'
    +(Store.persists?'':'<p style="margin:12px 0 0;font-size:13px;color:var(--amber)">Note: this preview can\u2019t save to your browser, so progress lasts only for this session. Once the site is on your GitHub Pages (or opened as a downloaded file), progress saves automatically.</p>')
    +'</div>';
  h += '</div>';
  view.innerHTML=h;
  view.querySelectorAll('[data-jump]').forEach(s=>s.addEventListener('click',()=>{ route.tab='lesson'; go({type:'sub',id:s.getAttribute('data-jump')}); }));
  view.querySelectorAll('[data-jumptest]').forEach(s=>s.addEventListener('click',()=>go({type:'test',id:s.getAttribute('data-jumptest')})));
  typeset(view);
}

function render(){
  buildSidebar();
  if(route.type==='sub') renderSub(route.id);
  else if(route.type==='test') renderTest(route.id);
  else renderOverview();
  updateRing();
}
function refreshSidebarState(){ buildSidebar(); }

/* ----- helpers ----- */
function typeset(el){
  if(window.renderMathInElement){
    try{ renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false,ignoredTags:['script','noscript','style','textarea']}); }catch(e){}
  }
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

/* ----- search ----- */
document.getElementById('searchInput').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  sidebar.querySelectorAll('[data-unit]').forEach(block=>{
    let any=false;
    block.querySelectorAll('[data-sub], .nav-item').forEach(row=>{
      const txt=row.textContent.toLowerCase();
      const match = !q || txt.includes(q);
      if(row.hasAttribute('data-sub')){ row.style.display = match?'':'none'; if(match) any=true; }
    });
    const head=block.querySelector('.unit-head'); const list=block.querySelector('.sublist');
    if(q){ if(list){ list.hidden=false; } block.style.display = any?'':'none'; }
    else { block.style.display=''; }
  });
});

/* ----- theme ----- */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t); Store.set('theme',t);
  document.getElementById('themeIcon').innerHTML = t==='dark'
    ? '<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>'
    : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
}
document.getElementById('themeBtn').addEventListener('click',()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));

/* ----- reset ----- */
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(confirm('Reset all progress, notes, and scores? This cannot be undone.')){ Store.reset(); render(); toast('Progress reset'); }
});

/* ----- drawer ----- */
const scrim=document.getElementById('scrim');
function openDrawer(){ sidebar.classList.add('open'); scrim.classList.add('show'); }
function closeDrawer(){ sidebar.classList.remove('open'); scrim.classList.remove('show'); }
document.getElementById('menuBtn').addEventListener('click',()=>sidebar.classList.contains('open')?closeDrawer():openDrawer());
scrim.addEventListener('click',closeDrawer);

/* ----- init ----- */
(function init(){
  try{
    applyTheme(Store.get('theme')||'light');
    const last=Store.get('last'); if(last){ try{ route=JSON.parse(last); }catch(e){} }
    if(route.type==='sub' && !findSub(route.id)) route={type:'overview'};
    render();
  }catch(err){
    view.innerHTML='<div class="empty"><p>Something went wrong loading the workspace.</p><pre style="font-size:12px;color:var(--ink-faint)">'+escapeHtml(String(err))+'</pre></div>';
    console.error(err);
  }
})();
</script>
</body>
</html>
